<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ＰＭＯ電子圖資系統</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #f1f5f9;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            -webkit-text-size-adjust: 100%; /* 防止 iOS 旋轉時字體放大 */
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            transition: padding 0.3s;
        }

        /* 頂部標題與按鈕區塊 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            min-height: 42px;
            gap: 10px;
        }

        .header-left {
            display: flex;
            gap: 8px;
            flex: 1;
            align-items: center;
        }

        .header-right {
            flex: 1;
        }

        .btn-nav {
            padding: 8px 16px;
            background: #e2e8f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-main);
            transition: background 0.2s;
            font-size: clamp(12px, 3vw, 15px);
            white-space: nowrap;
        }

        /* 專門給側邊欄漢堡按鈕的樣式 */
        .btn-menu {
            padding: 8px 12px;
            font-size: 16px;
            background: var(--primary);
            color: white;
        }
        .btn-menu:hover { background: #1d4ed8; color: white; }

        .btn-nav:hover { background: #cbd5e1; }

        #main-title {
            margin: 0;
            font-size: clamp(18px, 4.5vw, 26px);
            text-align: center;
            flex: 2;
            line-height: 1.3;
        }

        /* 路徑紀錄 (麵包屑) */
        .breadcrumb {
            font-size: clamp(13px, 3.5vw, 15px);
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover { color: var(--primary); text-decoration: underline; }
        .breadcrumb-item.current { cursor: default; color: var(--text-main); text-decoration: none; }
        .breadcrumb-separator { color: #cbd5e1; font-size: 14px; }

        /* ======== 側邊欄 (Sidebar) 樣式 ======== */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); z-index: 998;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100vh;
            background-color: var(--card); z-index: 999;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: left 0.3s ease; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 20px; font-size: 18px; font-weight: bold;
            border-bottom: 1px solid #e2e8f0; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-close {
            background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);
        }

        .sidebar-menu { flex: 1; padding: 10px 0; overflow-y: auto; }
        .menu-item {
            padding: 15px 25px; cursor: pointer; font-weight: bold; font-size: 16px;
            display: flex; align-items: center; gap: 15px; transition: background 0.2s;
        }
        .menu-item:hover { background: var(--accent); color: var(--primary); }
        
        /* 側邊欄 - 開發中項目的懸浮提示與不可點擊狀態 */
        .menu-item.disabled {
            color: #94a3b8; cursor: not-allowed; position: relative;
        }
        .menu-item.disabled:hover { background: transparent; color: #94a3b8; }
        
        .tooltip-container::after {
            content: attr(data-tooltip);
            position: absolute; left: 60px; top: 100%;
            background: #1e293b; color: white; padding: 6px 12px; border-radius: 6px;
            font-size: 13px; white-space: nowrap; font-weight: normal;
            pointer-events: none; opacity: 0; visibility: hidden; transition: all 0.2s; z-index: 1000;
        }
        .tooltip-container:hover::after {
            opacity: 1; visibility: visible; margin-top: 5px;
        }

        .sidebar-footer {
            padding: 15px; text-align: center; color: var(--text-muted);
            font-size: 13px; border-top: 1px solid #e2e8f0;
        }

        /* 視圖切換 */
        .view { display: none; }
        .view.active { display: block; }

        .grid-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        /* 卡片設計 */
        .nav-card {
            background: var(--card); padding: 25px 20px; text-align: center;
            border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            cursor: pointer; transition: all 0.2s; border: 2px solid transparent; position: relative;
        }
        .nav-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        /* 若卡片不想有上浮效果 (例如分機表卡片) 可以加此 Class */
        .nav-card.no-hover:hover { transform: none; border-color: transparent; cursor: default; }

        /* 標籤頁控制 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: all 0.2s;
            font-size: clamp(14px, 3.5vw, 16px); flex: 1; min-width: 80px; max-width: 150px;
        }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 懸浮預覽與密碼清單 */
        .preview-list {
            max-height: 0; opacity: 0; overflow: hidden; list-style: none; padding: 0; margin: 0;
            transition: all 0.3s ease; font-size: 14px; color: var(--text-muted);
        }
        .nav-card:hover .preview-list { max-height: 250px; opacity: 1; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .password-container { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease; }
        .nav-card:hover .password-container { max-height: 60px; opacity: 1; margin-top: 10px; }
        .password-badge { color: var(--danger); font-weight: bold; font-family: monospace; font-size: 18px; background: #fee2e2; padding: 4px 10px; border-radius: 4px; display: inline-block; }
        .detail-info { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease; text-align: left; font-size: 13px; line-height: 1.6; color: #444; }
        .nav-card:hover .detail-info { max-height: 300px; opacity: 1; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }

        /* 設備表格樣式 */
        .facility-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .facility-table td { padding: 5px; border: 1px solid #e2e8f0; font-size: 12px; }
        .facility-label { background: #f1f5f9; font-weight: bold; width: 40%; }

        @media (max-width: 768px) {
            .app-container { padding: 10px 15px; }
            .header-left { gap: 5px; }
            .btn-nav { padding: 6px 10px; }
            /* 移除了強制展開隱藏區塊的語法，恢復原有的懸浮顯示功能 */
        }
    </style>
</head>

        }
        
        breadcrumb.innerHTML = pathHtml;
    }

    // 切換顯示的容器
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        updateNavigationUI();
    }

    // 回到首頁 (Level 0)
    function goHome() {
        currentLevel = 0; currentFloor = ''; currentOffice = '';
        switchView('view-floor');
    }

    // 回上一頁
    function goBack() {
        if (currentLevel === 3) { goHome(); } // 從特殊頁面退回首頁
        else if (currentLevel === 2) { showOffices(currentFloor); } 
        else if (currentLevel === 1) { goHome(); }
    }

    // 進入樓層視圖 (Level 1)
    function showOffices(floor) {
        currentLevel = 1; currentFloor = floor; currentOffice = '';
        const list = document.getElementById('office-list');
        list.innerHTML = '';
        officeData[floor].forEach(off => {
            const card = document.createElement('div');
            card.className = 'nav-card';
            card.innerHTML = `
                <h2>${off.name}</h2>
                <div class="password-container"><span class="password-badge">${off.pwd}</span></div>
                <div style="font-size:12px; color:var(--primary); margin-top:10px;">點擊查看詳情</div>
            `;
            card.onclick = () => showDetail(off.name);
            list.appendChild(card);
        });
        switchView('view-office');
    }

    // 進入辦公室詳情視圖 (Level 2)
    function showDetail(office) {
        currentLevel = 2; currentOffice = office; currentTab = 'staff';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-staff').classList.add('active');
        updateDetailContent();
        switchView('view-detail');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        updateDetailContent();
    }

    function updateDetailContent() {
        const grid = document.getElementById('detail-grid');
        grid.innerHTML = '';
        const memberKeys = Object.keys(memberData).filter(key => {
            if(currentOffice.includes('接艦')) return key.startsWith('A-');
            if(currentOffice.includes('ABS')) return key.startsWith('C-');
            return false;
        });

        if (currentTab === 'staff') {
            if(memberKeys.length === 0) grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #64748b;">目前尚無人員資料</div>';
            memberKeys.forEach(key => {
                const m = memberData[key];
                const card = document.createElement('div');
                card.className = 'nav-card';
                card.innerHTML = `
                    <h3>${m.name}</h3><p style="color:#666;">${key}</p>
                    <div class="detail-info"><div><b>分機：</b>${m.ext}</div><div><b>入場日期：</b>${m.join_date}</div><div><b>電腦編號：</b>${m.pc_id}</div></div>
                `;
                grid.appendChild(card);
            });
        } 
        else if (currentTab === 'assets') {
            const assets = officeAssets[currentOffice] || [];
            assets.forEach(a => {
                const card = document.createElement('div'); card.className = 'nav-card';
                card.innerHTML = `<h3>${a.item}</h3><div class="password-badge" style="font-size:14px; margin:10px 0;">SN: ${a.sn}</div><div style="font-size:12px;">狀態: ${a.status}</div>`;
                grid.appendChild(card);
            });
            memberKeys.forEach(key => {
                const m = memberData[key];
                if(m.assets && m.assets.length > 0) {
                    const card = document.createElement('div'); card.className = 'nav-card';
                    card.innerHTML = `<h3>${m.name} (個人資產)</h3><div class="detail-info" style="max-height:100px; opacity:1;">${m.assets.join('<br>')}</div>`;
                    grid.appendChild(card);
                }
            });
        }
        else if (currentTab === 'facilities') {
            memberKeys.forEach(key => {
                const m = memberData[key];
                const card = document.createElement('div'); card.className = 'nav-card'; card.style.textAlign = 'left';
                card.innerHTML = `<h3 style="text-align:center;">${m.name}</h3><table class="facility-table"><tr><td class="facility-label">網路孔</td><td>${m.net_port}</td></tr><tr><td class="facility-label">電話孔</td><td>${m.phone_port}</td></tr></table>`;
                grid.appendChild(card);
            });
        }
    }

    // ==== 產生全部分機表 (Level 3) ====
    function showExtensionsView() {
        closeSidebar();
        currentLevel = 3;
        
        const container = document.getElementById('ext-container');
        container.innerHTML = '';

        // 利用 dept 屬性將人員自動歸類到對應的辦公室/部門
        const deptMap = {};
        for (let key in memberData) {
            const m = memberData[key];
            const deptName = m.dept || '其他部門';
            if (!deptMap[deptName]) deptMap[deptName] = [];
            deptMap[deptName].push(m);
        }

        // 動態生成 HTML
        for (let deptName in deptMap) {
            const groupDiv = document.createElement('div');
            groupDiv.style.marginBottom = '30px';
            
            // 辦公室標題
            let html = `
                <h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; font-size: 18px;">
                    ${deptName}
                </h2>
                <div class="grid-nav" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px;">
            `;

            // 辦公室內人員清單
            deptMap[deptName].forEach(m => {
                const hasExt = (m.ext && m.ext !== 'N/A');
                const extText = hasExt ? m.ext : '無分機';
                const extColor = hasExt ? 'var(--primary)' : 'var(--text-muted)';
                
                html += `
                    <div class="nav-card no-hover" style="padding: 15px 20px; text-align: left; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${m.name}</div>
                            <div style="font-size: 12px; color: var(--text-muted);">
                                ${m.pc_id !== 'N/A' ? 'PC: ' + m.pc_id : ''}
                            </div>
                        </div>
                        <div style="font-size: 24px; font-weight: bold; color: ${extColor}; font-family: monospace;">
                            ${extText}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            groupDiv.innerHTML = html;
            container.appendChild(groupDiv);
        }

        switchView('view-extensions');
    }

    // 執行初始化
    window.onload = init;
</script>
</body>
</html>
