<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辦公室分機表 | PMO電子圖資系統</title>
    <!-- ✨ 共用主系統的 CSS 樣式表，保持視覺一致性 -->
    <link rel="stylesheet" href="style.css">
    
    <!-- 此頁面專屬的微調樣式 -->
    <style>
        body { padding-top: 20px; }
        .header-bar { 
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px;
            margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; 
        }
        /* 表頭標題放大至 45 級並置中 */
        .header-title {
            margin: 0; font-size: 45px; color: var(--primary); 
            display: flex; justify-content: center; align-items: center; gap: 10px;
            width: 100%; text-align: center; flex-wrap: wrap;
        }
        .search-container {
            margin-bottom: 40px; width: 100%;
        }
        /* 搜尋條放大至 35 級，全頁寬度 */
        .search-box { 
            padding: 15px 25px; border: 2px solid #cbd5e1; border-radius: 40px; 
            width: 100%; box-sizing: border-box; font-size: 35px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: border-color 0.2s; outline: none;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .office-group { margin-bottom: 40px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .office-title { 
            font-size: 18px; font-weight: bold; color: var(--text-main); 
            border-bottom: 1px dashed #cbd5e1; padding-bottom: 10px; margin-bottom: 20px; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 上方標題區塊 -->
    <div class="header-bar">
        <h1 class="header-title">📞 辦公室分機表</h1>
    </div>

    <!-- 獨立於標題下方的全寬度搜尋條 -->
    <div class="search-container">
        <input type="text" id="search-input" class="search-box" placeholder="🔍 搜尋姓名、分機或辦公室名稱...">
    </div>

    <div id="loading-msg" style="text-align: center; color: var(--text-muted); padding: 50px; font-size: 18px;">
        ⏳ 資料讀取與驗證中...
    </div>

    <!-- 分機卡片將會渲染在這裡 -->
    <div id="ext-container"></div>
</div>

<!-- ✨ 遵守混合模式守則：單一檔案處理 Firebase 資料撈取與渲染邏輯 -->
<script type="module">
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signInWithPopup, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let db, auth, provider;
    let globalOffices = [];
    let globalMembers = [];

    // 偵測是否為實際的開發或發布環境 (過濾掉 Canvas 的 Blob/Iframe 預覽環境以防 TypeError)
    const isRealEnvironment = window.location.hostname.length > 0 && !window.location.href.startsWith('blob:');

    if (isRealEnvironment) {
        import('./js/firebase-config.js')
            .then(module => {
                db = module.db;
                auth = module.auth;
                provider = module.provider;
                initializeApp();
            })
            .catch(err => {
                showError('載入設定檔失敗：' + err.message);
            });
    } else {
        showError('⚠️ 線上預覽模式無法跨檔案載入，請於本機 VS Code (Live Server) 中測試與檢視。');
    }

    function showError(msg) {
        const loadingMsg = document.getElementById('loading-msg');
        if (loadingMsg) {
            loadingMsg.innerHTML = msg;
            loadingMsg.style.color = 'var(--danger)';
        }
    }

    function initializeApp() {
        // 1. 身分防護網：確保未登入者無法看到資料，並提供本地測試用登入按鈕
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById('loading-msg').innerHTML = `
                    ⛔ 您尚未登入，請先登入以存取資料。<br><br>
                    <button id="ext-login-btn" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:30px; cursor:pointer; font-weight:bold; font-size:16px;">
                        使用 Google 帳號登入
                    </button>
                `;
                document.getElementById('loading-msg').style.color = 'var(--danger)';
                
                // 綁定登入事件，加入本地端降級訪客模式防護
                document.getElementById('ext-login-btn').onclick = async () => {
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (error) {
                        if (error.code === 'auth/unauthorized-domain') {
                            if (window.location.hostname.includes('127.0.0.1') || window.location.hostname.includes('localhost')) { 
                                alert('本地端無法使用 Google 登入，為您啟用訪客預覽模式！'); 
                                await signInAnonymously(auth); 
                            } else { 
                                alert('登入失敗：網址未獲 Firebase 授權！'); 
                            }
                        } else if (error.code !== 'auth/popup-closed-by-user') { 
                            alert('登入失敗：' + error.message); 
                        }
                    }
                };
                return;
            }
            
            document.getElementById('loading-msg').innerHTML = '⏳ 資料讀取中...';
            document.getElementById('loading-msg').style.color = 'var(--text-muted)';
            fetchData(); // 驗證通過後才去撈資料
        });
    }

    // 2. 抓取資料 (雙線並行)
    function fetchData() {
        let officesLoaded = false;
        let membersLoaded = false;

        onSnapshot(collection(db, "offices"), (snapshot) => {
            globalOffices = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            officesLoaded = true;
            if (membersLoaded) renderExtensions();
        });

        onSnapshot(collection(db, "members"), (snapshot) => {
            globalMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            membersLoaded = true;
            if (officesLoaded) renderExtensions();
        });
    }

    // 3. 畫面渲染與搜尋過濾邏輯
    function renderExtensions() {
        const container = document.getElementById('ext-container');
        const loading = document.getElementById('loading-msg');
        const keyword = document.getElementById('search-input').value.toLowerCase().trim();

        if(loading) loading.style.display = 'none';
        container.innerHTML = '';

        // 根據搜尋關鍵字過濾人員 (支援姓名、分機、辦公室名稱)
        const filteredMembers = globalMembers.filter(m => {
            const nameMatch = (m.name || '').toLowerCase().includes(keyword);
            const extMatch = (m.ext || '').toLowerCase().includes(keyword);
            const office = globalOffices.find(o => o.id === m.office_id);
            const officeNameMatch = (office ? office.name : (m.office_id || '')).toLowerCase().includes(keyword);
            
            return nameMatch || extMatch || officeNameMatch;
        });

        if (filteredMembers.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-muted); background:white; border-radius:12px; border:1px dashed #cbd5e1;">找不到符合條件的人員、分機或辦公室。</div>';
            return;
        }

        // 將過濾後的人員按照「辦公室名稱」進行分組 (Group By)
        const map = {};
        filteredMembers.forEach(m => {
            const office = globalOffices.find(o => o.id === m.office_id);
            const officeName = office ? office.name : (m.office_id || '未分配辦公室');
            if (!map[officeName]) map[officeName] = [];
            map[officeName].push(m);
        });

        // 渲染分組畫面
        Object.keys(map).sort().forEach(officeName => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'office-group';
            let html = `<div class="office-title">🏢 ${officeName}</div><div class="grid-nav" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));">`;
            
            // 該辦公室內的人員按姓名排序
            map[officeName].sort((a,b) => (a.name||'').localeCompare(b.name||'')).forEach(m => {
                const hasExt = (m.ext && m.ext !== 'N/A');
                html += `
                <div class="nav-card no-hover" style="padding: 15px 20px; text-align: left; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);">
                    <div>
                        <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${m.name}</div>
                        <div style="font-size: 12px; color: var(--text-muted);">${m.title && m.title !== 'N/A' ? m.title : ''}</div>
                    </div>
                    <div style="font-size: 22px; font-weight: bold; color: ${hasExt ? 'var(--primary)' : 'var(--text-muted)'}; font-family: monospace;">
                        ${hasExt ? m.ext : '無分機'}
                    </div>
                </div>`;
            });
            html += `</div>`;
            groupDiv.innerHTML = html;
            container.appendChild(groupDiv);
        });
    }

    // 綁定輸入框的即時搜尋事件
    document.getElementById('search-input').addEventListener('input', renderExtensions);
</script>

</body>
</html>
