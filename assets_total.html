        window.closeExportModal();
        const fc = $('fab-container'); if(fc) fc.classList.remove('active'); 
        const fm = $('fab-menu'); if(fm) fm.classList.remove('active'); 
        $$('.fab-submenu').forEach(s => s.classList.remove('open'));
    };

    // ✨ 智慧帶入功能
    window.autoFillAssetProperties = (type) => {
        if (window.currentEditAssetId) return; // 編輯模式不帶入
        const itemName = type === 'fixed' ? $('asset-item').value.trim() : $('consumable-item').value.trim();
        if (!itemName) return;

        const matches = globalAssets.filter(a => a.assetType === type && a.item === itemName).sort((a,b) => String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
        if (matches.length > 0) {
            const latest = matches[0];
            if (type === 'fixed') {
                if (latest.category && !$('asset-category').value) $('asset-category').value = latest.category;
                if (latest.year && !$('asset-year').value) $('asset-year').value = latest.year;
            } else {
                if (latest.tag && !$('consumable-tag').value) $('consumable-tag').value = latest.tag;
                if (latest.unit && !$('consumable-unit').value) $('consumable-unit').value = latest.unit;
                if (latest.minThreshold !== undefined && !$('consumable-min').value) $('consumable-min').value = latest.minThreshold;
                if (latest.contactPerson && !$('consumable-contact').value) $('consumable-contact').value = latest.contactPerson;
                if (latest.remarks && !$('consumable-remarks').value) $('consumable-remarks').value = latest.remarks;
            }
        }
    };

    window.switchAssetMainType = (type) => {
        const typeInput = document.getElementById('asset-main-type');
        if (typeInput) typeInput.value = type;

        const btnFixed = document.getElementById('btn-type-fixed');
        const btnConsumable = document.getElementById('btn-type-consumable');
        const fixedFields = document.getElementById('fixed-asset-fields');
        const consumableFields = document.getElementById('consumable-asset-fields');

        if (type === 'fixed') {
            if(btnFixed) { btnFixed.style.background = 'var(--primary)'; btnFixed.style.color = 'white'; }
            if(btnConsumable) { btnConsumable.style.background = 'white'; btnConsumable.style.color = 'var(--text-main)'; }
            if(fixedFields) fixedFields.style.display = 'block';
            if(consumableFields) consumableFields.style.display = 'none';
        } else {
            if(btnConsumable) { btnConsumable.style.background = 'var(--primary)'; btnConsumable.style.color = 'white'; }
            if(btnFixed) { btnFixed.style.background = 'white'; btnFixed.style.color = 'var(--text-main)'; }
            if(fixedFields) fixedFields.style.display = 'none';
            if(consumableFields) consumableFields.style.display = 'block';
        }
    };

    window.openAssetModal = (id = null) => {
        if (typeof id !== 'string') id = null; 
        window.currentEditAssetId = id; 
        if (id) { 
            $('asset-modal-title').innerText = '📦 編輯資產'; 
            const a = globalAssets.find(x => x.id === id); 
            if(a) {
                window.switchAssetMainType(a.assetType || 'fixed'); $('asset-office-id').value = a.office_id || '';
                if (a.assetType !== 'consumable') { 
                    $('asset-category').value = a.category || '其他'; 
                    $('asset-item').value = a.item || ''; 
                    $('asset-sn').value = a.sn || ''; 
                    $('asset-year').value = a.year || '';
                    $('asset-status').value = a.status || '正常'; 
                } 
                else { 
                    $('consumable-item').value = a.item || ''; 
                    $('consumable-tag').value = a.tag || ''; 
                    $('consumable-quantity').value = a.quantity || 0; 
                    $('consumable-unit').value = a.unit || '個'; 
                    $('consumable-min').value = a.minThreshold !== undefined ? a.minThreshold : 10; 
                    $('consumable-contact').value = a.contactPerson || ''; 
                    $('consumable-remarks').value = a.remarks || ''; 
                }
            }
        } else { 
            $('asset-modal-title').innerText = '➕ 新增資產'; window.switchAssetMainType(window.currentTab === 'summary' ? 'consumable' : 'fixed'); 
            ['asset-category', 'asset-item', 'asset-sn', 'asset-year', 'consumable-item', 'consumable-tag', 'consumable-contact', 'consumable-remarks'].forEach(k => $(k).value = '');
            $('asset-status').value = '正常'; $('consumable-quantity').value = '0'; $('consumable-unit').value = '個'; $('consumable-min').value = '10';
        }
        $('asset-modal-overlay').classList.add('active');
    };
    window.closeAssetModal = () => $('asset-modal-overlay').classList.remove('active');
    
    window.saveAssetData = async () => {
        const aType = $('asset-main-type').value; const off = $('asset-office-id').value; if(!off) return alert('請選擇辦公室！');
        let data = { office_id: off, assetType: aType };
        if (aType === 'fixed') { 
            const cat = $('asset-category').value.trim() || '其他'; 
            data = { 
                ...data, type: 'public', category: cat, 
                item: $('asset-item').value.trim() || cat, 
                sn: $('asset-sn').value || 'N/A', 
                year: $('asset-year').value ? parseInt($('asset-year').value) : null,
                status: $('asset-status').value, 
                createdAt: new Date().toISOString() 
            }; 
        } 
        else { 
            const item = $('consumable-item').value.trim(); if(!item) return alert('名稱必填！'); 
            data = { 
                ...data, item: item, 
                tag: $('consumable-tag').value || '未分類', 
                quantity: parseInt($('consumable-quantity').value) || 0, 
                minThreshold: parseInt($('consumable-min').value) || 0, 
                unit: $('consumable-unit').value || '個', 
                contactPerson: $('consumable-contact').value || '無', 
                remarks: $('consumable-remarks').value || '', 
                createdAt: new Date().toISOString() 
            }; 
        }
        try { if(window.currentEditAssetId) await updateDoc(doc(db, "assets", window.currentEditAssetId), data); else await addDoc(collection(db, "assets"), data); window.closeAssetModal(); window.clearBatchSelection(); } catch(e) { alert('儲存失敗：'+e.message); }
    };

    window.openCheckoutModal = () => {
        const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        $('checkout-date').value = now.toISOString().slice(0,16); $('checkout-borrower').value = currentUserProfile.name || ''; $('checkout-qty').value = 1; $('checkout-remarks').value = ''; $('checkout-asset-id').value = ''; $('checkout-location-id').value = ''; $('checkout-location').value = ''; $('disp-checkout-asset').innerText = '請搜尋並選擇資產...'; $('opt-checkout-asset-input').value = '';
        window.renderCheckoutAssetList(); $('checkout-modal-overlay').classList.add('active');
    };
    window.closeCheckoutModal = () => $('checkout-modal-overlay').classList.remove('active');

    // ✨ 下拉選單控制引擎
    window.toggleDropdown = (t, e) => { 
        if(e) e.stopPropagation(); 
        $$('.custom-dropdown-panel').forEach(p => { if(p.id !== `${t}-panel`) p.classList.remove('active'); }); 
        const panel = $(`${t}-panel`);
        if(panel) {
            panel.classList.toggle('active'); 
            if(panel.classList.contains('active')) {
                const inp = $(`${t}-input`);
                if(inp) inp.focus();
            }
        }
    };

    window.renderCheckoutAssetList = () => {
        const iv = $('opt-checkout-asset-input').value.toLowerCase().trim(); const ld = $('opt-checkout-asset-list'); ld.innerHTML = '';
        const f = globalAssets.filter(a => (a.item||'').toLowerCase().includes(iv) || (a.sn||'').toLowerCase().includes(iv) || (a.tag||'').toLowerCase().includes(iv));
        if(f.length === 0) return ld.innerHTML = '<div style="padding:10px; color:#94a3b8; font-size:13px; text-align:center;">找不到資產</div>';
        f.slice(0,50).forEach(a => {
            const off = globalOffices.find(o => o.id === a.office_id); const offName = off ? off.name : '未知辦公室'; const ty = a.assetType === 'consumable' ? '📦' : '📌';
            const d = document.createElement('div'); d.className = 'dropdown-item'; d.innerHTML = `<span>${ty} ${a.item} <span style="font-size:11px; color:#94a3b8;">(${offName})</span></span>`;
            d.onclick = (e) => { e.stopPropagation(); $('checkout-asset-id').value = a.id; $('disp-checkout-asset').innerText = `${ty} ${a.item}`; $('checkout-location-id').value = off ? off.id : ''; $('checkout-location').value = offName; $('opt-checkout-asset-panel').classList.remove('active'); window.autoFillCheckoutRemarks(); }; ld.appendChild(d);
        });
    };

    window.autoFillCheckoutRemarks = () => {
        const aId = $('checkout-asset-id').value; const oName = $('checkout-location').value; const bName = $('checkout-borrower').value.trim().toLowerCase();
        if (!aId || !bName) return;
        const past = globalCheckouts.find(c => { let matches = 0; if (c.assetId === aId) matches++; if (c.officeName === oName) matches++; if ((c.borrower||'').toLowerCase() === bName) matches++; return matches >= 2 && c.remarks; });
        if (past && !$('checkout-remarks').value.trim()) $('checkout-remarks').value = past.remarks;
    };

    window.saveCheckout = async () => {
        const aId = $('checkout-asset-id').value; const qty = parseInt($('checkout-qty').value); const borrower = $('checkout-borrower').value.trim(); const dStr = $('checkout-date').value; const rem = $('checkout-remarks').value.trim(); const locName = $('checkout-location').value;
        if(!aId || !qty || !borrower || !dStr) return alert('資產、數量、領取人與日期皆為必填！');
        const asset = globalAssets.find(a => a.id === aId); if(!asset) return alert('資產不存在！');
        const checkoutData = { assetId: asset.id, assetName: asset.item || '未命名', assetType: asset.assetType || 'fixed', officeName: locName, quantity: qty, borrower: borrower, checkoutDate: dStr, remarks: rem, createdAt: new Date().toISOString(), creatorName: currentUserProfile.name, creatorEmail: currentUserProfile.email, creatorAvatar: currentUserProfile.avatar, likes: [] };
        const btn = document.querySelector('#checkout-modal-overlay .btn-primary'); btn.disabled = true; btn.innerText = '登記中...';
        try {
            const ops = [];
            if (asset.assetType === 'consumable') { const currentQty = parseInt(asset.quantity) || 0; const newQty = Math.max(0, currentQty - qty); ops.push(updateDoc(doc(db, 'assets', asset.id), { quantity: newQty })); }
            ops.push(addDoc(collection(db, 'asset_checkouts'), checkoutData)); await Promise.all(ops); alert('🎉 領用登記成功！'); window.closeCheckoutModal();
        } catch(e) { alert('登記失敗：' + e.message); } finally { btn.disabled = false; btn.innerText = '確認登記'; }
    };

    window.toggleFabMenu = (e) => { 
        if(e) e.stopPropagation(); 
        const c = $('fab-container'); if(c) c.classList.toggle('active'); 
        const m = $('fab-menu'); if(m) m.classList.toggle('active'); 
        $$('.fab-submenu').forEach(s => s.classList.remove('open')); 
    };

    // ✨ 點擊畫面空白處自動收起所有懸浮選單與防護事件冒泡
    window.addEventListener('click', (e) => { 
        const panel = $('col-filter-panel');
        if (panel && panel.style.display === 'flex') {
            if (!panel.contains(e.target) && !e.target.closest('.th-filter-btn')) {
                panel.style.display = 'none';
            }
        }
        
        if (!e.target.closest('#fab-container')) {
            const fc = $('fab-container'); if(fc) fc.classList.remove('active'); 
            const fm = $('fab-menu'); if(fm) fm.classList.remove('active'); 
            $$('.fab-submenu').forEach(s => s.classList.remove('open')); 
        }
        
        $$('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); 
    });
    
    // ======== ✨ 教學系統 ========
    window.startTutorial = () => {
        window.currentTutorialStep = 0;
        $('tutorial-overlay-mask').style.display = 'block';
        $('tutorial-ring-container').style.display = 'block';
        $('tutorial-dialog').style.display = 'flex';
        window.renderTutorialStep();
    };

    window.exitTutorial = () => {
        if(confirm('確定離開教學？')) {
            window.endTutorial();
        }
    };

    window.endTutorial = () => {
        $('tutorial-overlay-mask').style.display = 'none';
        $('tutorial-ring-container').style.display = 'none';
        $('tutorial-dialog').style.display = 'none';
        window.clearTutorialHighlights();
        if(tutorialTimer) clearTimeout(tutorialTimer);
    };

    window.nextTutorialStep = () => {
        window.currentTutorialStep++;
        if (window.currentTutorialStep >= tutorialData.length) {
            alert('🎉 恭喜您完成教學！您可以隨時點擊頁面最上方標題重新觀看。');
            window.endTutorial();
        } else {
            window.renderTutorialStep();
        }
    };

    window.clearTutorialHighlights = () => {
        $$('.tutorial-on-top').forEach(el => el.classList.remove('tutorial-on-top'));
        $('tutorial-ring-container').innerHTML = '';
    };

    window.renderTutorialStep = () => {
        window.clearTutorialHighlights();
        const step = tutorialData[window.currentTutorialStep];
        
        window.switchTab(step.tab);
        $('tutorial-title').innerHTML = `💡 教學：${step.title}`;
        $('tutorial-text').innerText = step.text;
        $('tutorial-step-indicator').innerText = `${window.currentTutorialStep + 1} / ${tutorialData.length}`;
        $('tutorial-btn-next').innerText = window.currentTutorialStep === tutorialData.length - 1 ? '完成教學 ✔' : '下一步 ➔';

        if (tutorialTimer) clearTimeout(tutorialTimer);
        tutorialTimer = setTimeout(() => {
            if ($('tutorial-overlay-mask').style.display === 'none') return;

            step.targets.forEach(sel => {
                const el = document.querySelector(sel);
                if(el) {
                    el.classList.add('tutorial-on-top');
                    const rect = el.getBoundingClientRect();
                    const ring = document.createElement('div');
                    ring.className = 'tutorial-ring';
                    const pad = 12;
                    ring.style.left = (rect.left - pad) + 'px';
                    ring.style.top = (rect.top - pad) + 'px';
                    ring.style.width = (rect.width + pad * 2) + 'px';
                    ring.style.height = (rect.height + pad * 2) + 'px';
                    $('tutorial-ring-container').appendChild(ring);
                }
            });
        }, 150);
    };

    window.addEventListener('keydown', (e) => { 
        if (e.key === 'Escape') { 
            const panel = $('col-filter-panel');
            if (panel && panel.style.display === 'flex') panel.style.display = 'none';

            $$('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); 
            $$('.modal-overlay').forEach(m => m.classList.remove('active')); 
            const fc = $('fab-container'); if(fc) fc.classList.remove('active'); 
            const fm = $('fab-menu'); if(fm) fm.classList.remove('active'); 
            $$('.fab-submenu').forEach(s => s.classList.remove('open')); 
            if($('tutorial-dialog').style.display === 'flex') { window.exitTutorial(); }
        } 
    });
</script>
</body>
</html>
