<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮時相機管理 | PMO電子圖資系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { padding-top: 20px; }
        .header-bar { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header-title { margin: 0; font-size: 45px; color: var(--primary); text-align: center; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 30px; background: white; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: var(--text-muted); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .notion-table { width: 100%; border-collapse: collapse; min-width: 1000px; text-align: left; font-size: 14px; }
        .notion-table th { background: #f8fafc; color: var(--text-muted); font-weight: bold; padding: 12px 15px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
        .notion-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
        .notion-table tr:hover { background: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; white-space: nowrap; }
        .archived-row td, .archived-card { background-color: #f8fafc !important; color: #94a3b8 !important; opacity: 0.7; }
        .archived-card { border: 1px solid #cbd5e1 !important; cursor: not-allowed !important; transform: none !important; }
        .board-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .board-col { flex: 0 0 320px; background: #f1f5f9; border-radius: 12px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .board-col-header { font-size: 18px; font-weight: bold; color: var(--text-main); border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .feed-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; }
        .feed-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .feed-meta { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        .feed-content { font-size: 13px; line-height: 1.6; color: var(--text-main); }
        .feed-footer { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9; align-items: center; }
        .btn-like { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 5px; transition: 0.1s; }
        .btn-like.liked { color: #e11d48; } .btn-like:active { transform: scale(1.2); }
        #restore-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: white; padding: 12px 24px; border-radius: 30px; z-index: 9999; font-weight: bold; display: flex; align-items: center; gap: 15px; transition: all 0.5s; }
        #restore-toast.minimizing { top: calc(100vh - 80px); left: calc(100vw - 40px); transform: scale(0.1); opacity: 0; pointer-events: none; }
        .batch-checkbox { width: 22px; height: 22px; background: white; border: 2px solid #cbd5e1; border-radius: 6px; cursor: pointer; position: relative; appearance: none; transition: 0.2s; vertical-align: middle; }
        .batch-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .batch-checkbox:checked::after { content: '✔'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: bold; }
        .multi-tag-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 10px; min-height: 36px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; align-items: center; cursor: pointer; }
        .multi-tag-item { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-flex; align-items: center; gap: 6px; }
        .tag-remove-btn { cursor: pointer; font-weight: bold; opacity: 0.6; } .tag-remove-btn:hover { opacity: 1; color: var(--danger); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header-bar"><h1 class="header-title">📷 縮時相機管理</h1></div>
    <div class="tabs">
        <button id="tab-btn-assets" class="tab-btn active" onclick="window.switchTab('assets')">資產 (0)</button>
        <button id="tab-btn-list" class="tab-btn" onclick="window.switchTab('list')">列表</button>
        <button id="tab-btn-feed" class="tab-btn" onclick="window.switchTab('feed')">貼文</button>
    </div>
    
    <div id="shared-toolbar" style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; background: white; padding: 10px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <div id="filter-container-wrapper" style="position: relative; display: none; margin-right: auto;">
            <button class="btn-secondary" onclick="window.toggleFilterPanel(event)" id="filter-btn-text" style="background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; font-weight: bold; color: var(--primary);">🏷️ 專案過濾 (載入中...) ▼</button>
            <div class="custom-dropdown-panel" id="opt-filter-panel" style="position: absolute; top: 100%; left: 0; width: 300px; padding: 15px; z-index: 3100; display: none;" onclick="event.stopPropagation()">
                <div style="font-size:13px; color:var(--text-muted); margin-bottom:12px; font-weight:bold; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px;">☑️ 勾選顯示的專案</div>
                <div id="filter-checkboxes" style="display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto;"></div>
            </div>
        </div>
        <div id="asset-sort-wrapper" style="display: flex; align-items: center; gap: 8px;">
            <label style="font-size: 14px; font-weight: bold; color: var(--text-muted); margin:0;">排序：</label>
            <select id="asset-sort-select" onchange="window.renderAssets()" style="border: none; outline: none; font-size: 15px; font-weight: bold; color: var(--primary); cursor: pointer; background: transparent;">
                <option value="name">🔢 依序號</option><option value="status">🚦 依狀態</option><option value="project">🏷️ 依使用專案</option><option value="sn">🔤 依資產編號</option>
            </select>
        </div>
    </div>

    <div id="loading-msg" style="text-align: center; color: var(--text-muted); padding: 50px; font-size: 18px;">⏳ 資料讀取與驗證中...</div>

    <div id="view-assets" class="view active"><div class="grid-nav" id="assets-grid"></div></div>
    <div id="view-list" class="view">
        <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 15px; background: #fef2f2; padding: 10px 20px; border-radius: 8px; border: 1px dashed #fca5a5;">
            <button class="btn-danger" onclick="window.batchDeleteCams()">🗑️ 批次刪除勾選紀錄</button>
            <span style="font-size: 13px; color: #991b1b; font-weight: bold;">※ 勾選下方列表最左側的白色方格，可一次清理多筆不要的空白機台或紀錄。</span>
        </div>
        <div class="table-container"><table class="notion-table"><thead><tr><th style="width: 40px;"><input type="checkbox" id="cb-select-all" class="batch-checkbox" onchange="window.toggleAllCams(this)"></th><th style="width: 60px;">🗑️ 刪除</th><th>@ 專案</th><th>Aa 機台名稱</th><th>📍 地點</th><th>🔌 電源</th><th>🔧 工項</th><th>🕒 檢查時間</th><th>🔋 (%)</th><th>💾 容量</th><th>👥 建立人</th></tr></thead><tbody id="list-tbody"></tbody></table></div>
    </div>
    <div id="view-feed" class="view"><div class="board-container" id="feed-board"></div></div>
</div>

<div id="restore-toast" style="display:none;"><span id="restore-toast-text"></span><button class="btn-primary" onclick="window.restoreLastRecord()" style="background:var(--warning);">↩️ 復原</button></div>
<div class="fab-container" id="fab-container" style="bottom: 30px; right: 30px;">
    <div class="fab-menu" id="fab-menu">
        <button class="fab-item" id="fab-restore-item" style="display:none; color:var(--warning);" onclick="window.restoreLastRecord()">♻️ 復原紀錄</button>
        <button class="fab-item" onclick="$('excel-upload').click()">📥 從 Excel 匯入覆蓋</button>
        <button class="fab-item" onclick="window.openCameraModal()">➕ 新增相機資產</button>
    </div>
    <button class="fab-btn" onclick="window.toggleFabMenu(event)">＋</button>
</div>
<input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" style="display:none;" onchange="window.handleExcelUpload(event)">

<!-- Modal: 相機資產編輯 -->
<div id="camera-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeCameraModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span id="camera-modal-title">📦 新增相機資產</span><button class="btn-close" onclick="window.closeCameraModal()">×</button></div>
        <div class="form-group"><label>所屬專案</label><div class="custom-dropdown-btn" onclick="window.toggleDropdown('opt-project', event)"><span id="disp-opt-project">閒置</span><span>▼</span></div><div class="custom-dropdown-panel" id="opt-project-panel" onclick="event.stopPropagation()"><div class="dropdown-search-row"><input type="text" id="opt-project-input" placeholder="新增或搜尋專案..."><button class="btn-primary" onclick="window.addOption('project', event)">➕</button></div><div class="dropdown-list" id="opt-project-list"></div></div></div>
        <div class="form-group"><label>機台名稱 (數字編號)</label><input type="text" id="cam-name" placeholder="例如：14"></div>
        <div class="form-group" style="display:flex; gap:10px;"><div style="flex:1;"><label>品牌</label><input type="text" id="cam-brand" placeholder="Brinno"></div><div style="flex:1;"><label>型號</label><input type="text" id="cam-model" placeholder="TLC2000"></div></div>
        <div class="form-group"><label>資產編號 (SN)</label><input type="text" id="cam-sn" placeholder="N/A"></div><div class="form-group"><label>購入日</label><input type="date" id="cam-date"></div>
        <div class="modal-footer" style="justify-content: space-between;"><button id="btn-delete-camera" class="btn-danger" style="display:none;" onclick="window.deleteCameraAsset(currentEditCamId)">🗑️ 刪除</button><div style="display:flex; gap:10px;"><button class="btn-secondary" onclick="window.closeCameraModal()">取消</button><button class="btn-primary" onclick="window.saveCamera()">儲存</button></div></div>
    </div>
</div>

<!-- Modal: 巡檢紀錄表單 -->
<div id="record-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeRecordModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span id="record-modal-title">📝 紀錄狀態</span><button class="btn-close" onclick="window.closeRecordModal()">×</button></div>
        <div style="font-size:13px; color:var(--primary); font-weight:bold; margin-bottom:15px;" id="record-target-name"></div>
        <div class="form-group"><label>地點 (可多選)</label><div class="multi-tag-container" onclick="window.toggleDropdown('opt-location', event)"><div id="multi-tags-location" style="flex:1; display:flex; flex-wrap:wrap; gap:5px;"></div><span>▼</span></div><div class="custom-dropdown-panel" id="opt-location-panel" onclick="event.stopPropagation()"><div class="dropdown-search-row"><input type="text" id="opt-location-input" placeholder="新增地點..."><button class="btn-primary" onclick="window.addOption('location', event)">➕</button></div><div class="dropdown-list" id="opt-location-list"></div></div></div>
        <div class="form-group" style="display:flex; gap:10px;"><div style="flex:1;"><label>電量 (%)</label><input type="number" id="rec-battery" placeholder="100" min="0" max="100"></div><div style="flex:1;"><label>容量</label><div class="custom-dropdown-btn" onclick="window.toggleDropdown('opt-capacity', event)"><span id="disp-opt-capacity">64GB</span><span>▼</span></div><div class="custom-dropdown-panel" id="opt-capacity-panel" onclick="event.stopPropagation()"><div class="dropdown-search-row"><input type="text" id="opt-capacity-input" placeholder="新增容量..."><button class="btn-primary" onclick="window.addOption('capacity', event)">➕</button></div><div class="dropdown-list" id="opt-capacity-list"></div></div></div></div>
        <div class="form-group"><label>工項 (可多選)</label><div class="multi-tag-container" onclick="window.toggleDropdown('opt-task', event)"><div id="multi-tags-task" style="flex:1; display:flex; flex-wrap:wrap; gap:5px;"></div><span>▼</span></div><div class="custom-dropdown-panel" id="opt-task-panel" onclick="event.stopPropagation()"><div class="dropdown-search-row"><input type="text" id="opt-task-input" placeholder="新增工項..."><button class="btn-primary" onclick="window.addOption('task', event)">➕</button></div><div class="dropdown-list" id="opt-task-list"></div></div></div>
        <div class="form-group"><label>電源狀態</label><select id="rec-power"><option value="開">🟢 開機</option><option value="關">🔴 關機</option></select></div>
        <div class="form-group"><label>備註 (上限 100 字)</label><textarea id="rec-remarks" rows="3" maxlength="100" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; resize:vertical; font-family:inherit;"></textarea></div>
        <div class="modal-footer"><button class="btn-secondary" onclick="window.closeRecordModal()">取消</button><button class="btn-primary" onclick="window.saveRecord()">發佈紀錄</button></div>
    </div>
</div>

<script type="module">
    import { collection, onSnapshot, doc, setDoc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signInWithPopup, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 縮寫神器
    const $ = id => document.getElementById(id);
    const $$ = sel => document.querySelectorAll(sel);

    let db, auth, provider, cameras = [], records = [];
    let options = { project: ['閒置', '無法使用'], location: [], capacity: ['64GB', '128GB'], task: ['換電池', '換位置', '收SD卡'] };
    let currentTab = 'assets', currentEditCamId = null, currentRecordCamId = null, currentUserProfile = {};
    let currentSelectedTags = { location: [], task: [] };
    let activeFilters = JSON.parse(localStorage.getItem('timelapse_project_filter'));
    if (!Array.isArray(activeFilters)) activeFilters = null;
    let deletedRecordsQueue = [], restoreTimerInt = null, restoreTimeLeft = 0;

    const isRealEnvironment = window.location.hostname.length > 0 && !window.location.href.startsWith('blob:');

    if (isRealEnvironment) {
        import('./js/firebase-config.js').then(m => { db = m.db; auth = m.auth; provider = m.provider; initializeApp(); }).catch(e => showError('載入設定檔失敗：' + e.message));
    } else { showError('⚠️ 線上預覽模式無法跨檔案載入，請於本機 VS Code (Live Server) 中測試。'); }

    function showError(msg) { if($('loading-msg')) { $('loading-msg').innerHTML = msg; $('loading-msg').style.color = 'var(--danger)'; } }

    function initializeApp() {
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                $('loading-msg').innerHTML = `⛔ 尚未登入<br><br><button id="btn-login" class="btn-primary" style="padding:10px 20px; font-size:16px; border-radius:30px; margin-top:10px;">Google 登入</button>`;
                $('loading-msg').style.color = 'var(--danger)';
                $('btn-login').onclick = async () => {
                    try { await signInWithPopup(auth, provider); } 
                    catch (e) { 
                        if (e.code === 'auth/unauthorized-domain') {
                            if (window.location.hostname.includes('127.0.0.1') || window.location.hostname.includes('localhost')) { alert('啟用訪客預覽模式！'); await signInAnonymously(auth); } 
                            else alert('登入失敗：網址未獲 Firebase 授權！');
                        } else if (e.code !== 'auth/popup-closed-by-user') alert("登入失敗：" + e.message); 
                    }
                }; return;
            }
            $('loading-msg').style.display = 'none';
            currentUserProfile = { name: user.displayName || '訪客', email: user.email || 'anonymous', avatar: user.photoURL || 'https://via.placeholder.com/32' };
            fetchData();
        });
    }

    function fetchData() {
        onSnapshot(doc(db, "settings", "timelapse_options"), (s) => {
            if (s.exists()) options = { ...options, ...s.data() }; else setDoc(doc(db, "settings", "timelapse_options"), options);
            renderFilterUI();
        });
        onSnapshot(collection(db, "assets"), (s) => {
            cameras = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => a.category === '縮時相機' && a.item && a.item.trim() !== '');
            renderFilterUI(); window.renderCurrentView();
        });
        onSnapshot(collection(db, "timelapse_records"), (s) => {
            records = s.docs.map(d => ({ id: d.id, ...d.data() })); window.renderCurrentView();
        });
    }

    function renderFilterUI() {
        let allProjs = new Set(options.project || []); cameras.forEach(c => allProjs.add(c.project || '閒置')); allProjs = Array.from(allProjs).sort();
        if (!activeFilters) { activeFilters = [...allProjs]; localStorage.setItem('timelapse_project_filter', JSON.stringify(activeFilters)); }
        const ctn = $('filter-checkboxes'); ctn.innerHTML = '';
        allProjs.forEach(p => {
            const chk = activeFilters.includes(p) ? 'checked' : '';
            ctn.innerHTML += `<label style="display:flex; align-items:center; gap:10px; padding:8px 12px; cursor:pointer; border-radius:8px; background:#f8fafc; border:1px solid #e2e8f0;"><input type="checkbox" class="global-filter-cb batch-checkbox" value="${p}" ${chk} onchange="window.updateFilters()"><span style="font-weight:bold; font-size:14px;">${p}</span></label>`;
        });
        updateFilterDisplay();
    }

    window.updateFilters = () => {
        activeFilters = Array.from($$('.global-filter-cb')).filter(cb => cb.checked).map(cb => cb.value);
        localStorage.setItem('timelapse_project_filter', JSON.stringify(activeFilters)); updateFilterDisplay(); window.renderCurrentView(); 
    };

    function updateFilterDisplay() {
        const d = $('filter-btn-text'); if (!d) return;
        if (activeFilters.length === 0) d.innerHTML = '🏷️ 專案過濾 (全隱藏) ▼';
        else if (activeFilters.length <= 2) d.innerHTML = `🏷️ 過濾: ${activeFilters.join(', ')} ▼`;
        else d.innerHTML = `🏷️ 過濾專案 (顯示 ${activeFilters.length} 項) ▼`;
    }

    window.toggleFilterPanel = (e) => {
        if(e) e.stopPropagation(); $$('.custom-dropdown-panel').forEach(p => { if(p.id !== 'opt-filter-panel') p.classList.remove('active'); });
        $('opt-filter-panel').classList.toggle('active');
    };

    window.toggleFabMenu = (e) => { if(e) e.stopPropagation(); $('fab-container').classList.toggle('active'); $('fab-menu').classList.toggle('active'); };

    window.handleExcelUpload = async (e) => {
        const f = e.target.files[0]; if (!f) return; e.target.value = '';
        const ld = $('loading-msg'); ld.innerHTML = '⏳ 正在為您解析並覆蓋 Excel 資料...'; ld.style.display = 'block';
        const r = new FileReader();
        r.onload = async (evt) => {
            try {
                const j = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, { type: 'binary' }).Sheets[XLSX.read(evt.target.result, { type: 'binary' }).SheetNames[0]], { header: 1 });
                let hi = j.findIndex(row => row.includes('編號') || row.includes('品牌')); if (hi === -1) hi = 0; 
                const h = j[hi], rows = j.slice(hi + 1), ops = []; let uc = 0, ac = 0;

                for (const row of rows) {
                    if (!row || row.length === 0) continue;
                    const rd = {}; h.forEach((hk, i) => { if(hk) rd[hk.trim()] = row[i]; });
                    const cn = rd['編號'] ? String(rd['編號']).trim() : ''; if (!cn || cn.toLowerCase() === 'undefined') continue;
                    const dt = { type: 'public', category: '縮時相機', assetType: 'fixed', office_id: 'TIMELAPSE_GLOBAL', item: cn, project: rd['現使用專案'] || '閒置', brand: rd['品牌'] || 'N/A', model: rd['型號'] || 'N/A', sn: String(rd['資產編號'] || 'N/A'), purchase_date: String(rd['移入(PMO)日期'] || '') };
                    const ex = cameras.find(c => String(c.item) === String(cn));
                    if (ex) { ops.push(updateDoc(doc(db, "assets", ex.id), dt)); uc++; } else { ops.push(addDoc(collection(db, "assets"), dt)); ac++; }
                }
                if (ops.length > 0) { await Promise.all(ops); alert(`🎉 匯入完成！\n新增 ${ac} 筆，覆蓋 ${uc} 筆`); } else alert('沒有匯入任何資料。');
            } catch(err) { alert('匯入失敗：' + err.message); } finally { ld.style.display = 'none'; }
        }; r.readAsBinaryString(f);
        $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active');
    };

    window.switchTab = (tab) => {
        currentTab = tab; $$('.tab-btn').forEach(b => b.classList.remove('active')); $(`tab-btn-${tab}`).classList.add('active');
        $$('.view').forEach(v => v.classList.remove('active')); $(`view-${tab}`).classList.add('active');
        $('filter-container-wrapper').style.display = (tab === 'list' || tab === 'feed') ? 'block' : 'none';
        $('asset-sort-wrapper').style.display = (tab === 'assets') ? 'flex' : 'none';
        window.renderCurrentView();
    };

    window.renderCurrentView = () => {
        $('tab-btn-assets').innerText = `資產 (${cameras.length})`;
        if (currentTab === 'assets') window.renderAssets(); else if (currentTab === 'list') window.renderList(); else if (currentTab === 'feed') window.renderFeed();
    };

    window.renderAssets = () => {
        const grid = $('assets-grid'); grid.innerHTML = '';
        if (cameras.length === 0) return grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#94a3b8; padding:30px;">尚無縮時相機</div>';
        
        const sb = $('asset-sort-select').value;
        const sf = (a, b) => { if (sb === 'name') return (a.item||'').localeCompare(b.item||'', undefined, {numeric: true}); if (sb === 'status') return (a.status||'').localeCompare(b.status||''); if (sb === 'project') return (a.project||'').localeCompare(b.project||''); return (a.sn||'').localeCompare(b.sn||''); };
        const ac = [], ar = []; cameras.forEach(c => c.project === '無法使用' ? ar.push(c) : ac.push(c));
        ac.sort(sf); ar.sort(sf);

        const rCard = (cam, isA) => {
            const c = document.createElement('div'); c.className = isA ? 'nav-card no-hover' : 'nav-card';
            if (isA) { c.style.opacity = '0.6'; c.style.background = '#f8fafc'; c.title = '該縮時已停用'; } else { c.onclick = () => window.openRecordModal(cam.id); c.title = '點擊新增紀錄'; }
            c.innerHTML = `<div style="position:absolute; top:12px; left:15px;" class="badge tag">${cam.project || '閒置'}</div><button class="card-edit-btn" onclick="event.stopPropagation(); window.openCameraModal('${cam.id}')">✏️</button><h2 style="margin-top:30px; font-size:24px; color:${isA ? '#64748b' : 'var(--text-main)'};">📸 縮時 ${cam.item || '未命名'}</h2><div class="detail-info" style="opacity:1; max-height:none; text-align:center; margin-top:10px;"><div>品牌：${cam.brand || 'N/A'} | 型號：${cam.model || 'N/A'}</div><div style="font-family:monospace; color:var(--danger); font-weight:bold;">SN: ${cam.sn || 'N/A'}</div></div>`;
            grid.appendChild(c);
        };
        ac.forEach(c => rCard(c, false));
        if (ar.length > 0) { grid.innerHTML += `<div style="grid-column: 1/-1; margin-top: 30px;"><h3 style="border-bottom: 2px dashed #94a3b8; padding-bottom: 10px; color: #64748b;">🗄️ 封存區域 (已停用)</h3></div>`; ar.forEach(c => rCard(c, true)); }
    };

    const fmtTags = (val, bg, tc) => (!val || val.length === 0) ? '-' : (Array.isArray(val) ? val : [val]).map(v => `<span style="background:${bg}; color:${tc}; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold; margin:2px; display:inline-block;">${v}</span>`).join('');

    window.renderList = () => {
        const tb = $('list-tbody'); tb.innerHTML = ''; $('cb-select-all').checked = false;
        const fc = cameras.filter(c => activeFilters.includes(c.project || '閒置')).sort((a,b) => (a.project||'').localeCompare(b.project||''));
        if(fc.length === 0) return tb.innerHTML = '<tr><td colspan="11" style="text-align:center; color:#94a3b8; padding:30px;">在此過濾條件下沒有機台</td></tr>';

        fc.forEach(cam => {
            const lt = records.filter(r => r.cameraId === cam.id).sort((a,b) => b.createdAt.localeCompare(a.createdAt))[0] || {};
            const isA = cam.project === '無法使用'; const tr = document.createElement('tr'); tr.className = isA ? 'archived-row' : ''; if (isA) tr.title = "該縮時已停用";
            tr.innerHTML = `<td style="text-align:center;"><input type="checkbox" class="cb-cam-row batch-checkbox" value="${cam.id}"></td><td style="text-align:center;"><button class="btn-danger" style="padding:6px 12px; font-size:12px;" onclick="window.deleteCameraAsset('${cam.id}', event)">🗑️</button></td><td><span class="badge tag">${cam.project || '閒置'}</span></td><td><b style="color:${isA ? '#991b1b' : 'var(--primary)'}; font-size:16px;">📸 縮時 ${cam.item || '?'}</b></td><td>${fmtTags(lt.location, '#e0e7ff', '#4f46e5')}</td><td>${lt.power==='開'?'<span class="badge power-on">開</span>':lt.power==='關'?'<span class="badge power-off">關</span>':'-'}</td><td>${fmtTags(lt.task, '#fef08a', '#854d0e')}</td><td style="font-size:12px;">${lt.createdAt ? new Date(lt.createdAt).toLocaleString('zh-TW', {hour12:false}) : '-'}</td><td style="font-family:monospace; font-weight:bold; font-size:16px;">${lt.battery ? lt.battery+'%' : '-'}</td><td style="font-size:12px;">${lt.capacity || '-'}</td><td>${lt.creatorName ? `<img src="${lt.creatorAvatar}" style="width:20px; border-radius:50%; vertical-align:middle;"> ${lt.creatorName}` : '-'}</td>`;
            tb.appendChild(tr);
        });
    };

    window.renderFeed = () => {
        const bd = $('feed-board'); bd.innerHTML = '';
        const ap = [...new Set(cameras.map(c => c.project || '閒置'))].filter(p => activeFilters.includes(p)).slice(0, 4);
        if(ap.length === 0) return bd.innerHTML = '<div style="width:100%; text-align:center; color:#94a3b8; padding:30px;">在此過濾條件下無專案貼文</div>';

        ap.forEach(proj => {
            const col = document.createElement('div'); col.className = 'board-col'; col.innerHTML = `<div class="board-col-header"><span>🏷️ ${proj}</span><span style="font-size:12px; background:white; padding:2px 8px; border-radius:12px;">專案動態</span></div>`;
            const pr = records.filter(r => r.project === proj).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
            if(pr.length === 0) col.innerHTML += `<div style="text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;">尚無紀錄</div>`;
            pr.forEach(rec => {
                const isA = cameras.find(c => c.id === rec.cameraId)?.project === '無法使用'; const lkd = rec.likes && rec.likes.includes(currentUserProfile.email);
                col.innerHTML += `<div class="feed-card ${isA ? 'archived-card' : ''}" ${isA ? 'title="該縮時已停用"' : ''}><div class="feed-header"><img src="${rec.creatorAvatar}" class="feed-avatar"><div class="feed-meta"><b>${rec.creatorName}</b><br>${new Date(rec.createdAt).toLocaleString('zh-TW', {hour12:false})}</div></div><div class="feed-content"><p style="font-weight:bold; margin:0 0 5px 0;">📸 縮時 ${rec.cameraName}</p><p style="margin:0 0 5px 0;">📍 ${fmtTags(rec.location, '#e0e7ff', '#4f46e5')} | 🔋 ${rec.battery}% | 💾 ${rec.capacity}</p><p style="margin:0 0 5px 0;">狀態：${rec.power==='開'?'🟢開':'🔴關'} | 🔧 ${fmtTags(rec.task, '#fef08a', '#854d0e')}</p>${rec.remarks ? `<div style="background:#f8fafc; padding:8px; border-radius:6px; margin-top:8px; font-size:12px;">${rec.remarks}</div>` : ''}</div><div class="feed-footer"><button class="btn-like ${lkd ? 'liked' : ''}" onclick="window.toggleLike('${rec.id}')">${lkd ? '❤️' : '🤍'} ${rec.likes ? rec.likes.length : 0}</button><button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="window.deleteSingleRecord('${rec.id}', event)">🗑️ 刪除</button></div></div>`;
            }); bd.appendChild(col);
        });
    };

    window.toggleLike = async (rId) => { const r = records.find(x => x.id === rId); if(!r) return; let lk = r.likes || []; if(lk.includes(currentUserProfile.email)) lk = lk.filter(e => e !== currentUserProfile.email); else lk.push(currentUserProfile.email); await setDoc(doc(db, "timelapse_records", rId), { likes: lk }, { merge: true }); };

    window.toggleAllCams = (el) => $$('.cb-cam-row').forEach(cb => cb.checked = el.checked);

    window.deleteCameraAsset = async (cId, e) => { if(e) e.stopPropagation(); if(confirm('確定刪除此相機及所有紀錄？\n(24小時內可復原)')) await processDel([cId]); };
    window.batchDeleteCams = async () => { const sel = Array.from($$('.cb-cam-row:checked')).map(cb => cb.value); if (sel.length === 0) return alert('未勾選項目！'); if(confirm(`批次刪除這 ${sel.length} 個相機？`)) await processDel(sel); };

    async function processDel(ids) {
        const bData = [], ops = [];
        ids.forEach(cId => { const c = cameras.find(x => x.id === cId); if (c) { const cd = { ...c }; delete cd.id; const cr = records.filter(r => r.cameraId === cId).map(r => { const d = { ...r }; delete d.id; return { id: r.id, data: d }; }); bData.push({ camId: cId, camData: cd, camRecs: cr }); ops.push(deleteDoc(doc(db, "assets", cId))); cr.forEach(r => ops.push(deleteDoc(doc(db, "timelapse_records", r.id)))); } });
        deletedRecordsQueue.push({ type: 'camera_batch', data: bData }); await Promise.all(ops);
        restoreTimeLeft = Math.min((restoreTimeLeft <= 0 ? 0 : restoreTimeLeft) + 15 + ((ids.length - 1) * 5), 60); showRestoreToast();
    }

    window.deleteSingleRecord = async (rId, e) => {
        if(e) e.stopPropagation(); if(!confirm('確定刪除此貼文？')) return;
        const r = records.find(x => x.id === rId); if(!r) return;
        const dCopy = { ...r }; delete dCopy.id; deletedRecordsQueue.push({ type: 'single_record', id: rId, data: dCopy });
        await deleteDoc(doc(db, "timelapse_records", rId)); restoreTimeLeft = Math.min((restoreTimeLeft <= 0 ? 0 : restoreTimeLeft) + 15, 60); showRestoreToast();
    };

    function showRestoreToast() {
        $('restore-toast').style.display = 'flex'; $('restore-toast').classList.remove('minimizing'); $('fab-restore-item').style.display = 'none'; updateRtText();
        clearInterval(restoreTimerInt);
        restoreTimerInt = setInterval(() => {
            restoreTimeLeft--; updateRtText();
            if (restoreTimeLeft <= 0) { clearInterval(restoreTimerInt); $('restore-toast').classList.add('minimizing'); setTimeout(() => { $('restore-toast').style.display = 'none'; if (deletedRecordsQueue.length > 0) { $('fab-restore-item').style.display = 'block'; $('fab-restore-item').innerText = `♻️ 復原紀錄 (${deletedRecordsQueue.length})`; } }, 500); }
        }, 1000);
    }
    function updateRtText() { if($('restore-toast-text')) $('restore-toast-text').innerText = `已刪除待命中 ( ${restoreTimeLeft}s 後隱藏 )`; }

    window.restoreLastRecord = async () => {
        if (deletedRecordsQueue.length === 0) return; const item = deletedRecordsQueue.pop(); const ops = [];
        if (item.type === 'camera_batch') item.data.forEach(b => { ops.push(setDoc(doc(db, "assets", b.camId), b.camData)); b.camRecs.forEach(r => ops.push(setDoc(doc(db, "timelapse_records", r.id), r.data))); });
        else ops.push(setDoc(doc(db, "timelapse_records", item.id), item.data));
        await Promise.all(ops);
        if (deletedRecordsQueue.length > 0) { updateRtText(); if ($('fab-restore-item').style.display === 'block') $('fab-restore-item').innerText = `♻️ 復原紀錄 (${deletedRecordsQueue.length})`; } 
        else { clearInterval(restoreTimerInt); restoreTimeLeft = 0; $('restore-toast').style.display = 'none'; $('fab-restore-item').style.display = 'none'; }
    };

    window.toggleDropdown = (t, e) => { if(e) e.stopPropagation(); $$('.custom-dropdown-panel').forEach(p => { if(p.id !== `${t}-panel`) p.classList.remove('active'); }); $(`${t}-panel`).classList.toggle('active'); if($(`${t}-panel`).classList.contains('active') && t !== 'opt-filter') { window.renderOptionsList(t.replace('opt-', '')); $(`${t}-input`).focus(); } };
    window.renderMultiSelectTags = (k) => { const c = $(`multi-tags-${k}`); if(!c) return; if (currentSelectedTags[k].length === 0) c.innerHTML = `<span style="color:var(--text-muted); font-size:14px;">選擇...</span>`; else c.innerHTML = currentSelectedTags[k].map(v => `<span class="multi-tag-item" style="background:${k==='location'?'#e0e7ff':'#fef08a'}; color:${k==='location'?'#4f46e5':'#854d0e'};">${v} <span class="tag-remove-btn" onclick="event.stopPropagation(); window.removeMultiSelectTag('${k}', '${v}')">×</span></span>`).join(''); };
    window.removeMultiSelectTag = (k, v) => { currentSelectedTags[k] = currentSelectedTags[k].filter(x => x !== v); window.renderMultiSelectTags(k); };

    window.renderOptionsList = (k) => {
        if(k === 'filter') return; const iv = $(`opt-${k}-input`).value.toLowerCase(); const ld = $(`opt-${k}-list`); ld.innerHTML = '';
        (options[k] || []).filter(v => v.toLowerCase().includes(iv)).forEach(val => {
            const d = document.createElement('div'); d.className = 'dropdown-item'; d.innerHTML = `<span style="flex:1;">${val}</span><button class="dropdown-item-delete" onclick="event.stopPropagation(); window.delOption('${k}', '${val}')">×</button>`;
            d.querySelector('span').onclick = (e) => { if (k === 'location' || k === 'task') { e.stopPropagation(); if (!currentSelectedTags[k].includes(val)) { currentSelectedTags[k].push(val); window.renderMultiSelectTags(k); } } else { $(`disp-opt-${k}`).innerText = val; $(`opt-${k}-panel`).classList.remove('active'); } };
            ld.appendChild(d);
        });
    }

    window.addOption = async (k, e) => {
        if(e) e.stopPropagation(); const val = $(`opt-${k}-input`).value.trim(); if(!val) return; if(!options[k]) options[k] = []; if(options[k].includes(val)) return alert('選項已存在');
        options[k].push(val); await setDoc(doc(db, "settings", "timelapse_options"), options);
        if (k === 'location' || k === 'task') { if (!currentSelectedTags[k].includes(val)) currentSelectedTags[k].push(val); window.renderMultiSelectTags(k); $(`opt-${k}-input`).value = ''; window.renderOptionsList(k); } else { $(`disp-opt-${k}`).innerText = val; $(`opt-${k}-panel`).classList.remove('active'); }
    };
    window.delOption = async (k, val) => { if(!confirm(`刪除 ${val}？`)) return; options[k] = options[k].filter(v => v !== val); await setDoc(doc(db, "settings", "timelapse_options"), options); if (k === 'location' || k === 'task') { currentSelectedTags[k] = currentSelectedTags[k].filter(v => v !== val); window.renderMultiSelectTags(k); } window.renderOptionsList(k); };

    window.openCameraModal = (id = null) => {
        currentEditCamId = id; $('opt-project-input').value = '';
        if (id) { $('camera-modal-title').innerText = '📦 編輯相機'; $('btn-delete-camera').style.display = 'inline-block'; const c = cameras.find(x => x.id === id); $('disp-opt-project').innerText = c.project || '閒置'; $('cam-name').value = c.item || ''; $('cam-brand').value = c.brand || ''; $('cam-model').value = c.model || ''; $('cam-sn').value = c.sn || ''; $('cam-date').value = c.purchase_date || ''; } 
        else { $('camera-modal-title').innerText = '➕ 新增相機'; $('btn-delete-camera').style.display = 'none'; $('disp-opt-project').innerText = '閒置'; ['cam-name', 'cam-brand', 'cam-model', 'cam-sn', 'cam-date'].forEach(k => $(k).value = ''); }
        $('camera-modal-overlay').classList.add('active');
    };
    window.closeCameraModal = () => $('camera-modal-overlay').classList.remove('active');
    window.saveCamera = async () => {
        const n = $('cam-name').value.trim(); if(!n) return alert('機台名稱必填！');
        const dt = { type: 'public', category: '縮時相機', assetType: 'fixed', office_id: 'TIMELAPSE_GLOBAL', item: n, project: $('disp-opt-project').innerText, brand: $('cam-brand').value, model: $('cam-model').value, sn: $('cam-sn').value, purchase_date: $('cam-date').value };
        if(currentEditCamId) await setDoc(doc(db, "assets", currentEditCamId), dt, {merge:true}); else await addDoc(collection(db, "assets"), dt); window.closeCameraModal();
    };

    window.openRecordModal = (id) => {
        currentRecordCamId = id; const c = cameras.find(x => x.id === id); if(!c) return;
        $('record-target-name').innerText = `目標：📸 縮時 ${c.item} (${c.project || '閒置'})`;
        currentSelectedTags.location = []; currentSelectedTags.task = []; window.renderMultiSelectTags('location'); window.renderMultiSelectTags('task');
        $('rec-battery').value = ''; $('disp-opt-capacity').innerText = '64GB'; $('rec-power').value = '開'; $('rec-remarks').value = '';
        ['location', 'capacity', 'task'].forEach(k => { if($(`opt-${k}-input`)) $(`opt-${k}-input`).value = ''; });
        $('record-modal-overlay').classList.add('active');
    };
    window.closeRecordModal = () => $('record-modal-overlay').classList.remove('active');
    window.saveRecord = async () => {
        if(currentSelectedTags.location.length === 0) return alert('請選擇或新增至少一個地點！');
        const c = cameras.find(x => x.id === currentRecordCamId);
        await addDoc(collection(db, "timelapse_records"), { cameraId: c.id, cameraName: c.item, project: c.project || '閒置', location: currentSelectedTags.location, battery: $('rec-battery').value, capacity: $('disp-opt-capacity').innerText, power: $('rec-power').value, task: currentSelectedTags.task, remarks: $('rec-remarks').value, createdAt: new Date().toISOString(), likes: [], creatorName: currentUserProfile.name, creatorEmail: currentUserProfile.email, creatorAvatar: currentUserProfile.avatar });
        window.closeRecordModal();
    };

    window.addEventListener('click', () => { $$('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active'); });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') { $$('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); $$('.modal-overlay').forEach(m => m.classList.remove('active')); $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active'); } });
    $$('.custom-dropdown-panel input').forEach(inp => { inp.addEventListener('input', (e) => { if(e.target.id === 'opt-filter-input') return; window.renderOptionsList(e.target.id.replace('opt-', '').replace('-input', '')); }); });
</script>
</body>
</html>
