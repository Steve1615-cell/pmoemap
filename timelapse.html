<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮時相機管理 | PMO電子圖資系統</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 20px; }
        .header-bar { margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header-title { margin: 0; font-size: 45px; color: var(--primary); text-align: center; }
        
        /* 標籤切換列 */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .tab-btn { padding: 10px 30px; background: white; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Notion 風格資料表 */
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .notion-table { width: 100%; border-collapse: collapse; min-width: 900px; text-align: left; font-size: 14px; }
        .notion-table th { background: #f8fafc; color: var(--text-muted); font-weight: bold; padding: 12px 15px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
        .notion-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
        .notion-table tr:hover { background: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; white-space: nowrap; }
        .badge.power-on { background: #d1fae5; color: #059669; }
        .badge.power-off { background: #fee2e2; color: #e11d48; }
        .badge.tag { background: #e0e7ff; color: #4f46e5; border: 1px solid #c7d2fe; }

        /* 看板/專案動態牆 (Feed) */
        .board-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .board-col { flex: 0 0 320px; background: #f1f5f9; border-radius: 12px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .board-col-header { font-size: 18px; font-weight: bold; color: var(--text-main); border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .feed-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; }
        .feed-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .feed-meta { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        .feed-content { font-size: 13px; line-height: 1.6; color: var(--text-main); }
        .feed-footer { display: flex; justify-content: flex-end; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
        .btn-like { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 5px; transition: transform 0.1s; }
        .btn-like.liked { color: #e11d48; }
        .btn-like:active { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar">
        <h1 class="header-title">📷 縮時相機管理</h1>
    </div>

    <!-- 標籤切換列 -->
    <div class="tabs">
        <button id="tab-btn-assets" class="tab-btn active" onclick="switchTab('assets')">資產 (0)</button>
        <button id="tab-btn-list" class="tab-btn" onclick="switchTab('list')">列表</button>
        <button id="tab-btn-feed" class="tab-btn" onclick="switchTab('feed')">紀錄</button>
    </div>

    <div id="loading-msg" style="text-align: center; color: var(--text-muted); padding: 50px; font-size: 18px;">
        ⏳ 資料讀取與驗證中...
    </div>

    <!-- 視圖區塊 -->
    <div id="view-assets" class="view active"><div class="grid-nav" id="assets-grid"></div></div>
    <div id="view-list" class="view"><div class="table-container"><table class="notion-table"><thead><tr><th>@ 專案</th><th>Aa 機台名稱</th><th>📍 地點</th><th>🔌 電源</th><th>🔧 工項</th><th>🕒 檢查時間</th><th>🔋 (%)</th><th>💾 容量</th><th>👥 建立人</th></tr></thead><tbody id="list-tbody"></tbody></table></div></div>
    <div id="view-feed" class="view"><div class="board-container" id="feed-board"></div></div>
</div>

<!-- 懸浮新增按鈕 -->
<div class="fab-container active" style="bottom: 30px; right: 30px;">
    <button class="fab-btn" onclick="openCameraModal()">＋</button>
</div>

<!-- ================= Modal: 相機資產編輯 ================= -->
<div id="camera-modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeCameraModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span id="camera-modal-title">📦 新增相機資產</span><button class="btn-close" onclick="closeCameraModal()">×</button></div>
        <div class="form-group">
            <label>所屬專案</label>
            <div class="custom-dropdown-btn" onclick="toggleDropdown('opt-project', event)"><span id="disp-opt-project">閒置</span><span style="font-size:12px; color:var(--text-muted);">▼</span></div>
            <div class="custom-dropdown-panel" id="opt-project-panel">
                <div class="dropdown-search-row"><input type="text" id="opt-project-input" placeholder="新增或搜尋專案..." onclick="event.stopPropagation()"><button class="btn-primary" onclick="addOption('project', event)">➕</button></div>
                <div class="dropdown-list" id="opt-project-list"></div>
            </div>
        </div>
        <div class="form-group"><label>機台名稱 (數字編號)</label><input type="text" id="cam-name" placeholder="例如：14"></div>
        <div class="form-group" style="display:flex; gap:10px;"><div style="flex:1;"><label>品牌</label><input type="text" id="cam-brand" placeholder="例如：Brinno"></div><div style="flex:1;"><label>型號</label><input type="text" id="cam-model" placeholder="例如：TLC2000"></div></div>
        <div class="form-group"><label>資產編號 (SN)</label><input type="text" id="cam-sn" placeholder="N/A"></div>
        <div class="form-group"><label>購入日</label><input type="date" id="cam-date"></div>
        <div class="modal-footer" style="justify-content: space-between;"><button id="btn-delete-camera" class="btn-danger" style="display:none;" onclick="deleteCamera()">🗑️ 刪除</button><div style="display:flex; gap:10px;"><button class="btn-secondary" onclick="closeCameraModal()">取消</button><button class="btn-primary" onclick="saveCamera()">儲存</button></div></div>
    </div>
</div>

<!-- ================= Modal: 巡檢紀錄表單 ================= -->
<div id="record-modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeRecordModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span id="record-modal-title">📝 紀錄狀態</span><button class="btn-close" onclick="closeRecordModal()">×</button></div>
        <div style="font-size:13px; color:var(--primary); font-weight:bold; margin-bottom:15px;" id="record-target-name"></div>
        <div class="form-group">
            <label>地點</label>
            <div class="custom-dropdown-btn" onclick="toggleDropdown('opt-location', event)"><span id="disp-opt-location">選擇地點...</span><span style="font-size:12px; color:var(--text-muted);">▼</span></div>
            <div class="custom-dropdown-panel" id="opt-location-panel">
                <div class="dropdown-search-row"><input type="text" id="opt-location-input" placeholder="新增地點..." onclick="event.stopPropagation()"><button class="btn-primary" onclick="addOption('location', event)">➕</button></div>
                <div class="dropdown-list" id="opt-location-list"></div>
            </div>
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1;"><label>電量 (%)</label><input type="number" id="rec-battery" placeholder="100" min="0" max="100"></div>
            <div style="flex:1;">
                <label>容量</label>
                <div class="custom-dropdown-btn" onclick="toggleDropdown('opt-capacity', event)"><span id="disp-opt-capacity">64GB</span><span style="font-size:12px; color:var(--text-muted);">▼</span></div>
                <div class="custom-dropdown-panel" id="opt-capacity-panel">
                    <div class="dropdown-search-row"><input type="text" id="opt-capacity-input" placeholder="新增容量..." onclick="event.stopPropagation()"><button class="btn-primary" onclick="addOption('capacity', event)">➕</button></div>
                    <div class="dropdown-list" id="opt-capacity-list"></div>
                </div>
            </div>
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1;"><label>電源狀態</label><select id="rec-power"><option value="開">🟢 開機</option><option value="關">🔴 關機</option></select></div>
            <div style="flex:1;">
                <label>工項</label>
                <div class="custom-dropdown-btn" onclick="toggleDropdown('opt-task', event)"><span id="disp-opt-task">換電池</span><span style="font-size:12px; color:var(--text-muted);">▼</span></div>
                <div class="custom-dropdown-panel" id="opt-task-panel">
                    <div class="dropdown-search-row"><input type="text" id="opt-task-input" placeholder="新增工項..." onclick="event.stopPropagation()"><button class="btn-primary" onclick="addOption('task', event)">➕</button></div>
                    <div class="dropdown-list" id="opt-task-list"></div>
                </div>
            </div>
        </div>
        <div class="form-group"><label>備註 (上限 100 字)</label><textarea id="rec-remarks" rows="3" maxlength="100" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; resize:vertical; font-family:inherit;"></textarea></div>
        <div class="modal-footer"><button class="btn-secondary" onclick="closeRecordModal()">取消</button><button class="btn-primary" onclick="saveRecord()">發佈紀錄</button></div>
    </div>
</div>

<script type="module">
    import { collection, onSnapshot, doc, setDoc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signInWithPopup, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let db, auth, provider;
    let cameras = [];
    let records = [];
    let options = { project: ['閒置'], location: [], capacity: ['64GB', '128GB'], task: ['換電池', '換位置', '收SD卡'] };
    
    let currentTab = 'assets';
    let currentEditCamId = null;
    let currentRecordCamId = null;
    let currentUserProfile = {};

    // 偵測是否為實際的開發或發布環境 (過濾掉 Canvas 的 Blob/Iframe 預覽環境以防 TypeError)
    const isRealEnvironment = window.location.hostname.length > 0 && !window.location.href.startsWith('blob:');

    if (isRealEnvironment) {
        import('./js/firebase-config.js')
            .then(module => {
                db = module.db;
                auth = module.auth;
                provider = module.provider;
                initializeApp();
            })
            .catch(err => {
                showError('載入設定檔失敗：' + err.message);
            });
    } else {
        showError('⚠️ 線上預覽模式無法跨檔案載入，請於本機 VS Code (Live Server) 中測試與檢視。');
    }

    function showError(msg) {
        const loadingMsg = document.getElementById('loading-msg');
        if (loadingMsg) {
            loadingMsg.innerHTML = msg;
            loadingMsg.style.color = 'var(--danger)';
        }
    }

    function initializeApp() {
        // ======== 初始化與驗證 ========
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById('loading-msg').innerHTML = `⛔ 尚未登入<br><br><button id="btn-login" class="btn-primary" style="padding:10px 20px; font-size:16px; border-radius:30px; margin-top:10px;">Google 登入</button>`;
                document.getElementById('loading-msg').style.color = 'var(--danger)';
                document.getElementById('btn-login').onclick = async () => {
                    try { 
                        await signInWithPopup(auth, provider); 
                    } catch (e) { 
                        if (e.code === 'auth/unauthorized-domain') {
                            if (window.location.hostname.includes('127.0.0.1') || window.location.hostname.includes('localhost')) {
                                alert('本地端無法使用 Google 登入，為您啟用訪客預覽模式！');
                                await signInAnonymously(auth);
                            } else {
                                alert('登入失敗：網址未獲 Firebase 授權！');
                            }
                        } else if (e.code !== 'auth/popup-closed-by-user') {
                            alert("登入失敗：" + e.message); 
                        }
                    }
                }; 
                return;
            }
            document.getElementById('loading-msg').style.display = 'none';
            currentUserProfile = { name: user.displayName || '訪客', email: user.email || 'anonymous', avatar: user.photoURL || 'https://via.placeholder.com/32' };
            fetchData();
        });
    }

    // ======== 抓取資料 ========
    function fetchData() {
        // 選單選項設定檔
        onSnapshot(doc(db, "settings", "timelapse_options"), (s) => {
            if (s.exists()) options = { ...options, ...s.data() };
            else setDoc(doc(db, "settings", "timelapse_options"), options);
        });

        // 縮時相機資產 (與主系統資產連動，以 category 區分)
        onSnapshot(collection(db, "assets"), (s) => {
            cameras = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => a.category === '縮時相機');
            document.getElementById('tab-btn-assets').innerText = `資產 (${cameras.length})`;
            renderCurrentView();
        });

        // 巡檢紀錄
        onSnapshot(collection(db, "timelapse_records"), (s) => {
            records = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderCurrentView();
        });
    }

    // ======== 視圖渲染切換 ========
    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-btn-${tab}`).classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${tab}`).classList.add('active');
        renderCurrentView();
    };

    function renderCurrentView() {
        if (currentTab === 'assets') renderAssets();
        else if (currentTab === 'list') renderList();
        else if (currentTab === 'feed') renderFeed();
    }

    // 1. 資產方塊視圖
    function renderAssets() {
        const grid = document.getElementById('assets-grid'); grid.innerHTML = '';
        if (cameras.length === 0) return grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#94a3b8; padding:30px;">尚無縮時相機</div>';
        cameras.sort((a,b) => (a.project||'').localeCompare(b.project||'')).forEach(cam => {
            const card = document.createElement('div'); card.className = 'nav-card';
            card.innerHTML = `
                <div style="position:absolute; top:12px; left:15px;" class="badge tag">${cam.project || '閒置'}</div>
                <button class="card-edit-btn" onclick="event.stopPropagation(); window.openCameraModal('${cam.id}')">✏️</button>
                <h2 style="margin-top:30px; font-size:24px;">📸 縮時 ${cam.item || '未命名'}</h2>
                <div class="detail-info" style="opacity:1; max-height:none; text-align:center; margin-top:10px;">
                    <div>品牌：${cam.brand || 'N/A'} | 型號：${cam.model || 'N/A'}</div>
                    <div style="font-family:monospace; color:var(--danger); font-weight:bold;">SN: ${cam.sn || 'N/A'}</div>
                </div>
            `;
            // 點擊卡片其他區域開啟紀錄表單
            card.onclick = () => window.openRecordModal(cam.id);
            grid.appendChild(card);
        });
    }

    // 2. Notion 風格表格列表
    function renderList() {
        const tbody = document.getElementById('list-tbody'); tbody.innerHTML = '';
        const sortedCams = [...cameras].sort((a,b) => (a.project||'').localeCompare(b.project||''));
        sortedCams.forEach(cam => {
            // 找出該相機最新的紀錄
            const camRecords = records.filter(r => r.cameraId === cam.id).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
            const latest = camRecords[0] || {};
            const pBadge = latest.power === '開' ? '<span class="badge power-on">開</span>' : latest.power === '關' ? '<span class="badge power-off">關</span>' : '-';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge tag">${cam.project || '閒置'}</span></td>
                <td><b style="color:var(--primary);">📸 縮時 ${cam.item || '?'}</b></td>
                <td>${latest.location || '-'}</td>
                <td>${pBadge}</td>
                <td>${latest.task ? `<span style="background:#fef08a; color:#854d0e; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold;">${latest.task}</span>` : '-'}</td>
                <td style="font-size:12px;">${latest.createdAt ? new Date(latest.createdAt).toLocaleString('zh-TW', {hour12:false}) : '-'}</td>
                <td style="font-family:monospace; font-weight:bold;">${latest.battery ? latest.battery+'%' : '-'}</td>
                <td style="font-size:12px; color:var(--text-muted);">${latest.capacity || '-'}</td>
                <td>${latest.creatorName ? `<div style="display:flex; align-items:center; gap:5px;"><img src="${latest.creatorAvatar}" style="width:20px; border-radius:50%;">${latest.creatorName}</div>` : '-'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 3. 看板專案動態牆 (Feed)
    function renderFeed() {
        const board = document.getElementById('feed-board'); board.innerHTML = '';
        // 抓出有被使用的專案 (最多四欄)
        const activeProjects = [...new Set(cameras.map(c => c.project || '閒置'))].slice(0, 4);
        
        activeProjects.forEach(proj => {
            const col = document.createElement('div'); col.className = 'board-col';
            col.innerHTML = `<div class="board-col-header"><span>🏷️ ${proj}</span><span style="font-size:12px; font-weight:normal; background:white; padding:2px 8px; border-radius:12px;">專案動態</span></div>`;
            
            const projRecords = records.filter(r => r.project === proj).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
            if(projRecords.length === 0) col.innerHTML += `<div style="text-align:center; color:#94a3b8; font-size:13px; margin-top:20px;">尚無紀錄</div>`;
            
            projRecords.forEach(rec => {
                const liked = rec.likes && rec.likes.includes(currentUserProfile.email);
                const likeCount = rec.likes ? rec.likes.length : 0;
                col.innerHTML += `
                    <div class="feed-card">
                        <div class="feed-header">
                            <img src="${rec.creatorAvatar}" class="feed-avatar">
                            <div class="feed-meta"><b>${rec.creatorName}</b><br>${new Date(rec.createdAt).toLocaleString('zh-TW', {hour12:false})}</div>
                        </div>
                        <div class="feed-content">
                            <p style="font-weight:bold; color:var(--primary); margin:0 0 5px 0;">📸 縮時 ${rec.cameraName}</p>
                            <p style="margin:0 0 5px 0;">📍 ${rec.location} | 🔋 ${rec.battery}% | 💾 ${rec.capacity}</p>
                            <p style="margin:0 0 5px 0;">狀態：${rec.power === '開'?'🟢開機':'🔴關機'} | 🔧 ${rec.task}</p>
                            ${rec.remarks ? `<div style="background:#f8fafc; padding:8px; border-radius:6px; margin-top:8px; font-size:12px; border:1px solid #e2e8f0;">${rec.remarks}</div>` : ''}
                        </div>
                        <div class="feed-footer">
                            <button class="btn-like ${liked ? 'liked' : ''}" onclick="window.toggleLike('${rec.id}')">
                                ${liked ? '❤️' : '🤍'} ${likeCount}
                            </button>
                        </div>
                    </div>`;
            });
            board.appendChild(col);
        });
    }

    window.toggleLike = async (recordId) => {
        const rec = records.find(r => r.id === recordId); if(!rec) return;
        let newLikes = rec.likes || [];
        if(newLikes.includes(currentUserProfile.email)) newLikes = newLikes.filter(e => e !== currentUserProfile.email);
        else newLikes.push(currentUserProfile.email);
        await setDoc(doc(db, "timelapse_records", recordId), { likes: newLikes }, { merge: true });
    };

    // ======== 通用自訂下拉選單控制 ========
    let currentDropdownTarget = '';
    window.toggleDropdown = (target, e) => {
        if(e) e.stopPropagation(); 
        document.querySelectorAll('.custom-dropdown-panel').forEach(p => { if(p.id !== `${target}-panel`) p.classList.remove('active'); });
        const p = document.getElementById(`${target}-panel`); p.classList.toggle('active');
        if(p.classList.contains('active')) {
            currentDropdownTarget = target;
            const k = target.replace('opt-', ''); 
            renderOptionsList(k); 
            document.getElementById(`${target}-input`).focus();
        }
    };
    function renderOptionsList(key) {
        const inputVal = document.getElementById(`opt-${key}-input`).value.toLowerCase();
        const listDiv = document.getElementById(`opt-${key}-list`); listDiv.innerHTML = '';
        const arr = options[key] || [];
        arr.filter(v => v.toLowerCase().includes(inputVal)).forEach(val => {
            const d = document.createElement('div'); d.className = 'dropdown-item';
            d.innerHTML = `<span style="flex:1;">${val}</span><button class="dropdown-item-delete" onclick="event.stopPropagation(); window.delOption('${key}', '${val}')">×</button>`;
            d.querySelector('span').onclick = () => { document.getElementById(`disp-opt-${key}`).innerText = val; document.getElementById(`opt-${key}-panel`).classList.remove('active'); };
            listDiv.appendChild(d);
        });
    }
    window.addOption = async (key, e) => {
        if(e) e.stopPropagation(); const val = document.getElementById(`opt-${key}-input`).value.trim();
        if(!val) return; if(!options[key]) options[key] = []; if(options[key].includes(val)) return alert('選項已存在');
        options[key].push(val); await setDoc(doc(db, "settings", "timelapse_options"), options);
        document.getElementById(`disp-opt-${key}`).innerText = val; document.getElementById(`opt-${key}-panel`).classList.remove('active');
    };
    window.delOption = async (key, val) => {
        if(!confirm(`刪除選項 ${val}？`)) return;
        options[key] = options[key].filter(v => v !== val); await setDoc(doc(db, "settings", "timelapse_options"), options);
        renderOptionsList(key);
    };

    // ======== 模態框：相機資產 ========
    window.openCameraModal = (id = null) => {
        currentEditCamId = id;
        document.getElementById('opt-project-input').value = '';
        if (id) {
            document.getElementById('camera-modal-title').innerText = '📦 編輯相機資產';
            document.getElementById('btn-delete-camera').style.display = 'inline-block';
            const cam = cameras.find(c => c.id === id);
            document.getElementById('disp-opt-project').innerText = cam.project || '閒置';
            document.getElementById('cam-name').value = cam.item || '';
            document.getElementById('cam-brand').value = cam.brand || '';
            document.getElementById('cam-model').value = cam.model || '';
            document.getElementById('cam-sn').value = cam.sn || '';
            document.getElementById('cam-date').value = cam.purchase_date || '';
        } else {
            document.getElementById('camera-modal-title').innerText = '➕ 新增相機資產';
            document.getElementById('btn-delete-camera').style.display = 'none';
            document.getElementById('disp-opt-project').innerText = '閒置';
            ['cam-name', 'cam-brand', 'cam-model', 'cam-sn', 'cam-date'].forEach(k => document.getElementById(k).value = '');
        }
        document.getElementById('camera-modal-overlay').classList.add('active');
    };
    window.closeCameraModal = () => document.getElementById('camera-modal-overlay').classList.remove('active');
    window.saveCamera = async () => {
        const name = document.getElementById('cam-name').value.trim(); if(!name) return alert('機台名稱為必填！');
        const data = {
            type: 'public', category: '縮時相機', assetType: 'fixed', office_id: 'TIMELAPSE_GLOBAL',
            item: name, project: document.getElementById('disp-opt-project').innerText,
            brand: document.getElementById('cam-brand').value, model: document.getElementById('cam-model').value,
            sn: document.getElementById('cam-sn').value, purchase_date: document.getElementById('cam-date').value
        };
        if(currentEditCamId) await setDoc(doc(db, "assets", currentEditCamId), data, {merge:true});
        else await addDoc(collection(db, "assets"), data);
        closeCameraModal();
    };
    window.deleteCamera = async () => {
        if(!confirm('確定刪除此相機？對應的歷史紀錄將保留。')) return;
        await deleteDoc(doc(db, "assets", currentEditCamId)); closeCameraModal();
    };

    // ======== 模態框：發布紀錄 ========
    window.openRecordModal = (camId) => {
        const cam = cameras.find(c => c.id === camId); if(!cam) return;
        currentRecordCamId = cam.id;
        document.getElementById('record-target-name').innerText = `目標：📸 縮時 ${cam.item} (${cam.project || '閒置'})`;
        document.getElementById('disp-opt-location').innerText = '選擇地點...';
        document.getElementById('rec-battery').value = '';
        document.getElementById('disp-opt-capacity').innerText = '64GB';
        document.getElementById('rec-power').value = '開';
        document.getElementById('disp-opt-task').innerText = '換電池';
        document.getElementById('rec-remarks').value = '';
        ['location', 'capacity', 'task'].forEach(k => document.getElementById(`opt-${k}-input`).value = '');
        document.getElementById('record-modal-overlay').classList.add('active');
    };
    window.closeRecordModal = () => document.getElementById('record-modal-overlay').classList.remove('active');
    window.saveRecord = async () => {
        const loc = document.getElementById('disp-opt-location').innerText;
        if(loc === '選擇地點...') return alert('請選擇或新增地點！');
        const cam = cameras.find(c => c.id === currentRecordCamId);
        const data = {
            cameraId: cam.id, cameraName: cam.item, project: cam.project || '閒置',
            location: loc, battery: document.getElementById('rec-battery').value,
            capacity: document.getElementById('disp-opt-capacity').innerText,
            power: document.getElementById('rec-power').value,
            task: document.getElementById('disp-opt-task').innerText,
            remarks: document.getElementById('rec-remarks').value,
            createdAt: new Date().toISOString(), likes: [],
            creatorName: currentUserProfile.name, creatorEmail: currentUserProfile.email, creatorAvatar: currentUserProfile.avatar
        };
        await addDoc(collection(db, "timelapse_records"), data);
        closeRecordModal();
    };

    // 關閉所有下拉選單
    window.addEventListener('click', () => { document.querySelectorAll('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') { document.querySelectorAll('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }});
    document.querySelectorAll('.custom-dropdown-panel input').forEach(inp => inp.addEventListener('input', (e) => { const k = e.target.id.replace('opt-', '').replace('-input', ''); renderOptionsList(k); }));
</script>
</body>
</html>
