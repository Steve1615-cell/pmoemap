<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縮時相機管理 | PMO電子圖資系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { padding-top: 20px; }
        .header-bar { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header-title { margin: 0; font-size: 45px; color: var(--primary); text-align: center; }
        
        /* ✨ 35級字全寬度搜尋條 */
        .search-container { margin-bottom: 30px; width: 100%; }
        .search-box { 
            padding: 15px 25px; border: 2px solid #cbd5e1; border-radius: 40px; 
            width: 100%; box-sizing: border-box; font-size: 35px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: border-color 0.2s; outline: none;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 30px; background: white; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: var(--text-muted); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .notion-table { width: 100%; border-collapse: collapse; min-width: 1000px; text-align: left; font-size: 14px; }
        .notion-table th { background: #f8fafc; color: var(--text-muted); font-weight: bold; padding: 12px 15px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
        .notion-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
        .notion-table tr:hover { background: #f8fafc; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; white-space: nowrap; }
        .badge.power-on { background: #d1fae5; color: #059669; }
        .badge.power-off { background: #fee2e2; color: #e11d48; }
        .badge.tag { background: #e0e7ff; color: #4f46e5; border: 1px solid #c7d2fe; }

        .archived-row td { background-color: #f8fafc !important; color: #94a3b8 !important; opacity: 0.7; }
        .archived-card { background-color: #f8fafc !important; border: 1px solid #cbd5e1 !important; cursor: not-allowed !important; transform: none !important; opacity: 0.8; }
        .archived-card h2 { color: #64748b !important; }
        
        .board-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; align-items: flex-start; }
        .board-col { flex: 0 0 320px; background: #f1f5f9; border-radius: 12px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .board-col-header { font-size: 18px; font-weight: bold; color: var(--text-main); border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .feed-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; }
        .feed-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .feed-meta { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
        .feed-content { font-size: 13px; line-height: 1.6; color: var(--text-main); }
        .feed-footer { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f5f9; align-items: center; }
        
        .btn-like { background: none; border: none; font-size: 14px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 5px; transition: 0.1s; }
        .btn-like.liked { color: #e11d48; } 
        .btn-like:active { transform: scale(1.2); }

        #restore-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--text-main); color: white; padding: 12px 24px; border-radius: 30px;
            z-index: 9999; font-weight: bold; display: flex; align-items: center; gap: 15px; transition: all 0.5s;
        }
        #restore-toast.minimizing { top: calc(100vh - 80px); left: calc(100vw - 40px); transform: scale(0.1); opacity: 0; pointer-events: none; }

        .batch-checkbox {
            width: 22px; height: 22px; background: white; border: 2px solid #cbd5e1; border-radius: 6px; 
            cursor: pointer; position: relative; appearance: none; transition: 0.2s; vertical-align: middle;
        }
        .batch-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .batch-checkbox:checked::after { content: '✔'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: bold; }

        .multi-tag-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 10px; min-height: 36px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; align-items: center; cursor: pointer; }
        .multi-tag-item { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-flex; align-items: center; gap: 6px; }
        .tag-remove-btn { cursor: pointer; font-weight: bold; opacity: 0.6; } 
        .tag-remove-btn:hover { opacity: 1; color: var(--danger); }
        
        #import-submenu { transition: all 0.3s ease; opacity: 0; transform: translateX(20px); pointer-events: none; }
        #import-submenu.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar"><h1 class="header-title">📷 縮時相機管理</h1></div>
    
    <!-- 全寬度搜尋條 -->
    <div class="search-container">
        <input type="text" id="search-input" class="search-box" placeholder="🔍 搜尋機台編號、地點、工項或參與人..." oninput="window.renderCurrentView()">
    </div>
    
    <div class="tabs">
        <button id="tab-btn-assets" class="tab-btn active" onclick="window.switchTab('assets')">資產 (0)</button>
        <button id="tab-btn-list" class="tab-btn" onclick="window.switchTab('list')">列表</button>
        <button id="tab-btn-feed" class="tab-btn" onclick="window.switchTab('feed')">貼文</button>
    </div>
    
    <div id="shared-toolbar" style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px; background: white; padding: 10px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        
        <!-- 過濾器 (修復 display: none 干擾問題) -->
        <div id="filter-container-wrapper" style="position: relative; display: none; margin-right: auto;">
            <button class="btn-secondary" onclick="window.toggleFilterPanel(event)" id="filter-btn-text" style="background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; font-weight: bold; color: var(--primary); cursor: pointer;">
                🏷️ 專案過濾 (載入中...) ▼
            </button>
            <div class="custom-dropdown-panel" id="opt-filter-panel" style="position: absolute; top: 100%; left: 0; width: 300px; padding: 15px; z-index: 3100;" onclick="event.stopPropagation()">
                <div style="font-size:13px; color:var(--text-muted); margin-bottom:12px; font-weight:bold; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px;">☑️ 勾選顯示的專案</div>
                <div id="filter-checkboxes" style="display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto;"></div>
            </div>
        </div>

        <div id="asset-sort-wrapper" style="display: flex; align-items: center; gap: 8px;">
            <label style="font-size: 14px; font-weight: bold; color: var(--text-muted); margin:0;">排序：</label>
            <select id="asset-sort-select" onchange="window.renderAssets()" style="border: none; outline: none; font-size: 15px; font-weight: bold; color: var(--primary); cursor: pointer; background: transparent;">
                <option value="name">🔢 依序號</option><option value="status">🚦 依狀態</option><option value="project">🏷️ 依使用專案</option><option value="sn">🔤 依資產編號</option>
            </select>
        </div>
    </div>

    <div id="loading-msg" style="text-align: center; color: var(--text-muted); padding: 50px; font-size: 18px;">⏳ 資料讀取與驗證中...</div>

    <div id="view-assets" class="view active"><div class="grid-nav" id="assets-grid"></div></div>
    
    <div id="view-list" class="view">
        <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 15px; background: #fef2f2; padding: 10px 20px; border-radius: 8px; border: 1px dashed #fca5a5;">
            <button class="btn-danger" onclick="window.batchDeleteRecords()">🗑️ 批次刪除勾選紀錄</button>
            <span style="font-size: 13px; color: #991b1b; font-weight: bold;">※ 勾選下方列表最左側方格，可批次清理最新紀錄 (不影響相機本體)。</span>
        </div>
        <div class="table-container">
            <table class="notion-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align:center;"><input type="checkbox" id="cb-select-all" class="batch-checkbox" onchange="window.toggleAllRecords(this)"></th>
                        <th style="width: 60px; text-align:center;">🗑️ 刪除</th>
                        <th>@ 專案</th><th>Aa 機台名稱</th><th>📍 地點</th><th>🔌 電源</th><th>🔧 工項</th><th>🕒 檢查時間</th><th>🔋 (%)</th><th>💾 容量</th><th>👥 參與人</th>
                    </tr>
                </thead>
                <tbody id="list-tbody"></tbody>
            </table>
        </div>
    </div>
    
    <div id="view-feed" class="view"><div class="board-container" id="feed-board"></div></div>
</div>

<div id="restore-toast" style="display:none;">
    <span id="restore-toast-text"></span>
    <button class="btn-primary" onclick="window.restoreLastRecord()" style="background:var(--warning);">↩️ 復原</button>
</div>

<div class="fab-container" id="fab-container" style="bottom: 30px; right: 30px;">
    <div class="fab-menu" id="fab-menu">
        <button class="fab-item" id="fab-restore-item" style="display:none; color:var(--warning);" onclick="window.restoreLastRecord()">♻️ 復原紀錄</button>
        <div style="position: relative; display: flex; align-items: center; justify-content: flex-end;">
            <div id="import-submenu" style="position: absolute; right: 100%; margin-right: 15px; display: flex; gap: 10px; white-space: nowrap;">
                <button class="fab-item" onclick="document.getElementById('csv-upload').click()">📝 Notion歷史紀錄 (.csv)</button>
                <button class="fab-item" onclick="document.getElementById('excel-upload').click()">📊 相機資產庫 (.xlsx)</button>
            </div>
            <button class="fab-item" onclick="window.toggleImportSubmenu(event)">📥 匯入外部資料 ◀</button>
        </div>
        <button class="fab-item" onclick="window.openCameraModal()">➕ 新增相機資產</button>
    </div>
    <button class="fab-btn" onclick="window.toggleFabMenu(event)">＋</button>
</div>
<input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" style="display:none;" onchange="window.handleExcelUpload(event)">
<input type="file" id="csv-upload" accept=".csv" style="display:none;" onchange="window.handleCSVUpload(event)">

<!-- ================= Modal: 相機資產編輯 ================= -->
<div id="camera-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeCameraModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span id="camera-modal-title">📦 新增相機資產</span><button class="btn-close" onclick="window.closeCameraModal()">×</button></div>
        
        <div class="form-group">
            <label>所屬專案</label>
            <div class="custom-dropdown-btn" onclick="window.toggleDropdown('opt-project', event)">
                <span id="disp-opt-project">閒置</span><span>▼</span>
            </div>
            <div class="custom-dropdown-panel" id="opt-project-panel" onclick="event.stopPropagation()">
                <div class="dropdown-search-row">
                    <input type="text" id="opt-project-input" placeholder="新增或搜尋專案...">
                    <button class="btn-primary" onclick="window.addOption('project', event)">➕</button>
                </div>
                <div class="dropdown-list" id="opt-project-list"></div>
            </div>
        </div>

        <div class="form-group"><label>機台名稱 (數字編號)</label><input type="text" id="cam-name" placeholder="例如：14"></div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1;"><label>品牌</label><input type="text" id="cam-brand" placeholder="Brinno"></div>
            <div style="flex:1;"><label>型號</label><input type="text" id="cam-model" placeholder="TLC2000"></div>
        </div>
        <div class="form-group"><label>資產編號 (SN)</label><input type="text" id="cam-sn" placeholder="N/A"></div>
        <div class="form-group"><label>購入日</label><input type="date" id="cam-date"></div>
        
        <div class="modal-footer" style="justify-content: space-between;">
            <button id="btn-delete-camera" class="btn-danger" style="display:none;" onclick="window.deleteCameraAsset(window.currentEditCamId)">🗑️ 刪除相機</button>
            <div style="display:flex; gap:10px;">
                <button class="btn-secondary" onclick="window.closeCameraModal()">取消</button>
                <button class="btn-primary" onclick="window.saveCamera()">儲存</button>
            </div>
        </div>
    </div>
</div>

<!-- ================= Modal: 巡檢紀錄表單 ================= -->
<div id="record-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeRecordModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span id="record-modal-title">📝 紀錄狀態</span><button class="btn-close" onclick="window.closeRecordModal()">×</button></div>
        
        <div style="font-size:13px; color:var(--text-muted); background:#f8fafc; border:1px solid #e2e8f0; padding:10px; border-radius:8px; margin-bottom:15px; line-height:1.6;">
            <div id="record-target-name" style="font-weight:bold; color:var(--primary); font-size:14px; margin-bottom:4px;"></div>
            <div>🕒 檢查時間：<span style="color:var(--text-main);">發佈時自動帶入當下</span></div>
        </div>
        
        <div class="form-group">
            <label>👥 參與人 (可多選)</label>
            <div class="multi-tag-container" onclick="window.toggleDropdown('opt-participant', event)">
                <div id="multi-tags-participant" style="flex:1; display:flex; flex-wrap:wrap; gap:5px;"></div><span>▼</span>
            </div>
            <div class="custom-dropdown-panel" id="opt-participant-panel" onclick="event.stopPropagation()">
                <div class="dropdown-search-row">
                    <input type="text" id="opt-participant-input" placeholder="新增參與人...">
                    <button class="btn-primary" onclick="window.addOption('participant', event)">➕</button>
                </div>
                <div class="dropdown-list" id="opt-participant-list"></div>
            </div>
        </div>

        <div class="form-group">
            <label>📍 地點 (可多選)</label>
            <div class="multi-tag-container" onclick="window.toggleDropdown('opt-location', event)">
                <div id="multi-tags-location" style="flex:1; display:flex; flex-wrap:wrap; gap:5px;"></div><span>▼</span>
            </div>
            <div class="custom-dropdown-panel" id="opt-location-panel" onclick="event.stopPropagation()">
                <div class="dropdown-search-row">
                    <input type="text" id="opt-location-input" placeholder="新增地點...">
                    <button class="btn-primary" onclick="window.addOption('location', event)">➕</button>
                </div>
                <div class="dropdown-list" id="opt-location-list"></div>
            </div>
        </div>

        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1;"><label>🔋 電量 (%)</label><input type="number" id="rec-battery" placeholder="100" min="0" max="100"></div>
            <div style="flex:1;">
                <label>💾 容量</label>
                <div class="custom-dropdown-btn" onclick="window.toggleDropdown('opt-capacity', event)">
                    <span id="disp-opt-capacity">64GB</span><span>▼</span>
                </div>
                <div class="custom-dropdown-panel" id="opt-capacity-panel" onclick="event.stopPropagation()">
                    <div class="dropdown-search-row">
                        <input type="text" id="opt-capacity-input" placeholder="新增容量...">
                        <button class="btn-primary" onclick="window.addOption('capacity', event)">➕</button>
                    </div>
                    <div class="dropdown-list" id="opt-capacity-list"></div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>🔧 工項 (可多選)</label>
            <div class="multi-tag-container" onclick="window.toggleDropdown('opt-task', event)">
                <div id="multi-tags-task" style="flex:1; display:flex; flex-wrap:wrap; gap:5px;"></div><span>▼</span>
            </div>
            <div class="custom-dropdown-panel" id="opt-task-panel" onclick="event.stopPropagation()">
                <div class="dropdown-search-row">
                    <input type="text" id="opt-task-input" placeholder="新增工項...">
                    <button class="btn-primary" onclick="window.addOption('task', event)">➕</button>
                </div>
                <div class="dropdown-list" id="opt-task-list"></div>
            </div>
        </div>

        <div class="form-group"><label>電源狀態</label><select id="rec-power"><option value="開">🟢 開機</option><option value="關">🔴 關機</option></select></div>
        <div class="form-group"><label>備註 (上限 100 字)</label><textarea id="rec-remarks" rows="3" maxlength="100" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; resize:vertical; font-family:inherit;"></textarea></div>
        
        <div class="modal-footer">
            <button class="btn-secondary" onclick="window.closeRecordModal()">取消</button>
            <button class="btn-primary" onclick="window.saveRecord()">發佈紀錄</button>
        </div>
    </div>
</div>

<script type="module">
    import { collection, onSnapshot, doc, setDoc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signInWithPopup, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const $ = id => document.getElementById(id);
    const $$ = sel => document.querySelectorAll(sel);

    let db, auth, provider, cameras = [], records = [];
    let options = { project: ['閒置', '無法使用'], location: [], capacity: ['64GB', '128GB'], task: ['換電池', '換位置', '收SD卡'], participant: [] };
    
    window.currentTab = 'assets';
    window.currentEditCamId = null;
    window.currentRecordCamId = null;
    
    let currentUserProfile = {};
    let currentSelectedTags = { location: [], task: [], participant: [] };
    
    let activeFilters = JSON.parse(localStorage.getItem('timelapse_project_filter'));
    if (!Array.isArray(activeFilters)) activeFilters = null;
    
    let deletedRecordsQueue = [], restoreTimerInt = null, restoreTimeLeft = 0;

    const isRealEnvironment = window.location.hostname.length > 0 && !window.location.href.startsWith('blob:');

    if (isRealEnvironment) {
        import('./js/firebase-config.js').then(m => {
            db = m.db; auth = m.auth; provider = m.provider; initializeApp();
        }).catch(e => showError('載入設定檔失敗：' + e.message));
    } else {
        showError('⚠️ 線上預覽模式無法跨檔案載入，請於本機 VS Code 中測試。');
    }

    function showError(msg) {
        if($('loading-msg')) { $('loading-msg').innerHTML = msg; $('loading-msg').style.color = 'var(--danger)'; }
    }

    function initializeApp() {
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                $('loading-msg').innerHTML = `⛔ 尚未登入<br><br><button id="btn-login" class="btn-primary" style="padding:10px 20px; font-size:16px; border-radius:30px; margin-top:10px;">Google 登入</button>`;
                $('loading-msg').style.color = 'var(--danger)';
                $('btn-login').onclick = async () => {
                    try { await signInWithPopup(auth, provider); } 
                    catch (e) { 
                        if (e.code === 'auth/unauthorized-domain') {
                            if (window.location.hostname.includes('127.0.0.1') || window.location.hostname.includes('localhost')) { alert('啟用訪客預覽模式！'); await signInAnonymously(auth); } 
                            else alert('登入失敗：網址未獲 Firebase 授權！');
                        } else if (e.code !== 'auth/popup-closed-by-user') alert("登入失敗：" + e.message); 
                    }
                };
                return;
            }
            $('loading-msg').style.display = 'none';
            currentUserProfile = { name: user.displayName || '訪客', email: user.email || 'anonymous', avatar: user.photoURL || 'https://via.placeholder.com/32' };
            fetchData();
        });
    }

    function fetchData() {
        onSnapshot(doc(db, "settings", "timelapse_options"), (s) => {
            if (s.exists()) { options = { ...options, ...s.data() }; } else { setDoc(doc(db, "settings", "timelapse_options"), options); }
            renderFilterUI();
        });
        onSnapshot(collection(db, "assets"), (s) => {
            cameras = s.docs.map(d => ({ id: d.id, ...d.data() })).filter(a => a.category === '縮時相機' && a.item && a.item.trim() !== '');
            renderFilterUI(); window.renderCurrentView();
        });
        onSnapshot(collection(db, "timelapse_records"), (s) => {
            records = s.docs.map(d => ({ id: d.id, ...d.data() })); window.renderCurrentView();
        });
    }

    // ✨ 核心升級：融合實體相機與純歷史紀錄 (確保 CSV 匯入的紀錄不會被消失)
    function getMergedCameras() {
        const merged = [...cameras];
        const camIds = new Set(cameras.map(c => c.id));
        records.forEach(r => {
            if (!camIds.has(r.cameraId)) {
                camIds.add(r.cameraId);
                merged.push({
                    id: r.cameraId,
                    item: r.cameraName,
                    project: r.project || '閒置',
                    isHistorical: true // 標記為純歷史機台
                });
            }
        });
        return merged;
    }

    // ======== 專案過濾器 ========
    function renderFilterUI() {

        else if (activeFilters.length <= 2) btnText.innerHTML = `🏷️ 過濾: ${activeFilters.join(', ')} ▼`;

    // ✨ 表頭寬容尋找工具
    const getVal = (row, possibleKeys) => {
        // 先找完全符合的
        for (let pk of possibleKeys) { for (let k of Object.keys(row)) { if (k.trim().toLowerCase() === pk.toLowerCase()) return row[k]; } }
        // 再找包含字串的
        for (let pk of possibleKeys) { for (let k of Object.keys(row)) { if (k.toLowerCase().includes(pk.toLowerCase())) return row[k]; } }
        return '';
    };

    // ✨ Notion CSV 歷史紀錄匯入引擎
    window.handleCSVUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = '';
        const loader = $('loading-msg'); loader.innerHTML = '⏳ 正在為您解析 Notion CSV 資料...'; loader.style.display = 'block';

        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const j = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, { type: 'binary' }).Sheets[XLSX.read(evt.target.result, { type: 'binary' }).SheetNames[0]], { defval: "" });
                const ops = []; let ac = 0;
                let newLocations = new Set(options.location || []), newTasks = new Set(options.task || []), newParticipants = new Set(options.participant || []);

                for (const row of j) {
                    const rawCamName = getVal(row, ['機台名稱', 'name']);
                    if (!rawCamName) continue;
                    const camName = String(rawCamName).replace(/縮時/g, '').trim();
                    if (!camName) continue;

                    const locs = String(getVal(row, ['地點', 'location'])).split(',').map(s => s.trim()).filter(s => s);
                    const tasks = String(getVal(row, ['工項', 'task'])).split(',').map(s => s.trim()).filter(s => s);
                    const partStr = String(getVal(row, ['參與人', 'participant']));
                    locs.forEach(l => newLocations.add(l)); tasks.forEach(t => newTasks.add(t));

                    let parts = [];
                    if (partStr.toLowerCase().includes('rong')) parts.push('Rong Rong');
                    else parts.push(currentUserProfile.name);
                    parts.forEach(p => newParticipants.add(p));

                    let dateStr = getVal(row, ['檢查時間', 'date', 'time']);
                    let createdAt = new Date().toISOString();
                    if (dateStr) { const parsed = new Date(dateStr); if (!isNaN(parsed.getTime())) createdAt = parsed.toISOString(); }

                    const exCam = cameras.find(c => String(c.item).trim() === camName);
                    const camId = exCam ? exCam.id : `historical_${camName}`;
                    const proj = getVal(row, ['專案', 'project']) || (exCam ? exCam.project : '閒置');

                    ops.push(addDoc(collection(db, "timelapse_records"), {
                        cameraId: camId, cameraName: camName, project: proj, location: locs,
                        battery: String(getVal(row, ['電量', 'battery', '(%)'])).replace(/\D/g, ''), capacity: String(getVal(row, ['容量', 'capacity', 'gb']) || '64GB'),
                        power: String(getVal(row, ['電源', 'power']) || '關').includes('開') ? '開' : '關',
                        task: tasks, remarks: '', participants: parts, createdAt: createdAt, likes: [],
                        creatorName: parts[0], creatorEmail: 'imported@csv', creatorAvatar: 'https://via.placeholder.com/32'
                    })); ac++;
                }

                options.location = Array.from(newLocations); options.task = Array.from(newTasks); options.participant = Array.from(newParticipants);
                ops.push(setDoc(doc(db, "settings", "timelapse_options"), options));

                if (ops.length > 0) { await Promise.all(ops); alert(`🎉 匯入完成！成功建立 ${ac} 筆歷史紀錄！\n系統已自動為您整理並儲存「地點」、「工項」與「參與人」標籤。`); } 
                else alert('沒有匯入任何資料。');
            } catch(err) { alert('匯入失敗：' + err.message); } finally { loader.style.display = 'none'; }
        }; reader.readAsBinaryString(file);
        $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active'); $('import-submenu').classList.remove('open');
    };

    window.handleExcelUpload = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = '';
        const loader = $('loading-msg'); loader.innerHTML = '⏳ 正在為您解析並覆蓋 Excel 資料...'; loader.style.display = 'block';
        
        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const j = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, { type: 'binary' }).Sheets[XLSX.read(evt.target.result, { type: 'binary' }).SheetNames[0]], { header: 1 });
                let hi = j.findIndex(row => row.includes('編號') || row.includes('品牌')); if (hi === -1) hi = 0; 
                const h = j[hi], rows = j.slice(hi + 1), ops = []; let uc = 0, ac = 0;

                for (const row of rows) {
                    if (!row || row.length === 0) continue;
                    const rd = {}; h.forEach((hk, i) => { if(hk) rd[hk.trim()] = row[i]; });
                    const cn = rd['編號'] ? String(rd['編號']).replace(/縮時/g, '').trim() : ''; if (!cn || cn.toLowerCase() === 'undefined') continue;
                    const dt = { type: 'public', category: '縮時相機', assetType: 'fixed', office_id: 'TIMELAPSE_GLOBAL', item: cn, project: rd['現使用專案'] || '閒置', brand: rd['品牌'] || 'N/A', model: rd['型號'] || 'N/A', sn: String(rd['資產編號'] || 'N/A'), purchase_date: String(rd['移入(PMO)日期'] || '') };
                    const ex = cameras.find(c => String(c.item).trim() === String(cn));
                    if (ex) { ops.push(updateDoc(doc(db, "assets", ex.id), dt)); uc++; } else { ops.push(addDoc(collection(db, "assets"), dt)); ac++; }
                }
                if (ops.length > 0) { await Promise.all(ops); alert(`🎉 匯入完成！\n新增 ${ac} 筆，覆蓋 ${uc} 筆`); } else alert('沒有匯入任何資料。');
            } catch(err) { alert('匯入失敗：' + err.message); } finally { loader.style.display = 'none'; }
        }; reader.readAsBinaryString(file);
        $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active'); $('import-submenu').classList.remove('open');
    };

    // 1. 渲染：資產方塊 (嚴格顯示真實相機)
    window.renderAssets = () => {
        const grid = $('assets-grid'); grid.innerHTML = '';

        const sortBy = $('asset-sort-select').value;
        const sortFn = (a, b) => { 
            if (sortBy === 'name') return (a.item||'').localeCompare(b.item||'', undefined, {numeric: true}); 
            if (sortBy === 'status') return (a.status||'').localeCompare(b.status||''); 
            if (sortBy === 'project') return (a.project||'').localeCompare(b.project||'');

        const renderCard = (cam, isArchived) => {

            card.innerHTML = `
                <div style="position:absolute; top:12px; left:15px;" class="badge tag">${cam.project || '閒置'}</div>
                <button class="card-edit-btn" onclick="event.stopPropagation(); window.openCameraModal('${cam.id}')">✏️</button>
                <h2 style="margin-top:30px; font-size:24px; color:${isArchived ? '#64748b' : 'var(--text-main)'};">📸 縮時 ${cam.item || '未命名'}</h2>
                <div class="detail-info" style="opacity:1; max-height:none; text-align:center; margin-top:10px;">
                    <div>品牌：${cam.brand || 'N/A'} | 型號：${cam.model || 'N/A'}</div>

            grid.appendChild(card);
        };
        
        ac.forEach(c => renderCard(c, false));
        if (ar.length > 0) { grid.innerHTML += `<div style="grid-column: 1/-1; margin-top: 30px;"><h3 style="border-bottom: 2px dashed #94a3b8; padding-bottom: 10px; color: #64748b;">🗄️ 封存區域 (已停用)</h3></div>`; ar.forEach(c => renderCard(c, true)); }
    };

    const fmtTags = (val, bg, tc) => (!val || val.length === 0) ? '-' : (Array.isArray(val) ? val : [val]).map(v => `<span style="background:${bg}; color:${tc}; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold; margin:2px; display:inline-block;">${v}</span>`).join('');

    // 2. 渲染：列表表格 (顯示合併相機，包含純歷史紀錄)
    window.renderList = () => {
        const tb = $('list-tbody'); tb.innerHTML = ''; $('cb-select-all').checked = false;
        const keyword = ($('search-input') ? $('search-input').value.toLowerCase().trim() : '');
        
        const fc = getMergedCameras().filter(c => 
            activeFilters.includes(c.project || '閒置') && 
            ((c.item||'').toLowerCase().includes(keyword) || (c.project||'').toLowerCase().includes(keyword))
        ).sort((a,b) => (a.project||'').localeCompare(b.project||''));
        
        if(fc.length === 0) return tb.innerHTML = '<tr><td colspan="11" style="text-align:center; color:#94a3b8; padding:30px;">在此過濾條件下沒有紀錄</td></tr>';

        fc.forEach(cam => {
            const camRecords = records.filter(r => r.cameraId === cam.id).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
            const latest = camRecords[0] || {}; const hasRecord = !!latest.id;

                <td style="text-align:center;">${hasRecord ? `<button class="btn-danger" style="padding:6px 12px; font-size:12px;" onclick="window.deleteSingleRecord('${latest.id}', event)" title="僅刪除此最新紀錄">🗑️</button>` : '-'}</td>
                <td><span class="badge tag">${cam.project || '閒置'}</span></td>
                <td><b style="color:${isArchived ? '#991b1b' : 'var(--primary)'}; font-size:16px;">📸 縮時 ${cam.item || '?'}</b></td>
                <td>${fmtTags(latest.location, '#e0e7ff', '#4f46e5')}</td>

                <td style="font-size:12px;">${latest.createdAt ? new Date(latest.createdAt).toLocaleString('zh-TW', {hour12:false}) : '-'}</td>
                <td style="font-family:monospace; font-weight:bold; font-size:16px;">${latest.battery ? latest.battery+'%' : '-'}</td>
                <td style="font-size:12px;">${latest.capacity || '-'}</td>
                <td>${fmtTags(latest.participants, '#f8fafc', '#475569')}</td>

            tb.appendChild(tr);
        });
    };

    // 3. 渲染：貼文動態牆
    window.renderFeed = () => {
        const bd = $('feed-board'); bd.innerHTML = '';

        const allMerged = getMergedCameras();

        if(activeProjects.length === 0) return bd.innerHTML = '<div style="width:100%; text-align:center; color:#94a3b8; padding:30px;">在此過濾條件下無專案貼文</div>';

        activeProjects.forEach(proj => {
            const col = document.createElement('div'); col.className = 'board-col'; 
            col.innerHTML = `<div class="board-col-header"><span>🏷️ ${proj}</span><span style="font-size:12px; background:white; padding:2px 8px; border-radius:12px;">專案動態</span></div>`;
            
            // 加入關鍵字過濾
            const projRecords = records.filter(r => r.project === proj && (
                (r.cameraName||'').toLowerCase().includes(keyword) ||
                (r.location||[]).join(',').toLowerCase().includes(keyword) ||
                (r.task||[]).join(',').toLowerCase().includes(keyword) ||
                (r.participants||[]).join(',').toLowerCase().includes(keyword) ||
                (r.remarks||'').toLowerCase().includes(keyword)
            )).sort((a,b) => b.createdAt.localeCompare(a.createdAt));

    window.toggleLike = async (rId) => { 
        const r = records.find(x => x.id === rId); if(!r) return; 
        let lk = r.likes || []; if(lk.includes(currentUserProfile.email)) lk = lk.filter(e => e !== currentUserProfile.email); else lk.push(currentUserProfile.email); 
        await setDoc(doc(db, "timelapse_records", rId), { likes: lk }, { merge: true });

    // ======== ✨ 刪除與安全復原系統 ========
    window.toggleAllRecords = (el) => $$('.cb-record-row').forEach(cb => cb.checked = el.checked);

    window.deleteCameraAsset = async (cId) => { 
        if(!confirm('確定刪除此相機及所有關聯紀錄？\n(注意：此動作將從資產中徹底移除)')) return; 
        const c = cameras.find(x => x.id === cId); 
        if (c) { 
            const cd = { ...c }; delete cd.id; 
            const cr = records.filter(r => r.cameraId === cId).map(r => { const d = { ...r }; delete d.id; return { id: r.id, data: d }; }); 
            deletedRecordsQueue.push({ type: 'camera_batch', data: [{ camId: cId, camData: cd, camRecs: cr }] }); 
            const ops = [deleteDoc(doc(db, "assets", cId))];
            cr.forEach(r => ops.push(deleteDoc(doc(db, "timelapse_records", r.id))));
            await Promise.all(ops);
            restoreTimeLeft = Math.min((restoreTimeLeft <= 0 ? 0 : restoreTimeLeft) + 15, 60); 
            showRestoreToast(); window.closeCameraModal();
        }
    };

    window.batchDeleteRecords = async () => { 
        const selIds = Array.from($$('.cb-record-row:checked')).map(cb => cb.value); 
        if (selIds.length === 0) return alert('未勾選任何紀錄項目！'); 
        if(!confirm(`確定批次刪除這 ${selIds.length} 筆紀錄？\n(相機本體將被保留，僅刪除此巡檢紀錄，24小時內可復原)`)) return; 
        const bData = [], ops = [];
        selIds.forEach(rId => { const r = records.find(x => x.id === rId); if (r) { const dCopy = { ...r }; delete dCopy.id; bData.push({ id: rId, data: dCopy }); ops.push(deleteDoc(doc(db, "timelapse_records", rId))); } });
        deletedRecordsQueue.push({ type: 'record_batch', data: bData }); await Promise.all(ops);
        restoreTimeLeft = Math.min((restoreTimeLeft <= 0 ? 0 : restoreTimeLeft) + 15 + ((selIds.length - 1) * 5), 60); showRestoreToast(); 
    };

    window.deleteSingleRecord = async (rId, e) => {

        const r = records.find(x => x.id === rId); if(!r) return;
        const dCopy = { ...r }; delete dCopy.id; deletedRecordsQueue.push({ type: 'single_record', id: rId, data: dCopy });
        await deleteDoc(doc(db, "timelapse_records", rId)); restoreTimeLeft = Math.min((restoreTimeLeft <= 0 ? 0 : restoreTimeLeft) + 15, 60); showRestoreToast();

    function showRestoreToast() {
        $('restore-toast').style.display = 'flex'; $('restore-toast').classList.remove('minimizing'); $('fab-restore-item').style.display = 'none'; updateRtText();

            if (restoreTimeLeft <= 0) {

                setTimeout(() => { $('restore-toast').style.display = 'none'; if (deletedRecordsQueue.length > 0) { $('fab-restore-item').style.display = 'block'; $('fab-restore-item').innerText = `♻️ 復原紀錄 (${deletedRecordsQueue.length})`; } }, 500); 
            }
        }, 1000);

    function updateRtText() { if($('restore-toast-text')) $('restore-toast-text').innerText = `已刪除待命中 ( ${restoreTimeLeft}s 後收合 )`; }

    window.restoreLastRecord = async () => {
        if (deletedRecordsQueue.length === 0) return; const item = deletedRecordsQueue.pop(); const ops = [];
        if (item.type === 'camera_batch') { item.data.forEach(b => { ops.push(setDoc(doc(db, "assets", b.camId), b.camData)); b.camRecs.forEach(r => ops.push(setDoc(doc(db, "timelapse_records", r.id), r.data))); }); } 
        else if (item.type === 'record_batch') { item.data.forEach(r => { ops.push(setDoc(doc(db, "timelapse_records", r.id), r.data)); }); } 
        else if (item.type === 'single_record') { ops.push(setDoc(doc(db, "timelapse_records", item.id), item.data)); }
        await Promise.all(ops);
        if (deletedRecordsQueue.length > 0) { updateRtText(); if ($('fab-restore-item').style.display === 'block') $('fab-restore-item').innerText = `♻️ 復原紀錄 (${deletedRecordsQueue.length})`; } 
        else { clearInterval(restoreTimerInt); restoreTimeLeft = 0; $('restore-toast').style.display = 'none'; $('fab-restore-item').style.display = 'none'; }
    };

    // ======== 自訂下拉選單與多選 Tag 邏輯 ========
    window.toggleDropdown = (t, e) => { 
        if(e) e.stopPropagation(); $$('.custom-dropdown-panel').forEach(p => { if(p.id !== `${t}-panel`) p.classList.remove('active'); }); $(`${t}-panel`).classList.toggle('active'); 
        if($(`${t}-panel`).classList.contains('active') && t !== 'opt-filter') { window.renderOptionsList(t.replace('opt-', '')); $(`${t}-input`).focus(); } 
    };

    window.renderMultiSelectTags = (k) => { 
        const c = $(`multi-tags-${k}`); if(!c) return; 
        if (currentSelectedTags[k].length === 0) { c.innerHTML = `<span style="color:var(--text-muted); font-size:14px;">選擇...</span>`; } 
        else { 
            let bg = k==='location'?'#e0e7ff' : k==='task'?'#fef08a' : '#f8fafc';
            let tc = k==='location'?'#4f46e5' : k==='task'?'#854d0e' : '#475569';
            c.innerHTML = currentSelectedTags[k].map(v => `<span class="multi-tag-item" style="background:${bg}; color:${tc};">${v} <span class="tag-remove-btn" onclick="event.stopPropagation(); window.removeMultiSelectTag('${k}', '${v}')">×</span></span>`).join(''); 
        }
    };

    window.removeMultiSelectTag = (k, v) => { currentSelectedTags[k] = currentSelectedTags[k].filter(x => x !== v); window.renderMultiSelectTags(k); };

    window.renderOptionsList = (k) => {
        if(k === 'filter') return; const iv = $(`opt-${k}-input`).value.toLowerCase(); const ld = $(`opt-${k}-list`); ld.innerHTML = '';
        (options[k] || []).filter(v => v.toLowerCase().includes(iv)).forEach(val => {
            const d = document.createElement('div'); d.className = 'dropdown-item'; d.innerHTML = `<span style="flex:1;">${val}</span><button class="dropdown-item-delete" onclick="event.stopPropagation(); window.delOption('${k}', '${val}')">×</button>`;
            d.querySelector('span').onclick = (e) => { 
                if (k === 'location' || k === 'task' || k === 'participant') { 
                    e.stopPropagation(); if (!currentSelectedTags[k].includes(val)) { currentSelectedTags[k].push(val); window.renderMultiSelectTags(k); } 
                } else { $(`disp-opt-${k}`).innerText = val; $(`opt-${k}-panel`).classList.remove('active'); } 
            }; ld.appendChild(d);
        });
    }

    window.addOption = async (k, e) => {
        if(e) e.stopPropagation(); const val = $(`opt-${k}-input`).value.trim(); if(!val) return; if(!options[k]) options[k] = []; if(options[k].includes(val)) return alert('選項已存在');
        options[k].push(val); await setDoc(doc(db, "settings", "timelapse_options"), options);
        if (k === 'location' || k === 'task' || k === 'participant') { if (!currentSelectedTags[k].includes(val)) currentSelectedTags[k].push(val); window.renderMultiSelectTags(k); $(`opt-${k}-input`).value = ''; window.renderOptionsList(k); } 
        else { $(`disp-opt-${k}`).innerText = val; $(`opt-${k}-panel`).classList.remove('active'); }
    };
    window.delOption = async (k, val) => { 
        if(!confirm(`刪除 ${val}？`)) return; options[k] = options[k].filter(v => v !== val); await setDoc(doc(db, "settings", "timelapse_options"), options); 
        if (k === 'location' || k === 'task' || k === 'participant') { currentSelectedTags[k] = currentSelectedTags[k].filter(v => v !== val); window.renderMultiSelectTags(k); } window.renderOptionsList(k); 
    };

    // ======== 模態框操作 ========
    window.openCameraModal = (id = null) => {
        window.currentEditCamId = id; $('opt-project-input').value = '';
        if (id) { 
            $('camera-modal-title').innerText = '📦 編輯相機'; $('btn-delete-camera').style.display = 'inline-block'; const c = cameras.find(x => x.id === id); $('disp-opt-project').innerText = c.project || '閒置'; $('cam-name').value = c.item || ''; $('cam-brand').value = c.brand || ''; $('cam-model').value = c.model || ''; $('cam-sn').value = c.sn || ''; $('cam-date').value = c.purchase_date || ''; 
        } else { $('camera-modal-title').innerText = '➕ 新增相機'; $('btn-delete-camera').style.display = 'none'; $('disp-opt-project').innerText = '閒置'; ['cam-name', 'cam-brand', 'cam-model', 'cam-sn', 'cam-date'].forEach(k => $(k).value = ''); }
        $('camera-modal-overlay').classList.add('active');
    };
    window.closeCameraModal = () => $('camera-modal-overlay').classList.remove('active');
    
    window.saveCamera = async () => {
        const n = $('cam-name').value.trim(); if(!n) return alert('機台名稱必填！');
        const dt = { type: 'public', category: '縮時相機', assetType: 'fixed', office_id: 'TIMELAPSE_GLOBAL', item: n, project: $('disp-opt-project').innerText, brand: $('cam-brand').value, model: $('cam-model').value, sn: $('cam-sn').value, purchase_date: $('cam-date').value };
        if(window.currentEditCamId) await setDoc(doc(db, "assets", window.currentEditCamId), dt, {merge:true}); else await addDoc(collection(db, "assets"), dt); window.closeCameraModal();
    };

    window.openRecordModal = (id) => {
        window.currentRecordCamId = id; const c = getMergedCameras().find(x => x.id === id); if(!c) return;
        
        $('record-target-name').innerText = `目標：📸 縮時 ${c.item} (${c.project || '閒置'})`;
        currentSelectedTags.location = []; currentSelectedTags.task = []; currentSelectedTags.participant = [currentUserProfile.name]; 
        window.renderMultiSelectTags('location'); window.renderMultiSelectTags('task'); window.renderMultiSelectTags('participant');
        
        $('rec-battery').value = ''; $('disp-opt-capacity').innerText = '64GB'; $('rec-power').value = '開'; $('rec-remarks').value = '';
        ['location', 'capacity', 'task', 'participant'].forEach(k => { if($(`opt-${k}-input`)) $(`opt-${k}-input`).value = ''; });
        $('record-modal-overlay').classList.add('active');
    };
    window.closeRecordModal = () => $('record-modal-overlay').classList.remove('active');
    
    window.saveRecord = async () => {
        if(currentSelectedTags.location.length === 0) return alert('請選擇或新增至少一個地點！');
        const c = getMergedCameras().find(x => x.id === window.currentRecordCamId);
        await addDoc(collection(db, "timelapse_records"), { 
            cameraId: c.id, cameraName: c.item, project: c.project || '閒置', location: currentSelectedTags.location, 
            battery: $('rec-battery').value, capacity: $('disp-opt-capacity').innerText, power: $('rec-power').value, 
            task: currentSelectedTags.task, remarks: $('rec-remarks').value, participants: currentSelectedTags.participant,
            createdAt: new Date().toISOString(), likes: [], creatorName: currentUserProfile.name, creatorEmail: currentUserProfile.email, creatorAvatar: currentUserProfile.avatar 
        }); window.closeRecordModal();
    };

    // ======== 關閉浮窗事件綁定 ========
    window.addEventListener('click', () => { 
        $$('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active'); $('import-submenu').classList.remove('open');
    });
    window.addEventListener('keydown', (e) => { 
        if (e.key === 'Escape') { $$('.custom-dropdown-panel').forEach(p => p.classList.remove('active')); $$('.modal-overlay').forEach(m => m.classList.remove('active')); $('fab-container').classList.remove('active'); $('fab-menu').classList.remove('active'); $('import-submenu').classList.remove('open');} 
    });
    $$('.custom-dropdown-panel input').forEach(inp => { 
        inp.addEventListener('input', (e) => { if(e.target.id === 'opt-filter-input') return; window.renderOptionsList(e.target.id.replace('opt-', '').replace('-input', '')); }); 
    });
</script>
</body>
</html>
