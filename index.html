<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ＰＭＯ電子圖資系統</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #f1f5f9;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            -webkit-text-size-adjust: 100%;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            transition: padding 0.3s;
        }

        /* 頂部標題與按鈕區塊 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            min-height: 42px;
            gap: 10px;
        }

        /* 左側按鈕區塊 */
        .header-left {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
        }

        /* 右側佔位區塊 (由 JS 動態控制寬度以確保標題置中) */
        .header-right {
            flex-shrink: 0;
        }

        /* 標題容器與跑馬燈設定 */
        .title-container {
            flex: 1;
            min-width: 0; /* 確保不會因為內容過長而撐破 Flex 容器 */
            overflow: hidden; 
            text-align: center;
            display: flex;
            justify-content: center;
        }

        /* 靜態標題 (夠短時顯示) */
        .static-title {
            margin: 0;
            font-size: clamp(18px, 4.5vw, 24px);
            display: inline-block;
            white-space: nowrap;
        }

        /* 動態無縫循環跑馬燈 (過長時啟動) */
        .marquee-wrapper {
            display: flex;
            width: max-content;
            animation: scrollText 4s linear infinite; /* 4秒跑完一輪，速度加快 */
        }

        .marquee-text {
            margin: 0;
            padding-right: 40px; /* 兩段文字之間的空白間距 */
            font-size: clamp(18px, 4.5vw, 24px);
            white-space: nowrap;
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* 完美位移一半的長度達成無縫銜接 */
        }

        .btn-nav {
            padding: 8px 16px;
            background: #e2e8f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-main);
            transition: background 0.2s;
            font-size: clamp(12px, 3vw, 15px);
            white-space: nowrap;
        }

        .btn-menu {
            padding: 8px 12px;
            font-size: 16px;
            background: var(--primary);
            color: white;
        }
        .btn-menu:hover { background: #1d4ed8; color: white; }
        .btn-nav:hover { background: #cbd5e1; }

        /* 路徑紀錄 (麵包屑) */
        .breadcrumb {
            font-size: clamp(13px, 3.5vw, 15px);
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            flex-wrap: wrap;
        }

        .breadcrumb-item { cursor: pointer; transition: color 0.2s; }
        .breadcrumb-item:hover { color: var(--primary); text-decoration: underline; }
        .breadcrumb-item.current { cursor: default; color: var(--text-main); text-decoration: none; }
        .breadcrumb-separator { color: #cbd5e1; font-size: 14px; }

        /* ======== 側邊欄 (Sidebar) 樣式 ======== */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); z-index: 998;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100vh;
            background-color: var(--card); z-index: 999;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: left 0.3s ease; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 20px; font-size: 18px; font-weight: bold;
            border-bottom: 1px solid #e2e8f0; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); }

        .sidebar-menu { flex: 1; padding: 10px 0; overflow-y: auto; }
        .menu-item {
            padding: 15px 25px; cursor: pointer; font-weight: bold; font-size: 16px;
            display: flex; align-items: center; gap: 15px; transition: background 0.2s;
        }
        .menu-item:hover { background: var(--accent); color: var(--primary); }
        .menu-item.disabled { color: #94a3b8; cursor: not-allowed; position: relative; }
        .menu-item.disabled:hover { background: transparent; color: #94a3b8; }
        
        .tooltip-container::after {
            content: attr(data-tooltip); position: absolute; left: 60px; top: 100%;
            background: #1e293b; color: white; padding: 6px 12px; border-radius: 6px;
            font-size: 13px; white-space: nowrap; font-weight: normal;
            pointer-events: none; opacity: 0; visibility: hidden; transition: all 0.2s; z-index: 1000;
        }
        .tooltip-container:hover::after { opacity: 1; visibility: visible; margin-top: 5px; }
        .sidebar-footer { padding: 15px; text-align: center; color: var(--text-muted); font-size: 13px; border-top: 1px solid #e2e8f0; }

        /* 視圖切換 */
        .view { display: none; }
        .view.active { display: block; }
        .grid-nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }

        /* 卡片設計 */
        .nav-card {
            background: var(--card); padding: 25px 20px; text-align: center;
            border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            cursor: pointer; transition: all 0.2s; border: 2px solid transparent; position: relative;
        }
        .nav-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .nav-card.no-hover:hover { transform: none; border-color: transparent; cursor: default; }

        /* 標籤頁控制 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn {
            padding: 8px 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: all 0.2s;
            font-size: clamp(14px, 3.5vw, 16px); flex: 1; min-width: 80px; max-width: 150px;
        }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 電腦版：懸浮預覽與密碼清單 */
        .preview-list { max-height: 0; opacity: 0; overflow: hidden; list-style: none; padding: 0; margin: 0; transition: all 0.3s ease; font-size: 14px; color: var(--text-muted); }
        .nav-card:hover .preview-list { max-height: 250px; opacity: 1; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .password-container { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease; }
        .nav-card:hover .password-container { max-height: 60px; opacity: 1; margin-top: 10px; }
        .password-badge { color: var(--danger); font-weight: bold; font-family: monospace; font-size: 18px; background: #fee2e2; padding: 4px 10px; border-radius: 4px; display: inline-block; }
        .detail-info { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease; text-align: left; font-size: 13px; line-height: 1.6; color: #444; }
        .nav-card:hover .detail-info { max-height: 300px; opacity: 1; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .facility-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .facility-table td { padding: 5px; border: 1px solid #e2e8f0; font-size: 12px; }
        .facility-label { background: #f1f5f9; font-weight: bold; width: 40%; }

        /* ======== 針對觸控設備 (手機/平板) 的專屬設定 ======== */
        @media (hover: none) {
            .app-container { padding: 10px 15px; }
            .btn-nav { padding: 6px 10px; }

            /* 手機版：一律展開隱藏區塊 */
            .nav-card .preview-list, .nav-card .detail-info { 
                max-height: none; opacity: 1; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; 
            }
            .nav-card .password-container { 
                max-height: none; opacity: 1; margin-top: 10px; 
            }
            
            /* 手機版：取消卡片上浮動畫並禁止長按選取 (防呆) */
            .nav-card:hover { transform: none; border-color: transparent; }
            .nav-card {
                -webkit-user-select: none;
                user-select: none;
            }
            /* 但允許詳細資料內的文字可以被選取複製 */
            .detail-info, .password-badge, h3, h2 {
                -webkit-user-select: text;
                user-select: text;
            }
        }
    </style>
</head>
<body>

<!-- 側邊欄與遮罩區域 -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <span>系統選單</span>
        <button class="btn-close" onclick="closeSidebar()">×</button>
    </div>
    <div class="sidebar-menu">
        <div class="menu-item disabled tooltip-container" data-tooltip="辦公室地圖視角開發中！">
            🗺️ 地圖顯示
        </div>
        <div class="menu-item" onclick="showExtensionsView()">
            📞 辦公室分機表
        </div>
    </div>
    <div class="sidebar-footer">
        更多功能開發中！
    </div>
</div>

<div class="app-container">
    <header>
        <div class="header-left" id="header-left">
            <button class="btn-nav btn-menu" onclick="toggleSidebar()">☰</button>
            <button class="btn-nav" id="btn-global-home" style="display:none;" onclick="goHome()">🏠 首頁</button>
            <button class="btn-nav" id="btn-global-back" style="display:none;" onclick="goBack()">← 上一頁</button>
        </div>
        <div class="title-container" id="title-container">
            <!-- 標題由 JS 動態生成 -->
            <h1 id="main-title" class="static-title">ＰＭＯ電子圖資系統</h1>
        </div>
        <div class="header-right" id="header-right"></div> 
    </header>

    <!-- 路徑紀錄 (Breadcrumb) -->
    <div id="breadcrumb" class="breadcrumb"></div>

    <!-- 第一層：樓層 (首頁) -->
    <div id="view-floor" class="view active">
        <div class="grid-nav">
            <div class="nav-card" onclick="showOffices('修船大樓３Ｆ')">
                <h2>修船大樓３Ｆ</h2>
                <ul class="preview-list" id="preview-floor-3F"></ul>
            </div>
            <div class="nav-card" onclick="showOffices('修船大樓４Ｆ')">
                <h2>修船大樓４Ｆ</h2>
                <ul class="preview-list" id="preview-floor-4F"></ul>
            </div>
        </div>
    </div>

    <!-- 第二層：辦公室 -->
    <div id="view-office" class="view">
        <div class="grid-nav" id="office-list"></div>
    </div>

    <!-- 第三層：詳細資訊頁 -->
    <div id="view-detail" class="view">
        <div class="tabs">
            <button id="tab-staff" class="tab-btn active" onclick="switchTab('staff')">人員</button>
            <button id="tab-assets" class="tab-btn" onclick="switchTab('assets')">資產</button>
            <button id="tab-facilities" class="tab-btn" onclick="switchTab('facilities')">設備</button>
        </div>
        <div id="detail-grid" class="grid-nav"></div>
    </div>

    <!-- 第四層：全辦公室分機總表 -->
    <div id="view-extensions" class="view">
        <div id="ext-container"></div>
    </div>
</div>

<!-- 外部匯入資料庫 (這裡會直接讀取你的 data.js) -->
<script src="data.js"></script>
<script>
    // === 補充原本直接寫在 HTML 的辦公室基礎資料 ===
    const officeAssets = {
        "高緯度遠洋巡護船接艦辦公室": [
            { item: "冷氣機 A", sn: "AC-4F-A01", status: "正常" },
            { item: "冰箱", sn: "REF-4F-A01", status: "正常" },
            { item: "影印機", sn: "CP-4F-A01", status: "碳粉不足" }
        ],
        "海軍浮塢案監造辦公室": [
            { item: "冷氣機 B", sn: "AC-4F-B01", status: "正常" }
        ],
        "高緯度遠洋巡護船監造辦公室 (ABS)": [
            { item: "冷氣機 C", sn: "AC-4F-C01", status: "待修" },
            { item: "公用電腦", sn: "PC-ABS-PUB", status: "正常" }
        ]
    };

    const officeData = {
        '修船大樓３Ｆ': [
            { name: '中科院', pwd: 'N/A' },
            { name: '關務辦', pwd: 'N/A' },
            { name: '國海院', pwd: '1205#' },
            { name: '高緯度遠洋巡護船接艦辦公室', pwd: 'N/A' }
        ],
        '修船大樓４Ｆ': [
            { name: '高緯度遠洋巡護船接艦辦公室', pwd: '0857#' },
            { name: '海軍浮塢案監造辦公室', pwd: '1197#' },
            { name: '高緯度遠洋巡護船監造辦公室 (ABS)', pwd: '1198#' }
        ]
    };

    let currentLevel = 0; 
    let currentFloor = '';
    let currentOffice = '';
    let currentTab = 'staff';

    function init() {
        ['修船大樓３Ｆ', '修船大樓４Ｆ'].forEach(f => {
            const floorId = f === '修船大樓３Ｆ' ? '3F' : '4F';
            const list = document.getElementById(`preview-floor-${floorId}`);
            officeData[f].forEach(o => {
                const li = document.createElement('li');
                li.innerText = `• ${o.name}`;
                list.appendChild(li);
            });
        });
        updateNavigationUI();
        history.replaceState({ level: 0 }, "");
        
        // 監聽螢幕旋轉或視窗大小改變，自動修正標題佈局
        window.addEventListener('resize', syncHeaderLayout);
    }

    // ==== 動態變更標題與無縫循環跑馬燈 ====
    function updateMainTitle(text) {
        const titleContainer = document.getElementById('title-container');
        // 先設定為靜態文字，用來測量真實寬度
        titleContainer.innerHTML = `<h1 id="main-title" class="static-title">${text}</h1>`;
        
        // 延遲一下讓瀏覽器渲染完畢後再測量
        requestAnimationFrame(() => {
            setTimeout(() => {
                const mainTitle = document.getElementById('main-title');
                if (mainTitle && mainTitle.scrollWidth > titleContainer.clientWidth) {
                    // 啟用無縫循環跑馬燈 (複製兩段文字，利用 -50% 位移)
                    titleContainer.innerHTML = `
                        <div class="marquee-wrapper">
                            <h1 class="marquee-text">${text}</h1><h1 class="marquee-text">${text}</h1>
                        </div>
                    `;
                }
            }, 50);
        });
    }

    // ==== 同步左右按鈕寬度，確保標題完美置中且不重疊 ====
    function syncHeaderLayout() {
        const left = document.getElementById('header-left');
        const right = document.getElementById('header-right');
        // 強制讓右側的空白區塊，等同於左側按鈕區塊的寬度
        right.style.width = left.offsetWidth + 'px';
    }

    // ==== 瀏覽器歷史紀錄 (History API) ====
    window.addEventListener('popstate', (event) => {
        const state = event.state;
        if (!state) { goHome(false); return; }

        if (state.level === 0) goHome(false);
        else if (state.level === 1) showOffices(state.floor, false);
        else if (state.level === 2) { currentFloor = state.floor; showDetail(state.office, false); }
        else if (state.level === 3) showExtensionsView(false);
    });

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebar-overlay').classList.toggle('active');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('sidebar-overlay').classList.remove('active');
    }

    function updateNavigationUI() {
        const btnHome = document.getElementById('btn-global-home');
        const btnBack = document.getElementById('btn-global-back');
        const breadcrumb = document.getElementById('breadcrumb');

        // 控制按鈕顯示
        if (currentLevel === 0) {
            btnHome.style.display = 'none'; btnBack.style.display = 'none';
            updateMainTitle('ＰＭＯ電子圖資系統'); 
        } else {
            btnHome.style.display = 'inline-block'; btnBack.style.display = 'inline-block';
            if (currentLevel === 1) updateMainTitle(currentFloor);
            else if (currentLevel === 2) updateMainTitle(currentOffice);
            else if (currentLevel === 3) updateMainTitle('辦公室分機總表');
        }

        // 同步排版 (使用 setTimeout 確保按鈕顯示後再計算寬度)
        setTimeout(syncHeaderLayout, 10);

        let pathHtml = '';
        if (currentLevel === 0) pathHtml = `<span class="breadcrumb-item current">首頁</span>`;
        else pathHtml = `<span class="breadcrumb-item" onclick="goHome()">首頁</span>`;
        
        if (currentLevel === 1 || currentLevel === 2) {
            pathHtml += `<span class="breadcrumb-separator">/</span>`;
            if (currentLevel === 1) pathHtml += `<span class="breadcrumb-item current">${currentFloor}</span>`;
            else pathHtml += `<span class="breadcrumb-item" onclick="showOffices('${currentFloor}')">${currentFloor}</span>`;
        }
        if (currentLevel === 2) {
            pathHtml += `<span class="breadcrumb-separator">/</span><span class="breadcrumb-item current">${currentOffice}</span>`;
        }
        if (currentLevel === 3) {
            pathHtml += `<span class="breadcrumb-separator">/</span><span class="breadcrumb-item current">分機總表</span>`;
        }
        breadcrumb.innerHTML = pathHtml;
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        updateNavigationUI();
    }

    function goHome(push = true) {
        currentLevel = 0; currentFloor = ''; currentOffice = '';
        if (push) history.pushState({ level: 0 }, "");
        switchView('view-floor');
    }

    function goBack() { history.back(); }

    function showOffices(floor, push = true) {
        currentLevel = 1; currentFloor = floor; currentOffice = '';
        if (push) history.pushState({ level: 1, floor: floor }, "");
        
        const list = document.getElementById('office-list');
        list.innerHTML = '';
        officeData[floor].forEach(off => {
            const card = document.createElement('div'); card.className = 'nav-card';
            card.innerHTML = `<h2>${off.name}</h2><div class="password-container"><span class="password-badge">${off.pwd}</span></div><div style="font-size:12px; color:var(--primary); margin-top:10px;">點擊查看詳情</div>`;
            card.onclick = () => showDetail(off.name);
            list.appendChild(card);
        });
        switchView('view-office');
    }

    function showDetail(office, push = true) {
        currentLevel = 2; currentOffice = office; currentTab = 'staff';
        if (push) history.pushState({ level: 2, floor: currentFloor, office: office }, "");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-staff').classList.add('active');
        updateDetailContent();
        switchView('view-detail');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        updateDetailContent();
    }

    function updateDetailContent() {
        const grid = document.getElementById('detail-grid');
        grid.innerHTML = '';
        const memberKeys = Object.keys(memberData).filter(key => {
            if(currentOffice.includes('接艦')) return key.startsWith('A-');
            if(currentOffice.includes('ABS')) return key.startsWith('C-');
            return false;
        });

        if (currentTab === 'staff') {
            if(memberKeys.length === 0) grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #64748b;">目前尚無人員資料</div>';
            memberKeys.forEach(key => {
                const m = memberData[key];
                const card = document.createElement('div'); card.className = 'nav-card';
                card.innerHTML = `<h3>${m.name}</h3><p style="color:#666;">${key}</p><div class="detail-info"><div><b>分機：</b>${m.ext}</div><div><b>入場日期：</b>${m.join_date || 'N/A'}</div><div><b>電腦編號：</b>${m.pc_id}</div></div>`;
                grid.appendChild(card);
            });
        } 
        else if (currentTab === 'assets') {
            const assets = officeAssets[currentOffice] || [];
            assets.forEach(a => {
                const card = document.createElement('div'); card.className = 'nav-card';
                card.innerHTML = `<h3>${a.item}</h3><div class="password-badge" style="font-size:14px; margin:10px 0;">SN: ${a.sn}</div><div style="font-size:12px;">狀態: ${a.status}</div>`;
                grid.appendChild(card);
            });
            memberKeys.forEach(key => {
                const m = memberData[key];
                if(m.assets && m.assets.length > 0) {
                    const card = document.createElement('div'); card.className = 'nav-card';
                    card.innerHTML = `<h3>${m.name} (個人資產)</h3><div class="detail-info" style="max-height:100px; opacity:1;">${m.assets.join('<br>')}</div>`;
                    grid.appendChild(card);
                }
            });
        }
        else if (currentTab === 'facilities') {
            memberKeys.forEach(key => {
                const m = memberData[key];
                const card = document.createElement('div'); card.className = 'nav-card'; card.style.textAlign = 'left';
                card.innerHTML = `<h3 style="text-align:center;">${m.name}</h3><table class="facility-table"><tr><td class="facility-label">網路孔</td><td>${m.net_port}</td></tr><tr><td class="facility-label">電話孔</td><td>${m.phone_port}</td></tr></table>`;
                grid.appendChild(card);
            });
        }
    }

    function showExtensionsView(push = true) {
        closeSidebar(); currentLevel = 3;
        if (push) history.pushState({ level: 3 }, "");
        const container = document.getElementById('ext-container');
        container.innerHTML = '';

        const deptMap = {};
        for (let key in memberData) {
            const m = memberData[key];
            const deptName = m.dept || '其他部門';
            if (!deptMap[deptName]) deptMap[deptName] = [];
            deptMap[deptName].push(m);
        }

        for (let deptName in deptMap) {
            const groupDiv = document.createElement('div'); groupDiv.style.marginBottom = '30px';
            let html = `<h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; font-size: 18px;">${deptName}</h2><div class="grid-nav" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px;">`;

            deptMap[deptName].forEach(m => {
                const hasExt = (m.ext && m.ext !== 'N/A');
                const extText = hasExt ? m.ext : '無分機';
                const extColor = hasExt ? 'var(--primary)' : 'var(--text-muted)';
                html += `<div class="nav-card no-hover" style="padding: 15px 20px; text-align: left; display: flex; justify-content: space-between; align-items: center;"><div><div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${m.name}</div><div style="font-size: 12px; color: var(--text-muted);">${m.pc_id !== 'N/A' ? 'PC: ' + m.pc_id : ''}</div></div><div style="font-size: 24px; font-weight: bold; color: ${extColor}; font-family: monospace;">${extText}</div></div>`;
            });
            html += `</div>`; groupDiv.innerHTML = html; container.appendChild(groupDiv);
        }
        switchView('view-extensions');
    }

    window.onload = init;
</script>
</body>
</html>
