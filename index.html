<!DOCTYPE html>
<html lang="zh-TW">
<head><link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ＰＭＯ電子圖資系統</title>
    
</head>
<body>

<!-- 自訂提示框 -->
<div id="custom-toast"></div>

<!-- 載入中遮罩 -->
<div id="loading-overlay">資料讀取中...</div>

<!-- 側邊欄與遮罩區域 -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <span>系統選單</span>
        <button class="btn-close" onclick="closeSidebar()">×</button>
    </div>
    <div class="sidebar-menu">
        <div class="menu-item disabled tooltip-container" data-tooltip="辦公室地圖視角開發中！">
            🗺️ 地圖顯示
        </div>
        <div class="menu-item" onclick="showExtensionsView()">
            📞 辦公室分機表
        </div>
    </div>
    <div class="sidebar-footer">
        更多功能開發中！
    </div>
</div>

<div class="app-container">
    <header>
        <div class="header-left" id="header-left">
            <button class="btn-nav btn-menu" onclick="toggleSidebar()">☰</button>
            <button class="btn-nav" id="btn-global-home" style="display:none;" onclick="goHome()">🏠 首頁</button>
            <button class="btn-nav" id="btn-global-back" style="display:none;" onclick="goBack()">← 上一頁</button>
        </div>
        <div class="title-container" id="title-container">
            <h1 id="main-title" class="static-title">ＰＭＯ電子圖資系統</h1>
        </div>
        <div class="header-right" id="header-right"></div> 
    </header>

    <!-- 路徑紀錄 (Breadcrumb) -->
    <div id="breadcrumb" class="breadcrumb"></div>

    <!-- 第一層：樓層 (首頁) -->
    <div id="view-floor" class="view active">
        <div class="grid-nav">
            <div class="nav-card" onclick="showOffices('修船大樓３Ｆ')">
                <h2>修船大樓３Ｆ</h2>
                <ul class="preview-list" id="preview-floor-3F"></ul>
            </div>
            <div class="nav-card" onclick="showOffices('修船大樓４Ｆ')">
                <h2>修船大樓４Ｆ</h2>
                <ul class="preview-list" id="preview-floor-4F"></ul>
            </div>
        </div>
    </div>

    <!-- 第二層：辦公室 -->
    <div id="view-office" class="view">
        <div class="grid-nav" id="office-list"></div>
    </div>

    <!-- 第三層：詳細資訊頁 -->
    <div id="view-detail" class="view">
        <div class="tabs">
            <button id="tab-staff" class="tab-btn active" onclick="switchTab('staff')">人員</button>
            <button id="tab-assets" class="tab-btn" onclick="switchTab('assets')">資產</button>
            <button id="tab-facilities" class="tab-btn" onclick="switchTab('facilities')">孔位</button>
        </div>
        <div id="detail-grid" class="grid-nav"></div>
    </div>

    <!-- 第四層：全辦公室分機總表 -->
    <div id="view-extensions" class="view">
        <div id="ext-container"></div>
    </div>
</div>

<!-- 懸浮操作按鈕 (FAB) -->
<div class="fab-container" id="fab-container">
    <div class="fab-menu" id="fab-menu">
        <!-- 選單內容由 JS 動態生成 -->
    </div>
    <button class="fab-btn" onclick="toggleFabMenu(event)">＋</button>
</div>

<!-- ================= Modal 表單區域 ================= -->

<!-- 1. 新增/編輯人員表單 (Modal) -->
<div id="edit-modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeEditModal()">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">✏️ 編輯人員資料</span>
            <button class="btn-close" style="font-size: 20px; color: var(--text-muted); background: none; border: none; cursor: pointer;" onclick="closeEditModal()">×</button>
        </div>
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="edit-name" placeholder="輸入姓名 (必填)">
        </div>
        <div class="form-group">
            <label>職稱 (頭銜)</label>
            <input type="text" id="edit-title" placeholder="例如：專案經理 (無則填 N/A)">
        </div>
        <div class="form-group">
            <label>入廠日</label>
            <input type="date" id="edit-join-date">
        </div>
        <div class="form-group">
            <label>分機</label>
            <input type="text" id="edit-ext" placeholder="例如：6100 (無則填 N/A)">
        </div>
        <div class="form-group">
            <label>電腦編號 (PC ID)</label>
            <input type="text" id="edit-pc" placeholder="例如：9059145 (無則填 N/A)">
        </div>
        <div class="form-group" style="display:flex; gap: 10px;">
            <div style="flex:1;">
                <label>網路孔</label>
                <input type="text" id="edit-net" placeholder="N/A">
            </div>
            <div style="flex:1;">
                <label>電話孔</label>
                <input type="text" id="edit-phone" placeholder="N/A">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeEditModal()" style="margin-right: auto;">取消</button>
            <button id="btn-save-next" class="btn-primary" onclick="saveMemberData(true)" style="display:none; background-color:#059669;">下一筆</button>
            <button id="btn-save-member" class="btn-primary" onclick="saveMemberData(false)">儲存</button>
        </div>
    </div>
</div>

<!-- 2. 新增/編輯資產表單 (Modal) -->
<div id="asset-modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeAssetModal()">
    <div class="modal-content">
        <div class="modal-header">
            <span id="asset-modal-title">📦 新增/編輯資產</span>
            <button class="btn-close" style="font-size: 20px; color: var(--text-muted); background: none; border: none; cursor: pointer;" onclick="closeAssetModal()">×</button>
        </div>
        <div class="form-group">
            <label>資產名稱</label>
            <input type="text" id="asset-item" placeholder="例如：印表機 A (必填)">
        </div>
        <div class="form-group">
            <label>財產序號 / SN</label>
            <input type="text" id="asset-sn" placeholder="例如：P-001 (無則填 N/A)">
        </div>
        <div class="form-group">
            <label>設備狀態</label>
            <select id="asset-status">
                <option value="正常">🟢 正常</option>
                <option value="碳粉不足">🟡 碳粉不足</option>
                <option value="待修">🔴 待修</option>
                <option value="報廢">⚫ 報廢</option>
                <option value="其他">⚪ 其他</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeAssetModal()">取消</button>
            <button id="btn-save-asset" class="btn-primary" onclick="saveAssetData()">儲存</button>
        </div>
    </div>
</div>

<!-- 3. 編輯辦公室資訊表單 (Modal) -->
<div id="office-modal-overlay" class="modal-overlay" onclick="if(event.target === this) closeOfficeModal()">
    <div class="modal-content">
        <div class="modal-header">
            <span>✏️ 編輯辦公室資訊</span>
            <button class="btn-close" style="font-size: 20px; color: var(--text-muted); background: none; border: none; cursor: pointer;" onclick="closeOfficeModal()">×</button>
        </div>
        <!-- 備註技術債：因為目前 office_id 綁死名稱，為了系統穩定暫不開放修改名稱 -->
        <div class="form-group">
            <label>辦公室名稱 (為防資料遺失，暫不可修改)</label>
            <input type="text" id="office-name" disabled style="background-color: #f1f5f9; color: #94a3b8;">
        </div>
        <div class="form-group">
            <label>門禁密碼</label>
            <input type="text" id="office-pwd" placeholder="例如：0857# (無則填 N/A)">
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeOfficeModal()">取消</button>
            <button id="btn-save-office" class="btn-primary" onclick="saveOfficeData()">儲存</button>
        </div>
    </div>
</div>

<!-- ================= 這裡開始是 Firebase 與 JavaScript 邏輯 ================= -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { collection, onSnapshot, doc, updateDoc, setDoc, addDoc, initializeFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. 初始化 Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDt7Z-QAG4C73K7f0RyItXMNQJc2NDxkzE",
        authDomain: "pmoemap.firebaseapp.com",
        projectId: "pmoemap",
        storageBucket: "pmoemap.firebasestorage.app",
        messagingSenderId: "151977340101",
        appId: "1:151977340101:web:0cbfb47165d081152294ac"
    };

    const app = initializeApp(firebaseConfig);
    
    // 使用 initializeFirestore 並強制開啟長輪詢 (Long Polling)
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true
    });

    let globalOffices = [];
    let globalMembers = [];
    let globalAssets = [];
    
    let currentLevel = 0; 
    let currentFloor = '';
    let currentOffice = '';
    let currentTab = 'staff';
    let isInitialized = false; 
    
    // 狀態管理：紀錄各表單目前編輯的 ID (若為 null 則代表新增)
    let currentEditMemberId = null; 
    let currentEditAssetId = null;
    let isEditMode = false; // 人員專用

    // 自訂提示訊息功能 (支援 isDanger 紅色警告樣式)
    function customAlert(msg, isDanger = false) {
        const toast = document.getElementById('custom-toast');
        toast.innerText = msg;
        if (isDanger) toast.classList.add('danger');
        else toast.classList.remove('danger');
        
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 3. 監聽 Firebase 資料庫變化
    function setupRealtimeListeners() {
        let loadedCount = 0;
        const checkAllLoaded = () => {
            loadedCount++;
            if (loadedCount === 3 && !isInitialized) {
                isInitialized = true;
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 300);
                initView(); 
            } else if (isInitialized) {
                refreshCurrentView();
            }
        };

        onSnapshot(collection(db, "offices"), (snapshot) => {
            globalOffices = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            checkAllLoaded();
        });

        onSnapshot(collection(db, "members"), (snapshot) => {
            globalMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            checkAllLoaded();
        });

        onSnapshot(collection(db, "assets"), (snapshot) => {
            globalAssets = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            checkAllLoaded();
        });
    }

    function refreshCurrentView() {
        if (currentLevel === 0) initView(); 
        else if (currentLevel === 1) showOffices(currentFloor, false);
        else if (currentLevel === 2) updateDetailContent();
        else if (currentLevel === 3) showExtensionsView(false);
    }

    function initView() {
        ['修船大樓３Ｆ', '修船大樓４Ｆ'].forEach(f => {
            const floorId = f === '修船大樓３Ｆ' ? '3F' : '4F';
            const list = document.getElementById(`preview-floor-${floorId}`);
            list.innerHTML = ''; 
            
            const floorOffices = globalOffices.filter(o => o.floor === f);
            floorOffices.forEach(o => {
                const li = document.createElement('li');
                li.innerText = `• ${o.name}`;
                list.appendChild(li);
            });
        });
        updateNavigationUI();
        if (!history.state) history.replaceState({ level: 0 }, "");
    }

    function updateMainTitle(text) {
        const titleContainer = document.getElementById('title-container');
        titleContainer.innerHTML = `<h1 id="main-title" class="static-title">${text}</h1>`;
        void titleContainer.offsetWidth; 
        requestAnimationFrame(() => {
            setTimeout(() => {
                const mainTitle = document.getElementById('main-title');
                if (mainTitle && mainTitle.scrollWidth > titleContainer.clientWidth) {
                    titleContainer.innerHTML = `
                        <div class="marquee-wrapper">
                            <h1 class="marquee-text">${text}</h1><h1 class="marquee-text">${text}</h1>
                        </div>
                    `;
                }
            }, 50);
        });
    }

    function syncHeaderLayout() {
        const left = document.getElementById('header-left');
        const right = document.getElementById('header-right');
        if (left && right) right.style.width = left.offsetWidth + 'px';
    }

    window.addEventListener('popstate', (event) => {
        const state = event.state;
        if (!state) { goHome(false); return; }
        if (state.level === 0) goHome(false);
        else if (state.level === 1) showOffices(state.floor, false);
        else if (state.level === 2) { currentFloor = state.floor; showDetail(state.office, false); }
        else if (state.level === 3) showExtensionsView(false);
    });

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebar-overlay').classList.toggle('active');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('sidebar-overlay').classList.remove('active');
    }

    document.addEventListener('click', (e) => {
        const fabContainer = document.getElementById('fab-container');
        if (fabContainer && !fabContainer.contains(e.target) && document.getElementById('fab-menu').classList.contains('active')) {
            closeFabMenu();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeFabMenu();
            closeEditModal();
            closeAssetModal();
            closeOfficeModal();
            closeSidebar();
        }
    });

    function toggleFabMenu(event) {
        if(event) event.stopPropagation(); 
        document.getElementById('fab-container').classList.toggle('active');
        document.getElementById('fab-menu').classList.toggle('active');
    }

    function closeFabMenu() {
        document.getElementById('fab-container').classList.remove('active');
        document.getElementById('fab-menu').classList.remove('active');
    }

    function updateFabMenu() {
        const fabMenu = document.getElementById('fab-menu');
        const fabContainer = document.getElementById('fab-container');
        fabMenu.innerHTML = ''; 
        closeFabMenu(); 

        if (currentLevel === 0) {
            fabContainer.style.display = 'flex';
            fabMenu.innerHTML = `<button class="fab-item" onclick="customAlert('新增辦公室功能開發中！')">➕ 新增辦公室</button>`;
        } else if (currentLevel === 1) {
            fabContainer.style.display = 'flex';
            fabMenu.innerHTML = `<button class="fab-item" onclick="customAlert('編輯樓層區域開發中！')">✏️ 編輯 ${currentFloor} 資訊</button>`;
        } else if (currentLevel === 2) {
            fabContainer.style.display = 'flex';
            // 動態依照當前標籤切換對應的功能，體驗更直覺
            let specificAction = '';
            if (currentTab === 'staff' || currentTab === 'facilities') {
                specificAction = `<button class="fab-item" onclick="openMemberModal()">➕ 新增人員</button>`;
            } else if (currentTab === 'assets') {
                specificAction = `<button class="fab-item" onclick="openAssetModal()">➕ 新增公用資產</button>`;
            }

            fabMenu.innerHTML = `
                ${specificAction}
                <button class="fab-item" onclick="openOfficeModal()">✏️ 編輯辦公室密碼</button>
            `;
        } else {
            fabContainer.style.display = 'none';
        }
    }

    function updateNavigationUI() {
        const btnHome = document.getElementById('btn-global-home');
        const btnBack = document.getElementById('btn-global-back');
        const breadcrumb = document.getElementById('breadcrumb');

        if (currentLevel === 0) {
            btnHome.style.display = 'none'; btnBack.style.display = 'none';
        } else {
            btnHome.style.display = 'inline-block'; btnBack.style.display = 'inline-block';
        }

        syncHeaderLayout();

        if (currentLevel === 0) updateMainTitle('ＰＭＯ電子圖資系統'); 
        else if (currentLevel === 1) updateMainTitle(currentFloor);
        else if (currentLevel === 2) updateMainTitle(currentOffice);
        else if (currentLevel === 3) updateMainTitle('辦公室分機總表');

        let pathHtml = '';
        if (currentLevel === 0) pathHtml = `<span class="breadcrumb-item current">首頁</span>`;
        else pathHtml = `<span class="breadcrumb-item" onclick="goHome()">首頁</span>`;
        
        if (currentLevel === 1 || currentLevel === 2) {
            pathHtml += `<span class="breadcrumb-separator">/</span>`;
            if (currentLevel === 1) pathHtml += `<span class="breadcrumb-item current">${currentFloor}</span>`;
            else pathHtml += `<span class="breadcrumb-item" onclick="showOffices('${currentFloor}')">${currentFloor}</span>`;
        }
        if (currentLevel === 2) {
            pathHtml += `<span class="breadcrumb-separator">/</span><span class="breadcrumb-item current">${currentOffice}</span>`;
        }
        if (currentLevel === 3) {
            pathHtml += `<span class="breadcrumb-separator">/</span><span class="breadcrumb-item current">分機總表</span>`;
        }
        breadcrumb.innerHTML = pathHtml;
        
        updateFabMenu();
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        updateNavigationUI();
    }

    function goHome(push = true) {
        currentLevel = 0; currentFloor = ''; currentOffice = '';
        if (push) history.pushState({ level: 0 }, "");
        switchView('view-floor');
    }
    function goBack() { history.back(); }

    function showOffices(floor, push = true) {
        currentLevel = 1; currentFloor = floor; currentOffice = '';
        if (push) history.pushState({ level: 1, floor: floor }, "");
        
        const list = document.getElementById('office-list');
        list.innerHTML = '';
        
        const floorOffices = globalOffices.filter(o => o.floor === floor);
        floorOffices.forEach(off => {
            const card = document.createElement('div'); card.className = 'nav-card';
            card.innerHTML = `<h2>${off.name}</h2><div class="password-container"><span class="password-badge">${off.pwd}</span></div><div style="font-size:12px; color:var(--primary); margin-top:10px;">點擊查看詳情</div>`;
            card.onclick = () => showDetail(off.name);
            list.appendChild(card);
        });
        switchView('view-office');
    }

    function showDetail(office, push = true) {
        currentLevel = 2; currentOffice = office; currentTab = 'staff';
        if (push) history.pushState({ level: 2, floor: currentFloor, office: office }, "");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-staff').classList.add('active');
        updateDetailContent();
        switchView('view-detail');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        updateDetailContent();
        updateFabMenu(); // 切換分頁時，右下角按鈕也會跟著變更功能
    }

    function updateDetailContent() {
        const grid = document.getElementById('detail-grid');
        grid.innerHTML = '';
        
        const officeMembers = globalMembers.filter(m => m.office_id === currentOffice);
        // 針對辦公室公用資產過濾
        const officeAssetsList = globalAssets.filter(a => a.office_id === currentOffice);

        let assetCount = officeAssetsList.length;
        officeMembers.forEach(m => {
            if (m.assets && m.assets.length > 0) assetCount += m.assets.length;
        });
        
        document.getElementById('tab-staff').innerText = `人員 (${officeMembers.length})`;
        document.getElementById('tab-assets').innerText = `資產 (${assetCount})`;
        document.getElementById('tab-facilities').innerText = `孔位`;

        if (currentTab === 'staff') {
            if(officeMembers.length === 0) grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #64748b;">目前尚無人員資料</div>';
            officeMembers.forEach(m => {
                const card = document.createElement('div'); card.className = 'nav-card';
                const displayJoinDate = m.join_date ? m.join_date.replace(/-/g, '/') : 'N/A';
                
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 10px;">
                        <div style="text-align: left;">
                            <h3 style="margin:0 0 5px 0;">${m.name}</h3>
                        </div>
                        <button class="btn-edit" onclick="openMemberModal('${m.id}')">✏️ 編輯</button>
                    </div>
                    <div class="detail-info" style="border-top: none; padding-top: 0; margin-top: 5px;">
                        <div><b>職稱：</b>${m.title || 'N/A'}</div>
                        <div><b>分機：</b>${m.ext}</div>
                        <div><b>入廠日：</b>${displayJoinDate}</div>
                        <div><b>電腦編號：</b>${m.pc_id}</div>
                    </div>`;
                grid.appendChild(card);
            });
        } 
        else if (currentTab === 'assets') {
            if(assetCount === 0) grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #64748b;">目前尚無資產資料</div>';
            
            // 渲染辦公室公用資產
            officeAssetsList.forEach(a => {
                const card = document.createElement('div'); card.className = 'nav-card';
                // 依照狀態給予不同顏色的圓點提示
                let statusIcon = '⚪';
                if(a.status === '正常') statusIcon = '🟢';
                else if(a.status === '待修') statusIcon = '🔴';
                else if(a.status === '報廢') statusIcon = '⚫';
                else if(a.status === '碳粉不足') statusIcon = '🟡';

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <h3 style="margin:0;">${a.item}</h3>
                        <button class="btn-edit" onclick="openAssetModal('${a.id}')">✏️ 編輯</button>
                    </div>
                    <div class="password-badge" style="font-size:14px; margin:10px 0;">SN: ${a.sn || 'N/A'}</div>
                    <div style="font-size:12px; font-weight:bold; color: var(--text-main);">${statusIcon} ${a.status || '未登記'}</div>
                `;
                grid.appendChild(card);
            });

            // 渲染人員的個人資產 (這部分牽涉陣列修改較複雜，目前暫維持唯讀展示，未來可視需求拆分)
            officeMembers.forEach(m => {
                if(m.assets && m.assets.length > 0) {
                    const card = document.createElement('div'); card.className = 'nav-card';
                    card.innerHTML = `<h3>${m.name} (個人資產)</h3><div class="detail-info" style="max-height:100px; opacity:1; border-top: none;">${m.assets.join('<br>')}</div>`;
                    grid.appendChild(card);
                }
            });
        }
        else if (currentTab === 'facilities') {
            if(officeMembers.length === 0) grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #64748b;">目前尚無孔位配置</div>';
            officeMembers.forEach(m => {
                const card = document.createElement('div'); card.className = 'nav-card'; card.style.textAlign = 'left';
                const pcDisplay = m.pc_id && m.pc_id !== 'N/A' ? m.pc_id : '無';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <h3 style="margin:0; margin-bottom: 4px;">${m.name}</h3>
                        <button class="btn-edit" onclick="openMemberModal('${m.id}')">✏️ 編輯</button>
                    </div>
                    <div style="font-weight:bold; font-size:14px; color:var(--text-main); margin-bottom:12px;">PC: ${pcDisplay}</div>
                    <table class="facility-table">
                        <tr><td class="facility-label">網路孔</td><td>${m.net_port}</td></tr>
                        <tr><td class="facility-label">電話孔</td><td>${m.phone_port}</td></tr>
                    </table>`;
                grid.appendChild(card);
            });
        }
    }

    function showExtensionsView(push = true) {
        closeSidebar(); currentLevel = 3;
        if (push) history.pushState({ level: 3 }, "");
        const container = document.getElementById('ext-container');
        container.innerHTML = '';

        const officeMap = {};
        globalMembers.forEach(m => {
            const officeName = m.office_id || '未分配辦公室';
            if (!officeMap[officeName]) officeMap[officeName] = [];
            officeMap[officeName].push(m);
        });

        for (let officeName in officeMap) {
            const groupDiv = document.createElement('div'); groupDiv.style.marginBottom = '30px';
            let html = `<h2 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; font-size: 18px;">${officeName}</h2><div class="grid-nav" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px;">`;

            officeMap[officeName].forEach(m => {
                const hasExt = (m.ext && m.ext !== 'N/A');
                const extText = hasExt ? m.ext : '無分機';
                const extColor = hasExt ? 'var(--primary)' : 'var(--text-muted)';
                html += `<div class="nav-card no-hover" style="padding: 15px 20px; text-align: left; display: flex; justify-content: space-between; align-items: center;"><div><div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">${m.name}</div><div style="font-size: 12px; color: var(--text-muted);">${m.title && m.title !== 'N/A' ? m.title : ''} ${m.pc_id !== 'N/A' ? 'PC:' + m.pc_id : ''}</div></div><div style="font-size: 24px; font-weight: bold; color: ${extColor}; font-family: monospace;">${extText}</div></div>`;
            });
            html += `</div>`; groupDiv.innerHTML = html; container.appendChild(groupDiv);
        }
        switchView('view-extensions');
    }

    // ================= 1. 人員表單邏輯 =================
    function openMemberModal(memberId = null) {
        closeFabMenu(); 
        const btnNext = document.getElementById('btn-save-next');

        if (memberId && typeof memberId === 'string') {
            isEditMode = true;
            currentEditMemberId = memberId;
            document.getElementById('modal-title').innerText = '✏️ 編輯人員資料';
            btnNext.style.display = 'none'; 

            const m = globalMembers.find(x => x.id === memberId);
            if(m) {
                document.getElementById('edit-name').value = m.name || '';
                document.getElementById('edit-title').value = m.title || '';
                document.getElementById('edit-join-date').value = m.join_date || '';
                document.getElementById('edit-ext').value = m.ext || '';
                document.getElementById('edit-pc').value = m.pc_id || '';
                document.getElementById('edit-net').value = m.net_port || '';
                document.getElementById('edit-phone').value = m.phone_port || '';
            }
        } else {
            isEditMode = false;
            currentEditMemberId = null;
            document.getElementById('modal-title').innerText = '➕ 新增人員資料';
            btnNext.style.display = 'inline-block'; 
            
            document.getElementById('edit-name').value = '';
            document.getElementById('edit-title').value = '';
            document.getElementById('edit-ext').value = '';
            document.getElementById('edit-pc').value = '';
            document.getElementById('edit-net').value = '';
            document.getElementById('edit-phone').value = '';
        }

        document.getElementById('edit-modal-overlay').classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('edit-modal-overlay').classList.remove('active');
    }

    async function saveMemberData(continueNext = false) {
        const nameInput = document.getElementById('edit-name').value.trim();

        if (!nameInput) {
            customAlert('姓名為必填欄位！', true);
            return;
        }

        const btnId = continueNext ? 'btn-save-next' : 'btn-save-member';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        
        btn.disabled = true;
        btn.innerText = '儲存中...';

        try {
            const memberDataToSave = {
                name: nameInput,
                title: document.getElementById('edit-title').value || 'N/A',
                join_date: document.getElementById('edit-join-date').value || '', 
                ext: document.getElementById('edit-ext').value || 'N/A',
                pc_id: document.getElementById('edit-pc').value || 'N/A',
                net_port: document.getElementById('edit-net').value || 'N/A',
                phone_port: document.getElementById('edit-phone').value || 'N/A',
                office_id: currentOffice 
            };

            if (isEditMode) {
                const memberRef = doc(db, 'members', currentEditMemberId);
                await updateDoc(memberRef, memberDataToSave);
            } else {
                if (currentOffice.includes('接艦')) memberDataToSave.dept = '高緯度遠洋巡護船接艦人員';
                else if (currentOffice.includes('ABS')) memberDataToSave.dept = '高緯度遠洋巡護船監造人員 (ABS)';
                else memberDataToSave.dept = currentOffice; 

                await addDoc(collection(db, 'members'), memberDataToSave);
            }
            
            if (continueNext && !isEditMode) {
                btn.innerText = '已新增 ✔';
                document.getElementById('edit-name').value = '';
                document.getElementById('edit-title').value = '';
                document.getElementById('edit-ext').value = '';
                document.getElementById('edit-pc').value = '';
                document.getElementById('edit-net').value = '';
                document.getElementById('edit-phone').value = '';
                document.getElementById('edit-name').focus();
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 800);
            } else {
                closeEditModal();
                btn.disabled = false;
                btn.innerText = originalText;
            }
        } catch(error) {
            console.error("更新失敗: ", error);
            customAlert("儲存失敗，請檢查網路連線。", true);
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    // ================= 2. 資產表單邏輯 =================
    function openAssetModal(assetId = null) {
        closeFabMenu();
        if (assetId && typeof assetId === 'string') {
            currentEditAssetId = assetId;
            document.getElementById('asset-modal-title').innerText = '📦 編輯資產資料';
            
            const a = globalAssets.find(x => x.id === assetId);
            if(a) {
                document.getElementById('asset-item').value = a.item || '';
                document.getElementById('asset-sn').value = a.sn || '';
                document.getElementById('asset-status').value = a.status || '正常';
            }
        } else {
            currentEditAssetId = null;
            document.getElementById('asset-modal-title').innerText = '➕ 新增公用資產';
            
            document.getElementById('asset-item').value = '';
            document.getElementById('asset-sn').value = '';
            document.getElementById('asset-status').value = '正常';
        }
        document.getElementById('asset-modal-overlay').classList.add('active');
    }

    function closeAssetModal() {
        document.getElementById('asset-modal-overlay').classList.remove('active');
    }

    async function saveAssetData() {
        const itemInput = document.getElementById('asset-item').value.trim();
        if (!itemInput) {
            customAlert('資產名稱為必填欄位！', true);
            return;
        }

        const btn = document.getElementById('btn-save-asset');
        btn.disabled = true;
        btn.innerText = '儲存中...';

        try {
            const assetDataToSave = {
                item: itemInput,
                sn: document.getElementById('asset-sn').value || 'N/A',
                status: document.getElementById('asset-status').value,
                office_id: currentOffice,
                type: 'public' // 強制設定為公用辦公室資產
            };

            if (currentEditAssetId) {
                const assetRef = doc(db, 'assets', currentEditAssetId);
                await updateDoc(assetRef, assetDataToSave);
            } else {
                await addDoc(collection(db, 'assets'), assetDataToSave);
            }
            
            closeAssetModal();
        } catch(error) {
            console.error("更新失敗: ", error);
            customAlert("儲存失敗，請檢查網路連線。", true);
        } finally {
            btn.disabled = false;
            btn.innerText = '儲存';
        }
    }

    // ================= 3. 辦公室資訊表單邏輯 =================
    function openOfficeModal() {
        closeFabMenu();
        const officeData = globalOffices.find(o => o.name === currentOffice);
        if (!officeData) {
            customAlert('找不到辦公室資料！', true);
            return;
        }

        document.getElementById('office-name').value = officeData.name;
        document.getElementById('office-pwd').value = officeData.pwd || '';
        document.getElementById('office-modal-overlay').classList.add('active');
    }

    function closeOfficeModal() {
        document.getElementById('office-modal-overlay').classList.remove('active');
    }

    async function saveOfficeData() {
        const btn = document.getElementById('btn-save-office');
        btn.disabled = true;
        btn.innerText = '儲存中...';

        try {
            // 目前 office_id 就是 name，所以我們利用 currentOffice 來抓取 Document 參考
            const officeRef = doc(db, 'offices', currentOffice);
            await updateDoc(officeRef, {
                pwd: document.getElementById('office-pwd').value || 'N/A'
            });
            
            closeOfficeModal();
            customAlert("辦公室密碼已更新！");
        } catch(error) {
            console.error("更新失敗: ", error);
            customAlert("儲存失敗，請確認這筆辦公室資料是否存在於資料庫。", true);
        } finally {
            btn.disabled = false;
            btn.innerText = '儲存';
        }
    }

    // 匯出全域函數
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    window.showExtensionsView = showExtensionsView;
    window.goHome = goHome;
    window.goBack = goBack;
    window.showOffices = showOffices;
    window.switchTab = switchTab;
    
    // 表單功能
    window.openMemberModal = openMemberModal;
    window.closeEditModal = closeEditModal;
    window.saveMemberData = saveMemberData;
    
    window.openAssetModal = openAssetModal;
    window.closeAssetModal = closeAssetModal;
    window.saveAssetData = saveAssetData;
    
    window.openOfficeModal = openOfficeModal;
    window.closeOfficeModal = closeOfficeModal;
    window.saveOfficeData = saveOfficeData;
    
    window.toggleFabMenu = toggleFabMenu;
    window.customAlert = customAlert;

    window.addEventListener('resize', syncHeaderLayout);
    setupRealtimeListeners();

</script>
</body>
</html>
