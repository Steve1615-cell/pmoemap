<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在列資產總表 | PMO電子圖資系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { padding-top: 20px; }
        .header-bar { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header-title { margin: 0; font-size: 45px; color: var(--primary); text-align: center; cursor: pointer; transition: transform 0.2s; }
        .header-title:hover { transform: scale(1.02); text-shadow: 0 4px 10px rgba(37,99,235,0.2); }
        
        .search-container { margin-bottom: 30px; width: 100%; }
        .search-box { padding: 15px 25px; border: 2px solid #cbd5e1; border-radius: 40px; width: 100%; box-sizing: border-box; font-size: 35px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); transition: border-color 0.2s; outline: none; }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { position: relative; padding: 10px 30px; background: white; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: var(--text-muted); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .table-container { width: 100%; display: flex; flex-direction: column; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .notion-table { width: 100%; border-collapse: collapse; min-width: 1000px; text-align: left; font-size: 14px; user-select: none; -webkit-user-select: none; }
        .notion-table th { background: #f8fafc; color: var(--text-muted); font-weight: bold; padding: 12px 15px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        .notion-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); }
        .notion-table tr:hover { background: #f8fafc; }
        
        /* 增強版表頭樣式 */
        .th-content { display: flex; align-items: center; justify-content: space-between; gap: 5px; }
        .th-sort { cursor: pointer; flex: 1; transition: color 0.2s; white-space: nowrap; display:flex; align-items:center; }
        .th-sort:hover { color: var(--primary); }
        .th-filter-btn { cursor: pointer; padding: 2px 8px; border-radius: 6px; color: var(--text-muted); background: #f1f5f9; font-size: 14px; font-weight: bold; border: 1px solid #cbd5e1; transition: all 0.2s; }
        .th-filter-btn:hover { background: #e2e8f0; color: var(--text-main); }
        .th-filter-btn.active-filter { background: var(--primary); color: white; border-color: var(--primary); }
        
        #col-filter-panel { position: fixed; background: white; border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 15px; z-index: 99999; max-height: 350px; display: none; flex-direction: column; gap: 8px; min-width: 220px; }
        #filter-cb-list { overflow-y: auto; max-height: 220px; display: flex; flex-direction: column; gap: 5px; padding-right: 5px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; white-space: nowrap; }
        .badge.tag { background: #e0e7ff; color: #4f46e5; border: 1px solid #c7d2fe; }

        .batch-checkbox { width: 22px; height: 22px; background: white; border: 2px solid #cbd5e1; border-radius: 6px; cursor: pointer; position: relative; appearance: none; transition: 0.2s; vertical-align: middle; }
        .batch-checkbox:checked { background: var(--primary); border-color: var(--primary); }
        .batch-checkbox:checked::after { content: '✔'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: bold; }

        /* 滿版圓環儀表板 */
        .stats-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 10px; width: 100%; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 250px; border: 2px solid transparent; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 8px 25px rgba(37,99,235,0.1); }
        .stat-card.active-filter { border-color: var(--danger); box-shadow: 0 4px 20px rgba(239,68,68,0.2); background: #fef2f2; }
        .donut-chart-container { width: 100%; max-width: 180px; aspect-ratio: 1/1; position: relative; margin-bottom: 15px; }
        .stat-title { font-size: 18px; font-weight: bold; color: var(--text-main); text-align: center; }
        .stat-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        /* 懸浮批次操作列 */
        #floating-batch-bar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150px); background: white; padding: 12px 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 4000; display: flex; gap: 15px; align-items: center; border: 1px solid #cbd5e1; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        #floating-batch-bar.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }
        
        .fab-submenu { position: absolute; right: 100%; margin-right: 15px; display: flex; gap: 10px; white-space: nowrap; transition: all 0.3s ease; opacity: 0; transform: translateX(20px); pointer-events: none; }
        .fab-submenu.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
        
        /* ✨ 升級防擋彈窗樣式 */
        .modal-overlay { z-index: 99999 !important; }
        .modal-content { max-height: 85vh; overflow-y: auto !important; }
        #import-preview-modal-overlay .modal-content { max-width: 95vw; height: 90vh; display: flex; flex-direction: column; }
        #import-preview-modal-overlay .table-container { flex: 1; overflow: auto; margin-top: 15px; border: 1px solid #e2e8f0; }

        .checkout-stats-wrapper { display:flex; gap:20px; align-items:center; background:white; padding:20px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); flex-wrap:wrap; }

        /* 新手教學專屬樣式 */
        #tutorial-overlay-mask { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.75); z-index: 99990; display: none; pointer-events: none; }
        #tutorial-ring-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 99992; pointer-events: none; display: none; }
        .tutorial-on-top { z-index: 99991 !important; position: relative; background: white; border-radius: 12px; }
        #fab-container.tutorial-on-top { position: fixed !important; background: transparent; }
        .tutorial-ring { position: absolute; border: 4px solid var(--danger); border-radius: 20px; pointer-events: none; animation: pulse-ring 2s infinite; box-sizing: border-box; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }
        #tutorial-dialog { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 99999; background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); display: none; flex-direction: column; gap: 15px; border-top: 5px solid var(--danger); }
    </style>
</head>
<body>

<!-- 表頭過濾彈出面板 -->
<div id="col-filter-panel"></div>

<!-- 教學遮罩與互動層 -->
<div id="tutorial-overlay-mask"></div>
<div id="tutorial-ring-container"></div>
<div id="tutorial-dialog">
    <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px;">
        <b id="tutorial-title" style="color:var(--danger); font-size: 18px; display:flex; align-items:center; gap:8px;">💡 系統教學</b>
        <button onclick="window.exitTutorial()" style="background:none; border:none; color:var(--text-muted); font-size:24px; cursor:pointer; font-weight:bold; line-height:1;">&times;</button>
    </div>
    <div id="tutorial-text" style="font-size: 14px; line-height: 1.7; color: var(--text-main);"></div>
    <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 5px;">
        <span id="tutorial-step-indicator" style="font-size:12px; font-weight:bold; color:var(--text-muted);">1 / 2</span>
        <button id="tutorial-btn-next" onclick="window.nextTutorialStep()" class="btn-primary" style="background:var(--danger); box-shadow:0 4px 10px rgba(225,29,72,0.3);">下一步 ➔</button>
    </div>
</div>

<div class="app-container">
    <div class="header-bar">
        <h1 class="header-title" onclick="window.startTutorial()" title="點擊重新觀看教學">📦 在列資產總表 <span style="font-size:14px; font-weight:normal; color:var(--text-muted); opacity:0.5; vertical-align:middle;">(點擊教學)</span></h1>
    </div>
    
    <div class="search-container">
        <!-- 搜尋時回到第一頁 -->
        <input type="text" id="search-input" class="search-box" placeholder="🔍 搜尋資產名稱、編號、標籤或辦公室..." oninput="window.summaryCurrentPage = 1; window.renderCurrentView()">
    </div>
    
    <div class="tabs">
        <button id="tab-btn-summary" class="tab-btn" onclick="window.switchTab('summary')">📊 總覽</button>
        <button id="tab-btn-registry" class="tab-btn" onclick="window.switchTab('registry')">📝 登記</button>
    </div>
    
    <div id="loading-msg" style="text-align: center; color: var(--text-muted); padding: 50px; font-size: 18px;">⏳ 資料讀取與連線中...</div>

    <!-- ================= 視圖 1：總覽 ================= -->
    <div id="view-summary" class="view">
        <div class="stats-row" id="tutorial-target-stats">
            <div class="stat-card" onclick="window.toggleDataDisplay('cons')">
                <div class="donut-chart-container" id="chart-cons"></div>
                <div class="stat-title">📦 消耗品</div>
                <div class="stat-subtitle">(點擊切換 數量/佔比)</div>
            </div>
            <div class="stat-card" onclick="window.toggleDataDisplay('fixed')">
                <div class="donut-chart-container" id="chart-fixed"></div>
                <div class="stat-title">📌 固定資產</div>
                <div class="stat-subtitle">(點擊切換 數量/佔比)</div>
            </div>
            <div class="stat-card" id="card-shortage" onclick="window.toggleShortageFilter()">
                <div class="donut-chart-container" id="chart-shortage"></div>
                <div class="stat-title" style="color:var(--danger);">⚠️ 低庫存警告</div>
                <div class="stat-subtitle">(點擊過濾不足項目)</div>
            </div>
        </div>
        
        <div style="font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 10px;">💡 提示：點選表頭文字即可排序。點選文字右方的「⋯」可進行條件篩選。按住滑鼠左鍵可拖曳勾選！</div>
        
        <div class="table-container" style="display:flex; flex-direction:column;">
            <div style="overflow-x: auto;">
                <table class="notion-table">
                    <!-- 動態表頭將在此生成 -->
                    <thead id="summary-table-thead"></thead>
                    <tbody id="summary-table-tbody"></tbody>
                </table>
            </div>
            <div id="summary-pagination" style="display:flex; justify-content:center; align-items:center; padding: 15px; gap: 15px; background: #f8fafc; border-top: 1px solid #e2e8f0; margin-top: auto;"></div>
        </div>
    </div>
    
    <!-- ================= 視圖 2：登記 (領用紀錄表) ================= -->
    <div id="view-registry" class="view">
        <div id="stats-dashboard-registry"></div>
        <div style="font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 10px;">💡 提示：點選表頭文字即可排序。點選文字右方的「⋯」可進行條件篩選。按住滑鼠左鍵可拖曳勾選！</div>
        <div class="table-container">
            <table class="notion-table">
                <!-- 動態表頭將在此生成 -->
                <thead id="registry-table-thead"></thead>
                <tbody id="checkout-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 懸浮動作列 -->
<div id="floating-batch-bar">
    <button onclick="window.clearBatchSelection()" style="background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer; text-decoration:underline; margin-right:10px;">❌ 取消多選</button>
    <span id="batch-sel-count" style="font-size:15px; font-weight:bold; color:var(--primary); margin-right:15px; border-right:2px solid #e2e8f0; padding-right:15px;">0 項</span>
    <button class="btn-primary" style="background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe;" onclick="window.openBatchMoveModal()">🔄 轉移</button>
    <button class="btn-primary" style="background:#fefce8; color:#854d0e; border:1px solid #fef08a;" onclick="window.openBatchEditModal()">✏️ 編輯屬性</button>
    <button class="btn-danger" style="background:#fef2f2; color:#991b1b; border:1px dashed #fca5a5;" onclick="window.batchDeleteAssets()">🗑️ 刪除</button>
</div>

<!-- ✨ FAB 右下角按鈕群 -->
<div class="fab-container" id="fab-container" style="bottom: 30px; right: 30px; z-index: 99995 !important; pointer-events: auto;">
    <div class="fab-menu" id="fab-menu">
        <button class="fab-item" onclick="event.stopPropagation(); window.openExportModal(); window.toggleFabMenu(event);">📤 匯出資料中心</button>
        <div style="position: relative; display: flex; align-items: center; justify-content: flex-end;">
            <div id="import-submenu" class="fab-submenu">
                <button class="fab-item" onclick="event.stopPropagation(); document.getElementById('file-upload').click(); window.toggleFabMenu(event);">📥 選擇表格 (CSV/XLSX)</button>
            </div>
            <button class="fab-item" onclick="window.toggleSubmenu('import-submenu', event)">📥 匯入預覽 ◀</button>
        </div>
        <button class="fab-item" onclick="event.stopPropagation(); window.openAssetModal(); window.toggleFabMenu(event);">➕ 新增實體資產</button>
    </div>
    <button class="fab-btn" onclick="window.toggleFabMenu(event)">＋</button>
</div>
<input type="file" id="file-upload" accept=".xlsx, .xls, .csv" style="display:none;" onchange="window.handlePreviewImport(event)">

<!-- ================= Modal: 領用登記表單 ================= -->
<div id="checkout-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeCheckoutModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span>📝 領用登記</span><button class="btn-close" onclick="window.closeCheckoutModal()">×</button></div>
        <div class="form-group">
            <label>名稱 (選擇在列資產)</label>
            <div class="custom-dropdown-btn" onclick="window.toggleDropdown('opt-checkout-asset', event)">
                <span id="disp-checkout-asset">請搜尋並選擇資產...</span><span style="font-size: 12px; color: var(--text-muted);">▼</span>
            </div>
            <input type="hidden" id="checkout-asset-id" value="">
            <div class="custom-dropdown-panel" id="opt-checkout-asset-panel" onclick="event.stopPropagation()">
                <div class="dropdown-search-row">
                    <input type="text" id="opt-checkout-asset-input" placeholder="🔍 搜尋資產名稱或編號..." oninput="window.renderCheckoutAssetList()">
                </div>
                <div class="dropdown-list" id="opt-checkout-asset-list"></div>
            </div>
        </div>
        <div class="form-group">
            <label>存放辦公室 (選定資產後自動鎖定)</label>
            <input type="text" id="checkout-location" disabled style="background:#f8fafc; color:#64748b; font-weight:bold;" placeholder="選擇資產後自動帶入">
            <input type="hidden" id="checkout-location-id" value="">
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
            <div style="flex:1;"><label>出庫數量</label><input type="number" id="checkout-qty" value="1" min="1"></div>
            <div style="flex:2;"><label>領取人</label><input type="text" id="checkout-borrower" placeholder="輸入領取人姓名" oninput="window.autoFillCheckoutRemarks()"></div>
        </div>
        <div class="form-group"><label>日期時間</label><input type="datetime-local" id="checkout-date"></div>
        <div class="form-group"><label>備註 (智慧帶入前例)</label><textarea id="checkout-remarks" rows="2" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; font-family:inherit; resize:vertical;" placeholder="可自由修改補充說明..."></textarea></div>
        <div class="modal-footer"><button class="btn-secondary" onclick="window.closeCheckoutModal()">取消</button><button class="btn-primary" onclick="window.saveCheckout()">確認登記</button></div>
    </div>
</div>

<!-- ================= Modal: 匯入預覽所 ================= -->
<div id="import-preview-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeImportPreviewModal()">
    <div class="modal-content">
        <div class="modal-header">
            <span>📥 匯入預覽與編輯</span>
            <div style="display:flex; gap:10px;">
                <button class="btn-danger" onclick="window.previewBatchDelete()" style="background:#fee2e2; color:#991b1b; border:1px solid #fca5a5;">🗑️ 刪除勾選</button>
                <button class="btn-primary" id="btn-preview-batch-edit" onclick="window.openPreviewBatchEditModal()" style="background:#fefce8; color:#854d0e; border:1px solid #fef08a;">✏️ 編輯屬性</button>
                <button class="btn-primary" onclick="window.confirmImport()" style="background:var(--success);">✅ 確認匯入</button>
                <button class="btn-close" onclick="window.closeImportPreviewModal()" style="margin-left:15px;">×</button>
            </div>
        </div>
        <div style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <label style="font-weight: bold; color: var(--primary);">📥 此表格匯入至：</label>
            <select id="import-target-type" onchange="window.renderPreviewModal()" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-weight:bold;">
                <option value="assets">📦 資產/消耗品總表</option>
                <option value="checkouts">📝 領用登記紀錄</option>
            </select>
            <label id="import-deduct-wrapper" style="display:none; align-items:center; gap:5px; font-weight:bold; color:var(--danger); background:#fee2e2; padding:6px 12px; border-radius:6px; cursor:pointer;">
                <input type="checkbox" id="import-deduct-stock" checked style="width:16px; height:16px;"> 寫入時同步扣除現有資產庫存
            </label>
        </div>
        <div class="table-container">
            <table class="notion-table">
                <thead id="preview-thead"></thead><tbody id="preview-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ================= Modal: 預覽批次編輯 ================= -->
<div id="preview-batch-edit-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closePreviewBatchEditModal()">
    <div class="modal-content" style="overflow: visible;">
        <div class="modal-header"><span>✏️ 批次修改預覽清單</span><button class="btn-close" onclick="window.closePreviewBatchEditModal()">×</button></div>
        <div style="font-size:13px; color:var(--text-muted); margin-bottom:15px;" id="preview-batch-edit-hint"></div>
        <div class="form-group"><label>將所屬辦公室修改為：(留空不改)</label><select id="preview-batch-office" style="background: #f8fafc; border-color: var(--primary);"></select></div>
        <div class="form-group"><label>分類標籤/類別 (留空不改)</label><input type="text" id="preview-batch-category"></div>
        <div class="form-group"><label>最低安全庫存 (僅消耗品，留空不改)</label><input type="number" id="preview-batch-min" min="0"></div>
        <div class="modal-footer"><button class="btn-secondary" onclick="window.closePreviewBatchEditModal()">取消</button><button class="btn-primary" onclick="window.executePreviewBatchEdit()">修改暫存資料</button></div>
    </div>
</div>

<!-- ================= Modal: 資料匯出中心 ================= -->
<div id="export-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeExportModal()">
    <div class="modal-content">
        <div class="modal-header"><span>📤 匯出資料中心</span><button class="btn-close" onclick="window.closeExportModal()">×</button></div>
        <div class="form-group">
            <label>1. 選擇匯出資料範圍：</label>
            <select id="export-target-data" style="font-weight: bold; background: #f8fafc; border-color: var(--primary); padding:10px;">
                <option value="assets">📦 總覽標籤頁 (所有資產與庫存)</option>
                <option value="checkouts">📝 登記標籤頁 (物品出入與領用紀錄)</option>
            </select>
        </div>
        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #cbd5e1;">
            <label style="display:block; font-size:13px; color:var(--text-muted); margin-bottom:10px; font-weight:bold;">2. 選擇匯出檔案格式：</label>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn-primary" onclick="window.executeExport('pdf')" style="background:#fee2e2; color:#991b1b; border:1px solid #fca5a5;">📄 匯出 PDF (黑白列印排版)</button>
                <button class="btn-primary" onclick="window.executeExport('xlsx')" style="background:#dcfce7; color:#065f46; border:1px solid #6ee7b7;">📊 匯出 Excel 表格 (.xlsx)</button>

<div id="asset-modal-overlay" class="modal-overlay" onclick="if(event.target===this) window.closeAssetModal()">

                <button type="button" id="btn-type-consumable" onclick="window.switchAssetMainType('consumable')" style="flex:1; padding:8px; border:none; background:white; color:var(--text-main); font-weight:bold; cursor:pointer;">📦 消耗品</button>

            <div class="form-group"><label>資產名稱</label><input type="text" id="asset-item" placeholder="未命名設備 (選填)" oninput="window.autoFillAssetProperties('fixed')"></div>

        <div id="consumable-asset-fields" style="display:none;">
            <!-- ✨ 新增：智慧同名帶入 -->
            <div class="form-group"><label>消耗品名稱</label><input type="text" id="consumable-item" placeholder="例如：A4 影印紙 (必填)" oninput="window.autoFillAssetProperties('consumable')"></div>
            <div class="form-group"><label>分類標籤</label><input type="text" id="consumable-tag" placeholder="例如：文具、清潔用品 (選填)"></div>
            <div class="form-group" style="display:flex; gap: 10px;"><div style="flex:2;"><label>目前庫存</label><input type="number" id="consumable-quantity" placeholder="0" min="0"></div><div style="flex:1;"><label>單位</label><input type="text" id="consumable-unit" placeholder="箱/包"></div></div>
            <div class="form-group" style="background:#fff7ed; padding:8px; border-radius:6px; border:1px solid #fef08a;"><label style="color:#b45309;">⚠️ 最低安全庫存 (0或空白即不警告)</label><input type="number" id="consumable-min" placeholder="預設: 10" min="0" style="border-color:#fef08a;"></div>
            <div class="form-group"><label>領取聯絡人</label><input type="text" id="consumable-contact" placeholder="例如：王小明"></div>
            <div class="form-group"><label>備註</label><input type="text" id="consumable-remarks" placeholder="補充說明..."></div>
        </div>

        <div class="modal-footer" style="justify-content: space-between;"><div style="display:flex; gap:10px;"><button class="btn-secondary" onclick="window.closeAssetModal()">取消</button><button class="btn-primary" onclick="window.saveAssetData()">儲存</button></div></div>
    </div>
</div>

<script type="module">
    import { collection, onSnapshot, doc, setDoc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const $ = id => document.getElementById(id);
    const $$ = sel => document.querySelectorAll(sel);
    const chartPalette = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16', '#eab308'];

    let db, auth;
    let globalAssets = [], globalOffices = [], globalMembers = [], globalCheckouts = [];
    
    // ✨ 排序與過濾系統全域變數
    window.summaryCurrentPage = 1;
    window.summaryItemsPerPage = 50;
    window.tableSort = { col: 'time', dir: 'desc' };
    window.tableFilters = { summary: {}, registry: {} };

    window.displayMode = { 'cons': 'qty', 'fixed': 'qty' };
    window.showOnlyShortage = false; 
    window.pendingImports = []; 
    window.currentEditAssetId = null;

    window.checkoutStatsRange = 'all';

    // 教學系統變數與防護鎖
    window.currentTutorialStep = 0;
    let tutorialTimer = null; 

    const tutorialData = [
        { title: "1. 介紹總覽標籤頁", text: "「總覽」提供三大環形儀表板，點擊可切換顯示數量或百分比。下方表格表頭支援點擊排序與「⋯」多重篩選過濾，右下角「＋」可叫出專屬的匯入與匯出資料中心。", tab: "summary", targets: ['#tutorial-target-stats', '#fab-container'] },
        { title: "2. 介紹登記標籤頁", text: "「登記」標籤頁提供領用紀錄與柱狀圖即時統計，右下角匯入表單支援同步扣除消耗品庫存。點擊上方「領用登記」按鈕即可快速紀錄出入庫狀態！", tab: "registry", targets: ['#stats-dashboard-registry', '#fab-container'] }
    ];

    const isRealEnvironment = window.location.hostname.length > 0 && !window.location.href.startsWith('blob:');
    if (isRealEnvironment) { import('./js/firebase-config.js').then(m => { db = m.db; auth = m.auth; initializeApp(); }).catch(e => showError('載入設定檔失敗：' + e.message)); } 
    else { showError('⚠️ 線上預覽模式無法跨檔案載入，請於本機 VS Code 中測試。'); }

    function showError(msg) { if($('loading-msg')) { $('loading-msg').innerHTML = msg; $('loading-msg').style.color = 'var(--danger)'; } }

    let currentUserProfile = {};
    let isAppInitialized = false; 

    function initializeApp() {
        onAuthStateChanged(auth, (user) => {
            if (!user) { $('loading-msg').innerHTML = `⛔ 尚未登入，請回首頁登入！`; $('loading-msg').style.color = 'var(--danger)'; return; }
            $('loading-msg').style.display = 'none'; 
            currentUserProfile = { name: user.displayName || '訪客', email: user.email || 'anonymous', avatar: user.photoURL || 'https://via.placeholder.com/32' };
            
            if (!isAppInitialized) {
                isAppInitialized = true;
                fetchData(); 
                initDragSelect();
                
                const savedTab = localStorage.getItem('assets_total_tab') || 'summary';
                window.switchTab(savedTab === 'feed' ? 'summary' : savedTab);

                if(!localStorage.getItem('pmo_tutorial_seen')) {
                    setTimeout(() => window.startTutorial(), 1000);
                    localStorage.setItem('pmo_tutorial_seen', '1');
                }
            }
        });
    }

    function fetchData() {
        onSnapshot(collection(db, "offices"), (s) => { globalOffices = s.docs.map(d => ({ id: d.id, ...d.data() })); populateOfficeSelects(); window.renderCurrentView(); });
        onSnapshot(collection(db, "members"), (s) => { globalMembers = s.docs.map(d => ({ id: d.id, ...d.data() })); window.renderCurrentView(); });
        onSnapshot(collection(db, "assets"), (s) => { globalAssets = s.docs.map(d => ({ id: d.id, ...d.data() })); window.renderCurrentView(); });
        onSnapshot(collection(db, "asset_checkouts"), (s) => { 
            globalCheckouts = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            if(window.currentTab === 'registry') window.renderCurrentView(); 
        });
    }

    function populateOfficeSelects() {
        let html = '<option value="">-- 未分配 / 留空 --</option>';
        [...globalOffices].sort((a,b) => (a.floor||'').localeCompare(b.floor||'')).forEach(o => { html += `<option value="${o.id}">[${o.floor||'未知'}] ${o.name}</option>`; });
        if($('asset-office-id')) $('asset-office-id').innerHTML = html;
        if($('batch-move-target-office')) $('batch-move-target-office').innerHTML = html;
        if($('preview-batch-office')) $('preview-batch-office').innerHTML = html;
    }

    // ======== ✨ 拖曳多選與懸浮列 ========
    function initDragSelect() {
        let isDragging = false, targetState = false;
        const handleMouseDown = (e) => { const tr = e.target.closest('tr'); if (tr && !e.target.closest('button')) { const cb = tr.querySelector('.batch-checkbox'); if (cb) { isDragging = true; targetState = e.target.classList.contains('batch-checkbox') ? e.target.checked : !cb.checked; cb.checked = targetState; window.updateFloatingBar(); e.preventDefault(); } } };
        const handleMouseOver = (e) => { if (isDragging) { const tr = e.target.closest('tr'); if (tr) { const cb = tr.querySelector('.batch-checkbox'); if (cb && cb.checked !== targetState) { cb.checked = targetState; window.updateFloatingBar(); } } } };
        const handleMouseUp = () => { isDragging = false; };
        document.querySelectorAll('.notion-table tbody').forEach(tb => { tb.addEventListener('mousedown', handleMouseDown); tb.addEventListener('mouseover', handleMouseOver); });
        window.addEventListener('mouseup', handleMouseUp);
    }

    window.toggleAllCheckboxes = (className, el) => { $$('.' + className).forEach(cb => cb.checked = el.checked); window.updateFloatingBar(); };
    window.toggleAllPreview = (el) => { $$('.cb-preview-row').forEach(cb => cb.checked = el.checked); };
    window.clearBatchSelection = () => { $$('.batch-checkbox').forEach(cb => cb.checked = false); window.updateFloatingBar(); };

    window.updateFloatingBar = () => {
        let sel = [];
        if (window.currentTab === 'summary') sel = Array.from($$('.cb-summary-row:checked')).map(cb => cb.value);
        if (window.currentTab === 'registry') sel = Array.from($$('.cb-checkout-row:checked')).map(cb => cb.value);

        const bar = $('floating-batch-bar'); const countSpan = $('batch-sel-count');
        if (!bar || !countSpan) return;
        if (sel.length > 0) { 
            countSpan.innerText = `已選擇 ${sel.length} 項`; bar.classList.add('show'); 
            if (window.currentTab === 'registry') {
                bar.innerHTML = `<button onclick="window.clearBatchSelection()" style="background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer; text-decoration:underline; margin-right:10px;">❌ 取消多選</button><span id="batch-sel-count" style="font-size:15px; font-weight:bold; color:var(--primary); margin-right:15px; border-right:2px solid #e2e8f0; padding-right:15px;">已選擇 ${sel.length} 項</span><button class="btn-danger" style="background:#fef2f2; color:#991b1b; border:1px dashed #fca5a5;" onclick="window.batchDeleteCheckouts()">🗑️ 刪除紀錄</button>`;
            } else {
                bar.innerHTML = `<button onclick="window.clearBatchSelection()" style="background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer; text-decoration:underline; margin-right:10px;">❌ 取消多選</button><span id="batch-sel-count" style="font-size:15px; font-weight:bold; color:var(--primary); margin-right:15px; border-right:2px solid #e2e8f0; padding-right:15px;">已選擇 ${sel.length} 項</span><button class="btn-primary" style="background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe;" onclick="window.openBatchMoveModal()">🔄 轉移</button><button class="btn-primary" style="background:#fefce8; color:#854d0e; border:1px solid #fef08a;" onclick="window.openBatchEditModal()">✏️ 編輯屬性</button><button class="btn-danger" style="background:#fef2f2; color:#991b1b; border:1px dashed #fca5a5;" onclick="window.batchDeleteAssets()">🗑️ 刪除</button>`;
            }
        } else { bar.classList.remove('show'); }
    };

    function getSelectedIds() { return window.currentTab === 'summary' ? Array.from($$('.cb-summary-row:checked')).map(cb => cb.value) : []; }

    // ======== ✨ 滿版圓環圖引擎 ========
    window.toggleDataDisplay = (type) => { window.displayMode[type] = window.displayMode[type] === 'qty' ? 'percent' : 'qty'; window.renderSummary(); };

    function drawSvgDonut(containerId, dataArray, totalValStr, percentValStr, totalLbl, percentLbl, typeKey) {
        const c = $(containerId); if(!c) return;
        const total = dataArray.reduce((sum, d) => sum + d.value, 0);
        let html = `<svg viewBox="0 0 200 200" style="width:100%; height:100%; overflow:visible;">`;
        if (total === 0) { html += `<circle cx="100" cy="100" r="80" fill="none" stroke="#f1f5f9" stroke-width="30"></circle>`; } 
        else {
            let acc = 0; const C = 2 * Math.PI * 80; 
            dataArray.forEach((d, i) => {
                if(d.value === 0) return; const pct = d.value / total; const dashArr = `${pct * C} ${C}`; const dashOff = - (acc / total) * C; const color = d.color || chartPalette[i % chartPalette.length];
                let hoverVal = typeKey && window.displayMode[typeKey] === 'percent' ? Math.round(pct*100)+'%' : d.value; if(containerId === 'chart-shortage') hoverVal = d.value;
                html += `<circle cx="100" cy="100" r="80" fill="none" stroke="${color}" stroke-width="30" stroke-dasharray="${dashArr}" stroke-dashoffset="${dashOff}" transform="rotate(-90 100 100)" style="transition: stroke-width 0.2s; cursor:pointer;" data-lbl="${d.label}" data-val="${hoverVal}" data-color="${color}" onmouseover="window.hoverSvgDonut(this, '${containerId}')" onmouseout="window.outSvgDonut(this, '${containerId}')"><title>${d.label}: ${d.value}</title></circle>`; acc += d.value;
            });
        }
        
        let isPct = typeKey && window.displayMode[typeKey] === 'percent';
        let displayVal = isPct ? percentValStr : totalValStr; 
        let displayLbl = isPct ? percentLbl : totalLbl;
        if(containerId === 'chart-shortage') { displayVal = totalValStr; displayLbl = totalLbl; isPct = true; } 
        
        c.dataset.origVal = displayVal; c.dataset.origLbl = displayLbl;
        html += `<text id="${containerId}-val" x="100" y="95" text-anchor="middle" dominant-baseline="central" font-size="${isPct ? '28' : '32'}" font-weight="bold" fill="var(--text-main)" style="pointer-events:none; transition:0.2s;">${displayVal}</text><text id="${containerId}-lbl" x="100" y="135" text-anchor="middle" dominant-baseline="central" font-size="13" fill="var(--text-muted)" style="pointer-events:none;">${displayLbl}</text></svg>`; c.innerHTML = html;
    }

    window.hoverSvgDonut = (el, cid) => { el.setAttribute('stroke-width', '40'); const v = $(cid+'-val'), l = $(cid+'-lbl'); if(v) { v.textContent = el.dataset.val; v.setAttribute('fill', el.dataset.color); } if(l) l.textContent = el.dataset.lbl; };
    window.outSvgDonut = (el, cid) => { el.setAttribute('stroke-width', '30'); const c = $(cid), v = $(cid+'-val'), l = $(cid+'-lbl'); if(v && c) { v.textContent = c.dataset.origVal; v.setAttribute('fill', 'var(--text-main)'); } if(l && c) l.textContent = c.dataset.origLbl; };

    // ======== ✨ 統一排序與過濾引擎 ========
    window.getSortIcon = (col) => {
        if (window.tableSort.col === col) {
            return window.tableSort.dir === 'desc' ? '<span style="color:var(--danger); font-size:12px; margin-left:4px;">⬇</span>' : '<span style="color:var(--success); font-size:12px; margin-left:4px;">⬆</span>';
        }
        return '';
    };

    window.isFiltered = (tab, col) => { return window.tableFilters[tab][col] !== undefined; };

    window.handleSort = (col) => {
        if (window.tableSort.col === col) window.tableSort.dir = window.tableSort.dir === 'desc' ? 'asc' : 'desc';
        else { window.tableSort.col = col; window.tableSort.dir = 'desc'; }
        if (window.currentTab === 'summary') window.summaryCurrentPage = 1;
        window.renderCurrentView();
    };

    window.getMappedSummaryData = () => {
        return globalAssets.map(a => {
            let off = globalOffices.find(o => o.id === a.office_id);
            let offName = off ? `[${off.floor||'?'}] ${off.name}` : '未分配';
            let tag = a.assetType === 'consumable' ? (a.tag || '未分類') : (a.category || '其他');
            let contact = a.assetType === 'consumable' ? (a.contactPerson || '-') : (a.owner_id ? (globalMembers.find(m=>m.id===a.owner_id)?.name || '💻 公用設備') : '💻 公用設備');
            let qty = parseInt(a.quantity) || 0;
            return { ...a, _offName: offName, _tag: tag, _contact: contact, _qty: qty };
        });
    };

    window.getMappedRegistryData = () => {
        return globalCheckouts.map(c => ({
            ...c, _name: c.assetName || '-', _office: c.officeName || '-', _qty: parseInt(c.quantity) || 1, _borrower: c.borrower || '-', _date: c.checkoutDate ? c.checkoutDate.replace('T', ' ') : '-'
        }));
    };

    window.openFilter = (e, tab, colKey, colName) => {
        e.stopPropagation();
        let data = tab === 'summary' ? window.getMappedSummaryData() : window.getMappedRegistryData();
        
        let uniqueVals = [...new Set(data.map(d => String(d[colKey] !== undefined ? d[colKey] : '')))].sort();

        let activeFilters = window.tableFilters[tab][colKey];
        if (!activeFilters) activeFilters = uniqueVals;

        let html = `
            <div style="font-weight:bold; margin-bottom:5px; color:var(--primary); font-size:15px;">篩選：${colName}</div>
            <div style="display:flex; gap:10px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px dashed #cbd5e1;">
                <button class="btn-secondary" onclick="window.selectAllFilter(true)" style="padding:4px 8px; font-size:12px; flex:1;">全選</button>
                <button class="btn-secondary" onclick="window.selectAllFilter(false)" style="padding:4px 8px; font-size:12px; flex:1;">全不選</button>
            </div>
            <div id="filter-cb-list">
        `;
        uniqueVals.forEach(v => {
            let checked = activeFilters.includes(v) ? 'checked' : '';
            let dispV = v === '' ? '(空白)' : v;
            html += `<label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; padding:4px 0; color:var(--text-main);"><input type="checkbox" class="col-filter-cb" value="${v}" ${checked} style="width:16px; height:16px; cursor:pointer;"> ${dispV}</label>`;
        });
        html += `
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:15px; border-top:1px solid #e2e8f0; padding-top:10px;">
                <button class="btn-danger" onclick="window.clearColFilter('${tab}', '${colKey}')" style="padding:6px 12px; font-size:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5;">清除條件</button>
                <button class="btn-primary" onclick="window.applyColFilter('${tab}', '${colKey}')" style="padding:6px 16px; font-size:12px;">套用篩選</button>
            </div>
        `;
        
        const panel = $('col-filter-panel');
        panel.innerHTML = html; panel.style.display = 'flex';
        
        const rect = e.target.getBoundingClientRect();
        let left = rect.left; if (left + 220 > window.innerWidth) left = window.innerWidth - 240;
        panel.style.top = (rect.bottom + 5) + 'px'; panel.style.left = left + 'px';
    };

    window.selectAllFilter = (check) => { $$('.col-filter-cb').forEach(cb => cb.checked = check); };
    window.clearColFilter = (tab, col) => { delete window.tableFilters[tab][col]; $('col-filter-panel').style.display='none'; if(tab==='summary') window.summaryCurrentPage=1; window.renderCurrentView(); };
    window.applyColFilter = (tab, col) => { 
        let cbs = Array.from($$('.col-filter-cb:checked')).map(cb => cb.value);
        window.tableFilters[tab][col] = cbs; 
        $('col-filter-panel').style.display='none'; 
        if(tab==='summary') window.summaryCurrentPage=1; 
        window.renderCurrentView(); 
    };

    // ======== 視圖切換與渲染 ========
    window.switchTab = (tab) => {
        window.currentTab = tab; localStorage.setItem('assets_total_tab', tab);
        $$('.tab-btn').forEach(b => b.classList.remove('active')); $(`tab-btn-${tab}`).classList.add('active');
        $$('.view').forEach(v => v.classList.remove('active')); $(`view-${tab}`).classList.add('active');
        
        window.clearBatchSelection(); window.renderCurrentView();
    };

    window.renderCurrentView = () => { 
        if (window.currentTab === 'summary') window.renderSummary(); 
        else if (window.currentTab === 'registry') window.renderCheckouts(); 
    };

    window.toggleShortageFilter = () => { window.showOnlyShortage = !window.showOnlyShortage; window.summaryCurrentPage = 1; const card = $('card-shortage'); if(window.showOnlyShortage) { card.classList.add('active-filter'); } else { card.classList.remove('active-filter'); } window.renderSummary(); };

    function renderStatsDashboardHtml(prefix) {
        window.checkoutStatsRange = window.checkoutStatsRange || 'all'; 
        return `
        <div class="checkout-stats-wrapper">
            <div style="text-align:center;">
                <button class="btn-primary" style="font-size:18px; padding:15px 30px; border-radius:30px; box-shadow:0 4px 15px rgba(37,99,235,0.3);" onclick="window.openCheckoutModal()">📝 領用登記</button>
            </div>
            <div style="flex:1; border-left:2px dashed #cbd5e1; padding-left:20px; min-width:300px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div style="font-weight:bold; color:var(--text-main); font-size:16px;">📊 借用狀態統計</div>
                    <select id="${prefix}-stats-range" onchange="window.checkoutStatsRange = this.value; window.renderCheckoutStats()" style="border:1px solid #cbd5e1; border-radius:6px; padding:4px 8px; font-size:13px; outline:none; font-weight:bold; color:var(--primary); cursor:pointer;">
                        <option value="all" ${window.checkoutStatsRange === 'all' ? 'selected' : ''}>全部歷史</option>
                        <option value="month" ${window.checkoutStatsRange === 'month' ? 'selected' : ''}>本月</option>
                        <option value="week" ${window.checkoutStatsRange === 'week' ? 'selected' : ''}>當週</option>
                        <option value="day" ${window.checkoutStatsRange === 'day' ? 'selected' : ''}>今日</option>
                    </select>
                </div>
                <div style="display:flex; gap:25px; align-items:center;">
                    <div style="text-align:center; padding-right:25px; border-right:1px solid #e2e8f0;">
                        <div style="font-size:12px; color:var(--text-muted); margin-bottom:4px;" id="${prefix}-lbl-stats-total">全部歷史領用總數</div>
                        <div id="${prefix}-stats-total-qty" style="font-size:32px; font-weight:bold; color:var(--primary); line-height:1;">0</div>
                    </div>
                    <div id="${prefix}-stats-top-items" style="flex:1; display:flex; flex-direction:column; gap:6px;"></div>
                </div>
            </div>
        </div>`;
    }

    // ✨ 1. 總覽渲染：合併動態表頭與分頁
    window.changeSummaryPage = (delta) => { window.summaryCurrentPage += delta; window.clearBatchSelection(); window.renderSummary(); };

    window.renderSummary = () => {
        const keyword = ($('search-input') ? $('search-input').value.toLowerCase().trim() : '');
        const cons = globalAssets.filter(a => a.assetType === 'consumable');
        const fixed = globalAssets.filter(a => a.assetType !== 'consumable');

        // 圖表數據計算
        const totalConsQty = cons.reduce((sum, c) => sum + (parseInt(c.quantity) || 0), 0);
        const totalFixedCount = fixed.length;
        const totalItemsQty = totalConsQty + totalFixedCount;

        const consTagMap = {};
        cons.forEach(c => { const t = c.tag || '未分類'; const q = parseInt(c.quantity) || 0; consTagMap[t] = (consTagMap[t]||0) + q; });
        const consChartData = Object.keys(consTagMap).map(k => ({ label: k, value: consTagMap[k] }));
        
        const fixedCatMap = {};
        fixed.forEach(c => { const t = c.category || '其他'; fixedCatMap[t] = (fixedCatMap[t]||0) + 1; });
        const fixedChartData = Object.keys(fixedCatMap).map(k => ({ label: k, value: fixedCatMap[k] }));
        
        const consPctStr = totalItemsQty === 0 ? '0%' : Math.round((totalConsQty / totalItemsQty) * 100) + '%';
        const fixedPctStr = totalItemsQty === 0 ? '0%' : Math.round((totalFixedCount / totalItemsQty) * 100) + '%';

        let groupedConsMap = {};
        cons.forEach(c => {
            let key = `${c.tag || '未分類'}_${c.item}`;
            if (!groupedConsMap[key]) groupedConsMap[key] = { qty: 0, threshold: c.minThreshold !== undefined ? parseInt(c.minThreshold) : 10 };
            groupedConsMap[key].qty += (parseInt(c.quantity) || 0);
        });
        
        let shortageKinds = 0, normalKinds = 0;
        Object.values(groupedConsMap).forEach(g => { if(g.threshold > 0 && g.qty < g.threshold) shortageKinds++; else normalKinds++; });
        let shortagePercent = (shortageKinds + normalKinds) === 0 ? 0 : Math.round((shortageKinds / (shortageKinds + normalKinds)) * 100);
        const shortageChartData = [{ label: '庫存不足', value: shortageKinds, color: '#ef4444' }, { label: '安全', value: normalKinds, color: '#10b981' }];

        drawSvgDonut('chart-cons', consChartData, totalConsQty, consPctStr, '總數量', `消耗品 / 所有資產`, 'cons');
        drawSvgDonut('chart-fixed', fixedChartData, totalFixedCount, fixedPctStr, '總件數', `固定資產 / 所有資產`, 'fixed');
        drawSvgDonut('chart-shortage', shortageChartData, shortagePercent + '%', '', window.showOnlyShortage ? '解除過濾' : '不足率', null, null);

        // 動態生成表頭
        const thead = $('summary-table-thead'); 
        thead.innerHTML = `<tr>
            <th style="width: 40px; text-align:center;"><input type="checkbox" id="cb-select-all-summary" class="batch-checkbox" onchange="window.toggleAllCheckboxes('cb-summary-row', this)"></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_tag')">🏷️ 標籤/類型 ${window.getSortIcon('_tag')}</span><span class="th-filter-btn ${window.isFiltered('summary','_tag')?'active-filter':''}" onclick="window.openFilter(event, 'summary', '_tag', '標籤/類型')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('item')">Aa 名稱 ${window.getSortIcon('item')}</span><span class="th-filter-btn ${window.isFiltered('summary','item')?'active-filter':''}" onclick="window.openFilter(event, 'summary', 'item', '名稱')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_qty')">🔢 數量/狀態 ${window.getSortIcon('_qty')}</span><span class="th-filter-btn ${window.isFiltered('summary','_qty')?'active-filter':''}" onclick="window.openFilter(event, 'summary', '_qty', '數量/狀態')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_offName')">🏢 存放辦公室 ${window.getSortIcon('_offName')}</span><span class="th-filter-btn ${window.isFiltered('summary','_offName')?'active-filter':''}" onclick="window.openFilter(event, 'summary', '_offName', '存放辦公室')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_contact')">👤 聯絡/使用者 ${window.getSortIcon('_contact')}</span><span class="th-filter-btn ${window.isFiltered('summary','_contact')?'active-filter':''}" onclick="window.openFilter(event, 'summary', '_contact', '聯絡/使用者')">⋯</span></div></th>
            <th>📝 備註</th>
        </tr>`;

        const tb = $('summary-table-tbody'); 
        if($('cb-select-all-summary')) $('cb-select-all-summary').checked = false;

        let allMapped = window.getMappedSummaryData();

        let allFiltered = allMapped.filter(a => {
            const matchKw = (a.item||'').toLowerCase().includes(keyword) || (a._tag||'').toLowerCase().includes(keyword) || (a.category||'').toLowerCase().includes(keyword) || (a.sn||'').toLowerCase().includes(keyword) || (a._contact||'').toLowerCase().includes(keyword) || (a.remarks||'').toLowerCase().includes(keyword);
            if (!matchKw) return false;
            
            if (window.showOnlyShortage) {
                if (a.assetType !== 'consumable') return false;
                const minT = a.minThreshold !== undefined ? parseInt(a.minThreshold) : 10;
                return minT > 0 && a._qty < minT;
            }

            let passFilter = true;
            Object.keys(window.tableFilters.summary).forEach(colKey => {
                let checkedVals = window.tableFilters.summary[colKey];
                if (checkedVals && checkedVals.length > 0) {
                    if (!checkedVals.includes(String(a[colKey] !== undefined ? a[colKey] : ''))) passFilter = false;
                } else if (window.tableFilters.summary[colKey] !== undefined) {
                    passFilter = false; 
                }
            });
            return passFilter;
        });

        // ✨ 統一排序邏輯修復
        allFiltered.sort((a, b) => {
            let col = window.tableSort.col;
            let dir = window.tableSort.dir;
            
            if (col === '_tag') {
                let typeA = a.assetType === 'consumable' ? 1 : 0;
                let typeB = b.assetType === 'consumable' ? 1 : 0;
                
                if (dir === 'desc') {
                    if (typeA !== typeB) return typeA - typeB; // 固定資產優先
                    return String(a._tag).localeCompare(String(b._tag), 'zh-TW');
                } else {
                    if (typeA !== typeB) return typeB - typeA; // 消耗品優先
                    return String(a._tag).localeCompare(String(b._tag), 'zh-TW');
                }
            }

            let va = a[col] !== undefined ? a[col] : (a.createdAt||'');
            let vb = b[col] !== undefined ? b[col] : (b.createdAt||'');
            
            let cmp = 0;
            if ((col === 'qty' || col === '_qty') && typeof va === 'number' && typeof vb === 'number') {
                cmp = va - vb;
            } else {
                cmp = String(va).localeCompare(String(vb), 'zh-TW', {numeric:true});
            }
            return dir === 'desc' ? -cmp : cmp;
        });

        const totalItems = allFiltered.length;
        const totalPages = Math.ceil(totalItems / window.summaryItemsPerPage) || 1;
        if (window.summaryCurrentPage > totalPages) window.summaryCurrentPage = totalPages;
        
        const startIdx = (window.summaryCurrentPage - 1) * window.summaryItemsPerPage;
        const pageData = allFiltered.slice(startIdx, startIdx + window.summaryItemsPerPage);

        let htmlStr = '';
        pageData.forEach(a => {
            let tagHtml = '', qtyHtml = '', contactHtml = a._contact;
            
            if (a.assetType === 'consumable') {
                tagHtml = `<span class="badge tag">${a._tag}</span>`;
                const minT = a.minThreshold !== undefined ? parseInt(a.minThreshold) : 10;
                const isLow = minT > 0 && a._qty < minT;
                if (isLow) qtyHtml = `<span style="font-size:18px; font-weight:bold; color:var(--danger);">${a._qty}</span> <span style="font-size:13px;">${a.unit || '個'}</span><div style="color:var(--danger); font-size:11px; font-weight:bold; margin-top:4px;">⚠️ 需補 ${minT - a._qty}</div>`; 
                else qtyHtml = `<span style="font-size:18px; font-weight:bold; color:var(--primary);">${a._qty}</span> <span style="font-size:13px;">${a.unit || '個'}</span>`;
            } else {
                tagHtml = `<span class="badge tag" style="background:#e0e7ff; color:#4f46e5;">${a._tag}</span>`;
                let si = a.status === '正常' ? '🟢 正常' : a.status === '待修' ? '🔴 待修' : a.status === '報廢' ? '⚫ 報廢' : a.status === '碳粉不足' ? '🟡 碳粉不足' : '⚪ 其他';
                qtyHtml = `<div style="font-family:monospace; font-weight:bold; color:var(--danger); margin-bottom:4px;">SN: ${a.sn || 'N/A'}</div><div style="font-size:12px; font-weight:bold; color:var(--text-main);">${si}</div>`;
            }

            htmlStr += `<tr><td style="text-align:center;"><input type="checkbox" class="cb-summary-row batch-checkbox" value="${a.id}" onchange="window.updateFloatingBar()"></td><td>${tagHtml}</td><td onclick="window.openAssetModal('${a.id}')"><b style="font-size:15px; color:var(--primary); cursor:pointer;" title="點擊編輯">${a.item}</b></td><td>${qtyHtml}</td><td><span style="font-weight:bold; color:var(--text-main);">${a._offName}</span></td><td>${contactHtml}</td><td style="font-size:12px; color:var(--text-muted); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${a.remarks || '-'}</td></tr>`;
        });
        
        if (allFiltered.length === 0) htmlStr = '<tr><td colspan="7" style="text-align:center; padding:30px; color:#94a3b8;">找不到符合條件的資產或消耗品。</td></tr>';
        tb.innerHTML = htmlStr;

        let pageHtml = `<button class="btn-secondary" onclick="window.changeSummaryPage(-1)" ${window.summaryCurrentPage === 1 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>◀ 上一頁</button><span style="font-weight:bold; color:var(--text-main); font-size:14px;">第 ${window.summaryCurrentPage} / ${totalPages} 頁 (共 ${totalItems} 項)</span><button class="btn-secondary" onclick="window.changeSummaryPage(1)" ${window.summaryCurrentPage === totalPages || totalPages === 0 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>下一頁 ▶</button>`;
        $('summary-pagination').innerHTML = totalItems > 0 ? pageHtml : '';
        window.updateFloatingBar();
    };

    // ✨ 2. 登記：領用紀錄表格渲染 (動態表頭與篩選)
    window.toggleCheckoutSort = () => { window.registrySortOrder = window.registrySortOrder === 'desc' ? 'asc' : 'desc'; $('checkout-sort-icon').innerText = window.registrySortOrder === 'desc' ? '⬇' : '⬆'; window.renderCheckouts(); };

    window.renderCheckouts = () => {
        const srContainer = $('stats-dashboard-registry');
        if (srContainer && !srContainer.innerHTML) {
            srContainer.innerHTML = renderStatsDashboardHtml('registry');
        }

        const thead = $('registry-table-thead');
        thead.innerHTML = `<tr>
            <th style="width: 40px; text-align:center;"><input type="checkbox" id="cb-select-all-checkout" class="batch-checkbox" onchange="window.toggleAllCheckboxes('cb-checkout-row', this)"></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_name')">Aa 名稱 ${window.getSortIcon('_name')}</span><span class="th-filter-btn ${window.isFiltered('registry','_name')?'active-filter':''}" onclick="window.openFilter(event, 'registry', '_name', '名稱')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_office')">🏢 存放辦公室 ${window.getSortIcon('_office')}</span><span class="th-filter-btn ${window.isFiltered('registry','_office')?'active-filter':''}" onclick="window.openFilter(event, 'registry', '_office', '存放辦公室')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_qty')">🔢 出庫數量 ${window.getSortIcon('_qty')}</span><span class="th-filter-btn ${window.isFiltered('registry','_qty')?'active-filter':''}" onclick="window.openFilter(event, 'registry', '_qty', '出庫數量')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_borrower')">👤 領取人 ${window.getSortIcon('_borrower')}</span><span class="th-filter-btn ${window.isFiltered('registry','_borrower')?'active-filter':''}" onclick="window.openFilter(event, 'registry', '_borrower', '領取人')">⋯</span></div></th>
            <th><div class="th-content"><span class="th-sort" onclick="window.handleSort('_date')">📅 日期 ${window.getSortIcon('_date')}</span><span class="th-filter-btn ${window.isFiltered('registry','_date')?'active-filter':''}" onclick="window.openFilter(event, 'registry', '_date', '日期')">⋯</span></div></th>
            <th>📝 備註</th>
            <th>🗑️ 刪除</th>
        </tr>`;

        const tb = $('checkout-tbody');
        if($('cb-select-all-checkout')) $('cb-select-all-checkout').checked = false;
        
        const keyword = ($('search-input') ? $('search-input').value.toLowerCase().trim() : '');
        let allMapped = window.getMappedRegistryData();

        let filtered = allMapped.filter(c => {
            const matchKw = (c._name).toLowerCase().includes(keyword) || (c._borrower).toLowerCase().includes(keyword) || (c._office).toLowerCase().includes(keyword) || (c.remarks||'').toLowerCase().includes(keyword);
            if (!matchKw) return false;

            let passFilter = true;
            Object.keys(window.tableFilters.registry).forEach(colKey => {
                let checkedVals = window.tableFilters.registry[colKey];
                if (checkedVals && checkedVals.length > 0) {
                    if (!checkedVals.includes(String(c[colKey] !== undefined ? c[colKey] : ''))) passFilter = false;
                } else if (window.tableFilters.registry[colKey] !== undefined) {
                    passFilter = false; 
                }
            });
            return passFilter;
        });

        if (filtered.length === 0) {
            tb.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:#94a3b8;">找不到符合條件的紀錄。</td></tr>';
            window.renderCheckoutStats(); 
            return;
        }

        filtered.sort((a, b) => {
            let col = window.tableSort.col;
            let dir = window.tableSort.dir;
            let va = a[col] !== undefined ? a[col] : (a._date||'');
            let vb = b[col] !== undefined ? b[col] : (b._date||'');
            
            let cmp = 0;
            if ((col === 'qty' || col === '_qty') && typeof va === 'number' && typeof vb === 'number') {
                cmp = va - vb;
            } else {
                cmp = String(va).localeCompare(String(vb), 'zh-TW', {numeric:true});
            }
            return dir === 'desc' ? -cmp : cmp;
        });

        let htmlStr = '';
        filtered.forEach(c => {
            htmlStr += `<tr>
                <td style="text-align:center;"><input type="checkbox" class="cb-checkout-row batch-checkbox" value="${c.id}" onchange="window.updateFloatingBar()"></td>
                <td><b style="font-size:15px; color:var(--primary);">${c._name}</b></td>
                <td><span style="font-weight:bold; color:var(--text-main);">${c._office}</span></td>
                <td><span style="font-size:18px; font-weight:bold; color:var(--danger);">${c._qty}</span></td>
                <td><span style="font-weight:bold;">${c._borrower}</span></td>
                <td style="font-family:monospace; color:var(--text-muted);">${c._date}</td>
                <td style="font-size:12px; color:var(--text-muted); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.remarks || '-'}</td>
                <td><button class="btn-danger" style="padding:4px 8px; font-size:12px;" onclick="window.deleteSingleRecord('${c.id}', event)">🗑️</button></td>
            </tr>`;
        });
        tb.innerHTML = htmlStr;
        
        window.renderCheckoutStats(); 
        window.updateFloatingBar();
    };

    // ✨ 領用統計長條圖 
    window.renderCheckoutStats = () => {
        const prefix = 'registry';
        const rangeSelect = $(`${prefix}-stats-range`);
        const range = rangeSelect ? rangeSelect.value : (window.checkoutStatsRange || 'all');
        let targetRecords = [];
        const now = new Date();
        let labelText = '總領用數';
        
        if (range === 'day') {
            const todayStr = now.toISOString().split('T')[0];
            targetRecords = globalCheckouts.filter(c => (c.checkoutDate||'').startsWith(todayStr));
            labelText = '今日領用總數';
        } else if (range === 'week') {
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString();
            targetRecords = globalCheckouts.filter(c => (c.checkoutDate||'') >= weekAgo);
            labelText = '近7日領用總數';
        } else if (range === 'month') {
            const monthStr = now.toISOString().slice(0, 7); 
            targetRecords = globalCheckouts.filter(c => (c.checkoutDate||'').startsWith(monthStr));
            labelText = '本月領用總數';
        } else {
            targetRecords = globalCheckouts;
            labelText = '全部歷史領用總數';
        }

        const totalQty = targetRecords.reduce((sum, r) => sum + (parseInt(r.quantity)||1), 0);
        if($(`${prefix}-lbl-stats-total`)) $(`${prefix}-lbl-stats-total`).innerText = labelText;
        if($(`${prefix}-stats-total-qty`)) $(`${prefix}-stats-total-qty`).innerText = totalQty;

        const countMap = {};
        targetRecords.forEach(r => { 
            const qty = parseInt(r.quantity) || 1;
            countMap[r.assetName] = (countMap[r.assetName]||0) + qty; 
        }); 
        const sortedItems = Object.keys(countMap).map(k => ({ name: k, count: countMap[k] })).sort((a,b) => b.count - a.count).slice(0, 5);

        const maxCount = sortedItems.length > 0 ? sortedItems[0].count : 1;
        const topContainer = $(`${prefix}-stats-top-items`);
        if (topContainer) {
            let htmlStr = '';
            if (sortedItems.length === 0) { 
                htmlStr = '<div style="color:#94a3b8; font-size:13px; text-align:center;">此期間無領用紀錄</div>'; 
            } else {
                sortedItems.forEach((item, i) => {
                    const pct = Math.max(5, (item.count / maxCount) * 100);
                    const color = chartPalette[i % chartPalette.length];
                    htmlStr += `<div class="bar-chart-row"><div class="bar-chart-label" title="${item.name}">${item.name}</div><div class="bar-chart-track"><div class="bar-chart-fill" style="width:${pct}%; background:${color};"></div></div><div class="bar-chart-val">${item.count}件</div></div>`;
                });
            }
            topContainer.innerHTML = htmlStr;
        }
    };


    // ======== ✨ 主系統操作 (批次處理) ========
    window.openBatchMoveModal = () => { $('batch-move-modal-overlay').classList.add('active'); };

    window.handlePreviewImport = async (e) => {
        const file = e.target.files[0]; if (!file) return; e.target.value = '';
        const loader = $('loading-msg'); loader.innerHTML = '⏳ 正在解析表格...'; loader.style.display = 'block';
        
        const fileExt = file.name.split('.').pop().toLowerCase();
        const reader = new FileReader();

        reader.onload = async (evt) => {
            try {
                let workbook;
                if (fileExt === 'csv') {
                    const uint8 = new Uint8Array(evt.target.result);
                    let text = new TextDecoder('utf-8').decode(uint8);
                    if (text.includes('\uFFFD')) {
                        text = new TextDecoder('big5').decode(uint8);
                    }
                    workbook = XLSX.read(text, { type: 'string' });
                } else {
                    const data = new Uint8Array(evt.target.result); 
                    workbook = XLSX.read(data, { type: 'array' });
                }

                let targetSheetName = '';
                let hi = -1;
                let rawRows = [];

                for (let sheetName of workbook.SheetNames) {
                    const sheet = workbook.Sheets[sheetName];
                    const tempRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    const headerIdx = tempRows.findIndex(row => Array.isArray(row) && row.some(cell => {
                        if(typeof cell !== 'string') return false;
                        const s = cell.toLowerCase();
                        return ['名稱', '編號', 'item', '品名', '項目', '規格', '姓名', '資產', '設備', '船東'].some(k => s.includes(k));
                    }));
                    
                    if (headerIdx !== -1) {
                        targetSheetName = sheetName;
                        hi = headerIdx;
                        rawRows = tempRows;
                        break;
                    }
                }

                if (hi === -1) throw new Error("找不到有效的標題列 (需包含名稱、編號或姓名等關鍵字)");

                const headers = rawRows[hi] || [];
                const rows = rawRows.slice(hi + 1).map(row => { 
                    let obj = {}; 
                    headers.forEach((h, i) => { if (h !== undefined && h !== '') obj[h.toString().trim()] = row[i]; }); 
                    return obj; 
                });

                const isCheckoutFile = headers.some(h => String(h).includes('出庫') || String(h).includes('領取') || String(h).includes('領用')) || targetSheetName.includes('出入庫') || targetSheetName.includes('領用');
                $('import-target-type').value = isCheckoutFile ? 'checkouts' : 'assets';
                
                window.pendingImports = []; const seenFixedItems = new Set();
                const getVal = (r, possibleKeys) => { 
                    for (let pk of possibleKeys) { 
                        const foundKey = Object.keys(r).find(k => k.toLowerCase().includes(pk.toLowerCase())); 
                        if (foundKey && r[foundKey] !== undefined && r[foundKey] !== '') return String(r[foundKey]).trim(); 
                    } 
                    return ''; 
                };

                rows.forEach(r => {
                    let item = getVal(r, ['物品名稱', '機台名稱', '設備名稱', '品名', '消耗品名稱', '資產名稱', '船東姓名', '名稱', 'item', '項目']);
                    if (!item) {
                        item = getVal(r, ['編號', 'sn', '序號']);
                        if (!item) return; 
                    }

                    const isCons = Object.keys(r).some(k => k.includes('數量') || k.includes('單位') || k.includes('消耗') || k.includes('庫存')) || targetSheetName.includes('消耗') || targetSheetName.includes('庫存');
                    if (!isCons && !isCheckoutFile) { if (seenFixedItems.has(item)) return; seenFixedItems.add(item); }

                    const p = { 
                        id: 'preview_' + Math.random().toString(36).substr(2, 9), 
                        assetType: isCons ? 'consumable' : 'fixed', 
                        item: item.replace(/縮時/g, '').trim(), 
                        office_id: '', 
                        createdAt: new Date().toISOString(),
                        
                        checkoutQty: parseInt(getVal(r, ['出庫數量', '借用數量', '出庫'])) || 1,
                        borrower: getVal(r, ['領取人', '借用人', '參與人', '使用者', '船東姓名']) || currentUserProfile.name,
                        checkoutDate: getVal(r, ['日期', '時間', '檢查時間']) || new Date().toISOString().slice(0,16).replace('T',' '),
                        officeName: getVal(r, ['存放位置', '資產位置', '地點', '辦公室', '庫房']) || '未知',
                        
                        tag: getVal(r, ['標籤', '分類', '類別']), 
                        quantity: parseInt(getVal(r, ['庫存數量', '數量', '庫存', '入庫', 'qty'])) || 0, 
                        unit: getVal(r, ['單位', 'unit']) || '個', 
                        minThreshold: parseInt(getVal(r, ['最低庫存量', '最低庫存', '最低', '安全', '不足', 'min'])) || 0, 
                        contactPerson: getVal(r, ['聯絡人', '負責人', 'contact']), 
                        remarks: getVal(r, ['備註', '說明', 'remark']),
                        category: getVal(r, ['類型', '分類', '類別', '項目', 'category']) || '其他', 
                        sn: getVal(r, ['資產編號', 'SN', '序號', '編號']) || 'N/A', 
                        status: getVal(r, ['狀態', 'status']) || '正常',
                        year: parseInt(getVal(r, ['年份', 'year'])) || null
                    };
                    window.pendingImports.push(p);
                });
                
                if (window.pendingImports.length > 0) { window.renderPreviewModal(); $('import-preview-modal-overlay').classList.add('active'); } else { alert('表格無有效資料，請確認標題列是否包含名稱或編號等關鍵字。'); }
            } catch(err) { alert('解析失敗：' + err.message); } finally { loader.style.display = 'none'; }
        }; 
        reader.readAsArrayBuffer(file);
        
        const fc = $('fab-container'); if(fc) fc.classList.remove('active'); 
        const fm = $('fab-menu'); if(fm) fm.classList.remove('active'); 
        $$('.fab-submenu').forEach(s => s.classList.remove('open'));
    };

                htmlStr += `<tr><td style="text-align:center;"><input type="checkbox" class="cb-preview-row batch-checkbox" value="${p.id}"></td><td><b style="color:var(--primary);">${p.item}</b><br><span style="font-size:11px;">${matchStatus}</span></td><td>${p.officeName}</td><td><b style="color:var(--danger);">${p.checkoutQty}</b></td><td>${p.borrower}</td><td>${p.checkoutDate}</td></tr>`;
            });

    window.closeImportPreviewModal = () => { if(confirm('確定要捨棄這些尚未匯入的資料？')) { window.pendingImports = []; $('import-preview-modal-overlay').classList.remove('active'); } };

                    }));

        }

    // ======== ✨ 匯出中心 (PDF/CSV/XLSX) ========
    window.openExportModal = () => { $('export-modal-overlay').classList.add('active'); };
    window.closeExportModal = () => { $('export-modal-overlay').classList.remove('active'); };

    window.executeExport = (format) => {
        const target = $('export-target-data').value;
        let aoa = []; let filename = `PMO_Export_${new Date().toISOString().slice(0,10)}`;

        if (target === 'assets') {
            filename = `PMO_在列資產總表_${new Date().toISOString().slice(0,10)}`;
            aoa = [["資產屬性", "類別/標籤", "名稱", "年份", "編號/庫存", "單位", "存放辦公室", "狀態", "最低安全庫存", "備註"]];

                const off = globalOffices.find(o => o.id === a.office_id); const offName = off ? off.name : '未分配';
                if (a.assetType === 'consumable') {
                    consQty += (parseInt(a.quantity)||0); const m = a.minThreshold !== undefined ? parseInt(a.minThreshold) : 10; if(m > 0 && (parseInt(a.quantity)||0) < m) shortCnt++;
                    aoa.push(["消耗品", a.tag||'未分類', a.item, '-', a.quantity||0, a.unit||'個', offName, '-', m, a.remarks||'-']);
                } else {
                    fixedCnt++; aoa.push(["固定資產", a.category||'其他', a.item||'未命名', a.year||'-', a.sn||'N/A', '-', offName, a.status||'正常', '-', '-']);
                }
            });

            if (format === 'pdf') {

                aoa.forEach((r, i) => { html += `<tr>${r.map(c => i===0 ? `<th>${c}</th>` : `<td>${c}</td>`).join('')}</tr>`; });
                html += `</table><div class="summary"><p>📊 統計總結</p><ul><li>📦 消耗品總庫存：${consQty} 件</li><li>📌 固定資產總數：${fixedCnt} 件</li><li>⚠️ 不足品項數：${shortCnt} 項</li></ul></div></body></html>`;
                const win = window.open('', '_blank'); win.document.write(html); win.document.close(); setTimeout(() => { win.print(); }, 500);

            } else {
